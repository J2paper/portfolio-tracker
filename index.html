  function tplChartAllocation(D) {
    const title = 'Allocation by Category';
    if (!D.fxOk) {
      return chartCard(I.pie, title, '', `<div class="chart-empty">FX rate required for mixed KR/US portfolios.<br>Run <span style="color: var(--accent);">Auto Update</span> or <span style="color: var(--accent);">Edit Prices</span>.</div>`);
    }
    const onlyUncat = D.catList.length === 1 && D.catList[0].name === UNCATEGORIZED;
    if (onlyUncat) {
      return chartCard(I.pie, title, '', `<div class="chart-empty">Set categories on your holdings to see allocation.<br>Use the ${I.pencil} button in the table below.</div>`);
    }
    const total = D.catList.reduce((s, c) => s + c.value, 0);
    const data = D.catList.map(c => ({ ...c, color: D.colorFor(c.name), pct: total ? (c.value / total) * 100 : 0 }));
    const fmt = D.baseCcy === 'KRW' ? fmtKRWcompact : fmtUSDcompact;
    const meta = `${D.baseCcy} · ${D.anyPrice ? 'market value' : 'cost basis'}`;
    const body = `<div class="donut-wrap">
      <div style="position: relative; width: 180px; height: 180px;">
        ${donutSVG(data, 180)}
        <div style="position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none;">
          <div style="font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.08em;">TOTAL</div>
          <div class="donut-center" style="font-size: 14px; font-weight: 600; margin-top: 2px;">${fmt(total)}</div>
        </div>
      </div>
      <div class="legend-list">
        ${data.map(c => `
          <div class="legend-row">
            <div class="legend-name">
              <span class="dot" style="background: ${c.color};"></span>
              <span>${escape(c.name)}</span>
            </div>
            <div class="legend-pct">${c.pct.toFixed(1)}%</div>
          </div>`).join('')}
      </div>
    </div>`;
    return chartCard(I.pie, title, meta, body);
  }

  function tplChartTopHoldings(D) {
    const title = 'Top Holdings';
    if (!D.fxOk) {
      return chartCard(I.bar, title, '', `<div class="chart-empty">FX rate required.</div>`);
    }
    if (D.items.length === 0) {
      return chartCard(I.bar, title, '', `<div class="chart-empty">No data</div>`);
    }
    const sorted = [...D.items].sort((a, b) => b.valueBase - a.valueBase).slice(0, 10);
    const max = sorted[0].valueBase || 1;
    const fmt = D.baseCcy === 'KRW' ? fmtKRWcompact : fmtUSDcompact;
    const total = D.tValue || 1;
    const meta = `Top ${sorted.length} · ${D.baseCcy}`;
    const body = `<div class="bar-list">
      ${sorted.map(it => {
        const pct = (it.valueBase / max) * 100;
        const ofTotal = (it.valueBase / total) * 100;
        const cat = (it.h.category || '').trim() || UNCATEGORIZED;
        const color = D.colorFor(cat);
        const label = displayName(it.h);
        return `<div class="bar-row">
          <div class="bar-label" title="${escape(label)} (${escape(it.h.ticker)})">${escape(label)}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width: ${pct.toFixed(1)}%; background: ${color};"></div>
          </div>
          <div class="bar-value">${fmt(it.valueBase)} <span class="text-dim" style="font-size: 10px;">(${ofTotal.toFixed(1)}%)</span></div>
        </div>`;
      }).join('')}
    </div>`;
    return chartCard(I.bar, title, meta, body);
  }

  function tplChartPnL(D) {
    const title = 'P/L by Holding';
    if (!D.anyPrice) {
      return chartCard(I.scale, title, '', `<div class="chart-empty">No current prices yet.<br>Run <span style="color: var(--accent);">Auto Update</span> to fetch them.</div>`);
    }
    if (!D.fxOk) {
      return chartCard(I.scale, title, '', `<div class="chart-empty">FX rate required.</div>`);
    }
    const withPrice = D.items.filter(it => it.hasPrice);
    if (withPrice.length === 0) {
      return chartCard(I.scale, title, '', `<div class="chart-empty">No data to display.</div>`);
    }
    const sorted = [...withPrice].sort((a, b) => Math.abs(b.pnlBase) - Math.abs(a.pnlBase)).slice(0, 10);
    const max = Math.max(...sorted.map(it => Math.abs(it.pnlBase)), 1);
    const fmt = D.baseCcy === 'KRW' ? fmtKRWcompact : fmtUSDcompact;
    const meta = `Top ${sorted.length} · ${D.baseCcy}`;
    const body = `<div class="div-list">
      ${sorted.map(it => {
        const w = (Math.abs(it.pnlBase) / max) * 50;
        const pos = it.pnlBase >= 0;
        const sign = pos ? '+' : '−';
        const label = displayName(it.h);
        return `<div class="div-row">
          <div class="bar-label" title="${escape(label)} (${escape(it.h.ticker)})">${escape(label)}</div>
          <div class="div-track">
            <div class="div-fill ${pos ? 'pos' : 'neg'}" style="width: ${w.toFixed(2)}%;"></div>
          </div>
          <div class="bar-value" style="color: ${pos ? 'var(--gain)' : 'var(--loss)'};">
            ${sign}${fmt(Math.abs(it.pnlBase))} <span class="text-dim" style="font-size: 10px;">(${fmtPct(it.pct)})</span>
          </div>
        </div>`;
      }).join('')}
    </div>`;
    return chartCard(I.scale, title, meta, body);
  }

  function tplChartMarketSplit(D) {
    const title = 'Market Distribution';
    if (D.holdings.length === 0) {
      return chartCard(I.globe, title, '', `<div class="chart-empty">No data</div>`);
    }
    if (!D.fxOk) {
      return chartCard(I.globe, title, '', `<div class="chart-empty">FX rate required for mixed KR/US portfolios.</div>`);
    }
    const krBase = D.items.filter(it => it.h.market === 'KR').reduce((s, it) => s + it.valueBase, 0);
    const usBase = D.items.filter(it => it.h.market === 'US').reduce((s, it) => s + it.valueBase, 0);
    const total = krBase + usBase;
    if (total === 0) {
      return chartCard(I.globe, title, '', `<div class="chart-empty">No data</div>`);
    }
    const krPct = (krBase / total) * 100;
    const usPct = (usBase / total) * 100;

    const stack = `<div class="stack-bar">
      ${krPct > 0 ? `<div class="stack-seg" style="width: ${krPct}%; background: ${KR_COLOR};">${krPct >= 8 ? 'KR ' + krPct.toFixed(1) + '%' : ''}</div>` : ''}
      ${usPct > 0 ? `<div class="stack-seg" style="width: ${usPct}%; background: ${US_COLOR};">${usPct >= 8 ? 'US ' + usPct.toFixed(1) + '%' : ''}</div>` : ''}
    </div>`;

    const krPnl = D.krValue - D.krCost;
    const usPnl = D.usValue - D.usCost;
    const krPctNative = D.krCost ? (krPnl / D.krCost) * 100 : 0;
    const usPctNative = D.usCost ? (usPnl / D.usCost) * 100 : 0;

    const cards = `<div class="stack-legend">
      <div class="stack-card" style="border-left: 3px solid ${KR_COLOR};">
        <div class="stack-card-label">Korea · ${D.krCount} holdings</div>
        <div class="stack-card-value">${D.krCost > 0 ? fmtKRWcompact(D.krValue) : '—'}</div>
        <div class="stack-card-sub" style="color: ${D.krCount === 0 ? 'var(--dim)' : krPnl >= 0 ? 'var(--gain)' : 'var(--loss)'};">
          ${D.krCount === 0 ? '—' : (D.anyPrice ? `${krPnl >= 0 ? '+' : ''}${fmtKRWcompact(krPnl)} · ${fmtPct(krPctNative)}` : 'at cost basis')}
        </div>
      </div>
      <div class="stack-card" style="border-left: 3px solid ${US_COLOR};">
        <div class="stack-card-label">United States · ${D.usCount} holdings</div>
        <div class="stack-card-value">${D.usCost > 0 ? fmtUSD(D.usValue) : '—'}</div>
        <div class="stack-card-sub" style="color: ${D.usCount === 0 ? 'var(--dim)' : usPnl >= 0 ? 'var(--gain)' : 'var(--loss)'};">
          ${D.usCount === 0 ? '—' : (D.anyPrice ? `${usPnl >= 0 ? '+' : ''}${fmtUSD(Math.abs(usPnl))} · ${fmtPct(usPctNative)}` : 'at cost basis')}
        </div>
      </div>
    </div>`;
    const meta = `In ${D.baseCcy}`;
    return chartCard(I.globe, title, meta, stack + cards);
  }

  function tplCharts(D) {
    if (state.holdings.length === 0) return '';
    return `<div class="charts-grid">
      ${tplChartAllocation(D)}
      ${tplChartTopHoldings(D)}
      ${tplChartPnL(D)}
      ${tplChartMarketSplit(D)}
    </div>`;
  }

  // ---------- holdings table ----------
  const SORT_KEYS = {
    name: it => displayName(it.h).toLowerCase(),
    market: it => it.h.market,
    category: it => (it.h.category || '').trim() || UNCATEGORIZED,
    shares: it => it.shares,
    avgCost: it => it.avgCost,
    currentPrice: it => it.h.currentPrice ?? -Infinity,
    value: it => it.valueBase,
    pnl: it => it.hasPrice ? it.pnlBase : -Infinity,
    pct: it => it.hasPrice ? it.pct : -Infinity,
    weight: it => it.valueBase,
  };

  function sortIndicator(key) {
    if (state.sort.key !== key) return '';
    return state.sort.dir === 'asc' ? I.sortUp : I.sortDown;
  }

  function thSort(key, label, opts) {
    const right = opts && opts.right;
    const sorted = state.sort.key === key ? 'sorted' : '';
    return `<th class="${sorted}" data-act="sort" data-key="${key}" style="${right ? 'text-align: right;' : ''}">
      <span style="display: inline-flex; align-items: center; gap: 4px; ${right ? 'flex-direction: row-reverse;' : ''}">
        ${label} ${sortIndicator(key)}
      </span>
    </th>`;
  }

  function tplHoldingsTable(D) {
    if (state.holdings.length === 0) {
      return `<section class="holdings-section">
        <div class="holdings-head">
          ${I.wallet}<h2 class="holdings-title">Holdings</h2>
          <span class="holdings-meta">empty</span>
        </div>
        <div class="empty">
          <div class="empty-title">▒ NO HOLDINGS YET ▒</div>
          <div class="empty-sub">Click <strong style="color: var(--accent);">Add Holding</strong> above to get started,<br>or use <strong style="color: var(--accent);">Restore</strong> to load a previous backup.</div>
          <div class="empty-hint">Data auto-saves to your browser. Use JSON backup for permanent storage.</div>
        </div>
      </section>`;
    }

    const total = D.tValue || 1;
    const sorter = SORT_KEYS[state.sort.key] || SORT_KEYS.value;
    const dir = state.sort.dir === 'asc' ? 1 : -1;
    const sorted = [...D.items].sort((a, b) => {
      const va = sorter(a), vb = sorter(b);
      if (typeof va === 'string') return va.localeCompare(vb) * dir;
      return (va - vb) * dir;
    });

    const rows = sorted.map(it => {
      const h = it.h;
      const cat = (h.category || '').trim();
      const catColor = cat ? D.colorFor(cat) : null;
      const weight = D.fxOk ? (it.valueBase / total) * 100 : 0;
      const pnlColor = !it.hasPrice ? 'var(--muted)' : it.pnl >= 0 ? 'var(--gain)' : 'var(--loss)';
      const primary = displayName(h);
      const showSub = h.name && h.name.trim() && h.name.trim() !== h.ticker;

      const lotBadge = it.lotCount > 1 ? `<span class="lot-count-badge" title="${it.lotCount} buy lots">${it.lotCount} buys</span>` : '';
      return `<tr>
        <td>
          <div class="ticker-cell">
            <div style="display: flex; align-items: center; gap: 8px; min-width: 0;">
              <span class="ticker-display" title="${escape(primary)}">${escape(primary)}</span>
              <span class="market-tag ${h.market === 'KR' ? 'kr' : 'us'}">${h.market}</span>
            </div>
            ${showSub ? `<span class="ticker-sub" title="${escape(h.ticker)}">${escape(h.ticker)}</span>` : ''}
          </div>
        </td>
        <td>
          ${cat ? `<span class="cat-tag" style="color: ${catColor}; border-color: ${catColor}55; background: ${catColor}12;">${escape(cat)}</span>` : '<span class="text-dim">—</span>'}
        </td>
        <td class="num">${it.shares.toLocaleString()}</td>
        <td class="num">${fmtMoney(it.avgCost, it.cur)}${lotBadge}</td>
        <td class="num">${it.hasPrice ? fmtMoney(h.currentPrice, it.cur) : '<span class="text-dim">—</span>'}</td>
        <td class="num-strong">${it.hasPrice ? fmtMoney(it.value, it.cur) : fmtMoney(it.cost, it.cur)}</td>
        <td class="num-strong" style="color: ${pnlColor};">
          ${it.hasPrice ? `${it.pnl >= 0 ? '+' : '−'}${fmtMoney(Math.abs(it.pnl), it.cur)}` : '<span class="text-dim">—</span>'}
        </td>
        <td class="num" style="color: ${pnlColor};">${it.hasPrice ? fmtPct(it.pct) : '<span class="text-dim">—</span>'}</td>
        <td>
          <div class="weight-cell">
            <div class="weight-track"><div class="weight-fill" style="width: ${weight.toFixed(1)}%;"></div></div>
            <span class="num" style="min-width: 40px;">${D.fxOk ? weight.toFixed(1) + '%' : '—'}</span>
          </div>
        </td>
        <td>
          <div style="display: flex; gap: 2px; justify-content: flex-end;">
            <button class="icon-btn" data-act="add-buy" data-id="${h.id}" aria-label="Add buy" title="Add another buy">${I.plus}</button>
            <button class="icon-btn" data-act="edit" data-id="${h.id}" aria-label="Edit">${I.pencil}</button>
            <button class="icon-btn" data-act="delete" data-id="${h.id}" aria-label="Delete">${I.trash}</button>
          </div>
        </td>
      </tr>`;
    }).join('');

    return `<section class="holdings-section">
      <div class="holdings-head">
        ${I.wallet}<h2 class="holdings-title">Holdings</h2>
        <span class="holdings-meta">${state.holdings.length} total · click any header to sort</span>
      </div>
      <div class="table-wrap">
        <table class="holdings">
          <thead>
            <tr>
              ${thSort('name', 'Name')}
              ${thSort('category', 'Category')}
              ${thSort('shares', 'Shares', { right: true })}
              ${thSort('avgCost', 'Avg Cost', { right: true })}
              ${thSort('currentPrice', 'Price', { right: true })}
              ${thSort('value', 'Value', { right: true })}
              ${thSort('pnl', 'P/L', { right: true })}
              ${thSort('pct', 'Return', { right: true })}
              ${thSort('weight', 'Weight', { right: true })}
              <th class="no-sort"></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </section>`;
  }

  function tplError() {
    let msg = '';
    if (state.error) msg = `<div class="error-bar">
      <span>${escape(state.error)}</span>
      <button class="error-close" data-act="dismiss-error">${I.closeS}</button>
    </div>`;
    if (state.info) msg += `<div class="error-bar" style="background: var(--gain-bg); border-color: rgba(16,185,129,0.25); color: var(--gain);">
      <span>${escape(state.info)}</span>
      <button class="error-close" data-act="dismiss-info">${I.closeS}</button>
    </div>`;
    return msg;
  }

  function tplDialog() {
    if (!state.dialog) return '';
    if (state.dialog.mode === 'prices') return tplPriceDialog();
    if (state.dialog.mode === 'profiles') return tplProfileDialog();
    return tplHoldingDialog();
  }

  function tplLotRow(l, market, canRemove) {
    const cur = market === 'KR' ? 'KRW' : 'USD';
    const today = new Date().toISOString().slice(0, 10);
    return `<div class="lot-row" data-lot-row="${l.id}">
      <input class="input" data-lot-field="shares" type="number" step="any" placeholder="100" value="${l.shares ?? ''}">
      <input class="input" data-lot-field="price" type="number" step="any" placeholder="${market === 'KR' ? '70000' : '150.00'}" value="${l.price ?? ''}">
      <input class="input" data-lot-field="date" type="date" value="${l.date || today}">
      <button class="icon-btn" data-act="remove-lot" data-lot-id="${l.id}" ${canRemove ? '' : 'disabled style="opacity: 0.3; cursor: not-allowed;"'} aria-label="Remove">${I.trash}</button>
    </div>`;
  }

  function tplHoldingDialog() {
    const isEdit = state.dialog.mode === 'edit';
    const h = state.dialog.holding || {};
    const market = state.dialog.market || h.market || 'KR';
    const cur = market === 'KR' ? 'KRW' : 'USD';
    const existingCats = [...new Set(state.holdings.map(x => (x.category || '').trim()).filter(Boolean))];
    const allCats = [...new Set([...existingCats, ...SUGGESTED])];
    const lots = state.dialog.lots || [];
    const canRemove = lots.length > 1;
    const t = lotsTotals(lots);

    return `<div class="modal-bg" data-act="modal-bg">
      <div class="modal modal-wide" data-stop>
        <div class="modal-head">
          <h3 class="modal-title">${isEdit ? 'Edit Holding' : 'Add Holding'}</h3>
          <button class="icon-btn" data-act="close-dialog">${I.close}</button>
        </div>
        <div class="field">
          <label class="lbl">Market</label>
          <div class="seg-group">
            <button class="seg-btn ${market === 'KR' ? 'active' : ''}" data-act="set-market" data-v="KR" ${isEdit ? 'disabled style="opacity: 0.5; cursor: not-allowed;"' : ''}>Korea (KR)</button>
            <button class="seg-btn ${market === 'US' ? 'active' : ''}" data-act="set-market" data-v="US" ${isEdit ? 'disabled style="opacity: 0.5; cursor: not-allowed;"' : ''}>United States</button>
          </div>
        </div>
        <div class="field grid-2">
          <div>
            <label class="lbl">Ticker ${market === 'KR' ? '(e.g. 005930)' : '(e.g. AAPL)'}</label>
            <input class="input" id="f-ticker" value="${escape(h.ticker || '')}" placeholder="${market === 'KR' ? '005930' : 'AAPL'}">
          </div>
          <div>
            <label class="lbl">Name (optional)</label>
            <input class="input" id="f-name" value="${escape(h.name || '')}" placeholder="${market === 'KR' ? 'Samsung Electronics' : 'Apple Inc.'}" style="font-family: var(--sans);">
          </div>
        </div>
        <div class="field">
          <label class="lbl">Category (optional)</label>
          <input class="input" id="f-category" value="${escape(h.category || '')}" placeholder="e.g. Tech, Semiconductors, Dividend…" list="cat-list" style="font-family: var(--sans);">
          <datalist id="cat-list">${allCats.map(c => `<option value="${escape(c)}">`).join('')}</datalist>
        </div>
        <div class="field">
          <label class="lbl">Buy History · ${cur}</label>
          <div class="lot-header">
            <span>Shares</span>
            <span>Price</span>
            <span>Date</span>
            <span></span>
          </div>
          <div class="lot-list">
            ${lots.map(l => tplLotRow(l, market, canRemove)).join('')}
          </div>
          <button class="lot-add-btn" data-act="add-lot">${I.plus} Add Buy</button>
        </div>
        <div class="lot-summary" id="lot-summary">
          <div class="lot-summary-item"><span class="lot-summary-label">Total shares</span><span>${t.shares.toLocaleString()}</span></div>
          <div class="lot-summary-item"><span class="lot-summary-label">Avg cost</span><span>${fmtMoney(t.avgCost, cur)}</span></div>
          <div class="lot-summary-item"><span class="lot-summary-label">Total cost</span><span>${fmtMoney(t.cost, cur)}</span></div>
        </div>
        <div style="display: flex; gap: 10px;">
          <button class="btn-ghost" data-act="close-dialog" style="flex: 1;">Cancel</button>
          <button class="btn-primary" data-act="submit-dialog" style="flex: 1;">${isEdit ? 'Save' : 'Add'}</button>
        </div>
      </div>
    </div>`;
  }

  function tplPriceDialog() {
    const needsFx = state.holdings.some(h => h.market === 'KR') && state.holdings.some(h => h.market === 'US');
    return `<div class="modal-bg" data-act="modal-bg">
      <div class="modal modal-wide" data-stop>
        <div class="modal-head">
          <h3 class="modal-title">Edit Prices</h3>
          <button class="icon-btn" data-act="close-dialog">${I.close}</button>
        </div>
        <p class="modal-sub">Look up current prices on Yahoo Finance, Google Finance, etc. and enter them below. Blank fields keep the existing value.</p>
        ${state.holdings.map(h => `
          <div class="field">
            <label class="lbl">${escape(h.ticker)}${h.name ? ' · ' + escape(h.name) : ''} <span style="color: var(--dim);">(${h.market === 'KR' ? 'KRW' : 'USD'})</span></label>
            <input class="input" data-price-id="${h.id}" type="number" step="any"
              value="${h.currentPrice ?? ''}"
              placeholder="${h.market === 'KR' ? '70000' : '150.00'}">
          </div>`).join('')}
        ${needsFx ? `
          <div class="field" style="border-top: 1px solid var(--border); padding-top: 14px; margin-top: 6px;">
            <label class="lbl">USD / KRW exchange rate</label>
            <input class="input" id="manual-fx" type="number" step="any"
              value="${state.fxRate ?? ''}" placeholder="1380">
          </div>` : ''}
        <div style="display: flex; gap: 10px; margin-top: 14px;">
          <button class="btn-ghost" data-act="close-dialog" style="flex: 1;">Cancel</button>
          <button class="btn-primary" data-act="submit-prices" style="flex: 1;">Save</button>
        </div>
      </div>
    </div>`;
  }

  function tplProfileDialog() {
    const canDelete = state.profiles.length > 1;
    const rows = state.profiles.map(p => {
      const isActive = p.id === state.activeProfileId;
      const count = p.holdings.length;
      return `<div class="profile-row ${isActive ? 'active' : ''}">
        <input class="input" data-profile-name="${p.id}" value="${escape(p.name)}" placeholder="Profile name" style="font-family: var(--sans);">
        <span class="text-dim" style="font-family: var(--mono); font-size: 11px; min-width: 70px; text-align: right;">${count} holding${count === 1 ? '' : 's'}</span>
        ${isActive ? '<span class="profile-badge">ACTIVE</span>' : ''}
        <button class="icon-btn" data-act="profile-delete" data-id="${p.id}" ${canDelete ? '' : 'disabled style="opacity: 0.3; cursor: not-allowed;"'} title="${canDelete ? 'Delete profile' : 'At least one profile required'}">${I.trash}</button>
      </div>`;
    }).join('');

    return `<div class="modal-bg" data-act="modal-bg">
      <div class="modal" data-stop>
        <div class="modal-head">
          <h3 class="modal-title">Manage Users</h3>
          <button class="icon-btn" data-act="close-dialog">${I.close}</button>
        </div>
        <p class="modal-sub">Each user keeps their own holdings, prices, and FX rate. Switch users from the dropdown in the header.</p>
        <div class="profile-list">${rows}</div>
        <div class="profile-add-row">
          <input class="input" id="new-profile-name" placeholder="New user name (e.g. Alice)" style="font-family: var(--sans);">
          <button class="btn-primary" data-act="profile-add">${I.plus} Add</button>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 16px;">
          <button class="btn-primary" data-act="profile-save-all" style="flex: 1;">Done</button>
        </div>
      </div>
    </div>`;
  }

  // ---------- render & events ----------
  function render() {
    const root = document.getElementById('app');
    const isHoldingDialog = state.dialog && (state.dialog.mode === 'add' || state.dialog.mode === 'edit');
    let topFields = null;
    if (isHoldingDialog) {
      // Capture in-progress edits before re-render so they survive add-lot / remove-lot.
      topFields = {
        ticker: document.getElementById('f-ticker')?.value,
        name: document.getElementById('f-name')?.value,
        category: document.getElementById('f-category')?.value,
      };
      const liveLots = readLotsFromDOM();
      if (liveLots.length > 0) state.dialog.lots = liveLots;
    }
    const D = derive();
    root.innerHTML =
      tplHeader() +
      tplToolbar() +
      tplError() +
      tplKPI(D) +
      tplCharts(D) +
      tplHoldingsTable(D) +
      tplDialog();
    if (topFields) {
      const set = (id, val) => { const el = document.getElementById(id); if (el && val != null) el.value = val; };
      set('f-ticker', topFields.ticker);
      set('f-name', topFields.name);
      set('f-category', topFields.category);
    }
  }

  function readLotsFromDOM() {
    const lots = [];
    document.querySelectorAll('[data-lot-row]').forEach(row => {
      const id = row.getAttribute('data-lot-row');
      const shares = row.querySelector('[data-lot-field="shares"]')?.value;
      const price = row.querySelector('[data-lot-field="price"]')?.value;
      const date = row.querySelector('[data-lot-field="date"]')?.value;
      lots.push({ id, shares, price, date });
    });
    return lots;
  }

  function readForm() {
    const get = (id) => document.getElementById(id);
    return {
      ticker: get('f-ticker')?.value,
      name: get('f-name')?.value,
      category: get('f-category')?.value,
      lots: readLotsFromDOM(),
    };
  }

  // Recompute the lot summary footer from current DOM values, without a full re-render.
  function updateLotSummary() {
    const summary = document.getElementById('lot-summary');
    if (!summary || !state.dialog) return;
    const market = state.dialog.market || state.dialog.holding?.market || 'KR';
    const cur = market === 'KR' ? 'KRW' : 'USD';
    const t = lotsTotals(readLotsFromDOM().map(l => ({ shares: parseFloat(l.shares) || 0, price: parseFloat(l.price) || 0 })));
    summary.innerHTML =
      `<div class="lot-summary-item"><span class="lot-summary-label">Total shares</span><span>${t.shares.toLocaleString()}</span></div>` +
      `<div class="lot-summary-item"><span class="lot-summary-label">Avg cost</span><span>${fmtMoney(t.avgCost, cur)}</span></div>` +
      `<div class="lot-summary-item"><span class="lot-summary-label">Total cost</span><span>${fmtMoney(t.cost, cur)}</span></div>`;
  }

  function commitProfileNames() {
    document.querySelectorAll('[data-profile-name]').forEach(input => {
      const id = input.getAttribute('data-profile-name');
      renameProfile(id, input.value);
    });
  }

  document.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-act]');
    if (!btn) return;
    const act = btn.dataset.act;
    const id = btn.dataset.id;
    if (act === 'open-add') {
      state.dialog = { mode: 'add', market: 'KR', lots: [{ id: makeLotId(), shares: '', price: '', date: new Date().toISOString().slice(0, 10) }] };
      render();
    }
    else if (act === 'open-prices') { state.dialog = { mode: 'prices' }; render(); }
    else if (act === 'submit-prices') { submitPrices(); }
    else if (act === 'edit') {
      const h = state.holdings.find(x => x.id === id);
      if (h) {
        state.dialog = { mode: 'edit', holding: h, market: h.market, lots: h.lots.map(l => ({ ...l })) };
        render();
      }
    }
    else if (act === 'add-buy') {
      const h = state.holdings.find(x => x.id === id);
      if (h) {
        const lots = [...h.lots.map(l => ({ ...l })), { id: makeLotId(), shares: '', price: '', date: new Date().toISOString().slice(0, 10) }];
        state.dialog = { mode: 'edit', holding: h, market: h.market, lots };
        render();
        // Focus the new shares input
        setTimeout(() => {
          const rows = document.querySelectorAll('[data-lot-row]');
          const last = rows[rows.length - 1];
          last?.querySelector('[data-lot-field="shares"]')?.focus();
        }, 30);
      }
    }
    else if (act === 'add-lot') {
      if (state.dialog) {
        state.dialog.lots = [...readLotsFromDOM(), { id: makeLotId(), shares: '', price: '', date: new Date().toISOString().slice(0, 10) }];
        render();
      }
    }
    else if (act === 'remove-lot') {
      if (state.dialog) {
        const lotId = btn.dataset.lotId;
        const live = readLotsFromDOM().filter(l => l.id !== lotId);
        if (live.length === 0) return; // Don't allow removing the last lot
        state.dialog.lots = live;
        render();
      }
    }
    else if (act === 'delete') { remove(id); }
    else if (act === 'update-prices') { updatePrices(); }
    else if (act === 'export-json') { exportJSON(); }
    else if (act === 'import-json') { document.getElementById('import-file').click(); }
    else if (act === 'toggle-theme') { toggleTheme(); }
    else if (act === 'manage-profiles') { state.dialog = { mode: 'profiles' }; render(); }
    else if (act === 'quick-add-profile') {
      const name = prompt('New user name:');
      if (name && name.trim()) addProfile(name.trim());
    }
    else if (act === 'profile-add') {
      commitProfileNames();
      const input = document.getElementById('new-profile-name');
      const name = input && input.value.trim();
      if (!name) { input?.focus(); return; }
      addProfile(name);
    }
    else if (act === 'profile-delete') {
      commitProfileNames();
      deleteProfile(id);
    }
    else if (act === 'profile-save-all') {
      commitProfileNames();
      state.dialog = null;
      render();
    }
    else if (act === 'close-dialog' || act === 'modal-bg') {
      if (act === 'modal-bg' && e.target.closest('[data-stop]')) return;
      if (state.dialog && state.dialog.mode === 'profiles') commitProfileNames();
      state.dialog = null; render();
    }
    else if (act === 'set-market') {
      state.dialog = { ...state.dialog, market: btn.dataset.v };
      render();
    }
    else if (act === 'submit-dialog') { submitForm(); }
    else if (act === 'dismiss-error') { state.error = null; render(); }
    else if (act === 'dismiss-info') { state.info = null; render(); }
    else if (act === 'sort') {
      const key = btn.dataset.key;
      if (state.sort.key === key) {
        state.sort.dir = state.sort.dir === 'asc' ? 'desc' : 'asc';
      } else {
        state.sort.key = key;
        state.sort.dir = (key === 'name' || key === 'category' || key === 'market') ? 'asc' : 'desc';
      }
      render();
    }
  });

  document.addEventListener('change', (e) => {
    if (e.target && e.target.id === 'import-file') {
      const file = e.target.files && e.target.files[0];
      if (file) importJSON(file);
      e.target.value = '';
    } else if (e.target && e.target.id === 'profile-select') {
      switchProfile(e.target.value);
    }
  });

  document.addEventListener('input', (e) => {
    if (e.target && e.target.matches('[data-lot-field]')) {
      updateLotSummary();
    }
  });

  function submitForm() {
    const v = readForm();
    const editId = state.dialog.holding?.id;
    const market = state.dialog.market || state.dialog.holding?.market || 'KR';
    const ticker = (v.ticker || '').trim().toUpperCase();
    if (!ticker) { state.error = 'Ticker is required.'; render(); return; }
    const validLots = v.lots
      .map(l => ({
        id: l.id || makeLotId(),
        shares: Number(l.shares),
        price: Number(l.price),
        date: l.date || new Date().toISOString().slice(0, 10),
      }))
      .filter(l => l.shares > 0 && l.price > 0);
    if (validLots.length === 0) {
      state.error = 'Add at least one buy with shares and price greater than zero.';
      render(); return;
    }

    // When adding a new holding for a ticker that already exists in the same market,
    // offer to append the lots to the existing position instead of creating a duplicate.
    if (!editId) {
      const existing = state.holdings.find(h => h.ticker === ticker && h.market === market);
      if (existing) {
        const ok = confirm(
          `${ticker} (${existing.name || existing.ticker}) already exists with ${existing.lots.length} buy(s).\n` +
          `Add these ${validLots.length} buy(s) to the existing holding?\n\n` +
          `Click Cancel to create a separate holding instead.`
        );
        if (ok) {
          appendLotsToHolding(existing.id, validLots);
          return;
        }
      }
    }

    addOrUpdate({
      ticker,
      name: (v.name || '').trim(),
      market,
      category: (v.category || '').trim(),
      lots: validLots,
    }, editId);
  }

  // ---------- init ----------
  state.theme = loadTheme();
  applyTheme();
  if (!hasLocalStorage()) {
    state.error = 'localStorage is unavailable (private mode?). Auto-save is disabled, but JSON backup/restore still works.';
    state.profiles = [newProfile('Default')];
    state.activeProfileId = state.profiles[0].id;
    syncFromActive();
  } else {
    load();
  }
  render();
})();
</script>
</body>
</html>
