<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Portfolio Dashboard</title>
<meta name="color-scheme" content="dark light">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Pixelify+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     90s Retro Theme — Midnight 95 (dark) / Classic Win95 (light)
     ============================================================ */
  :root {
    /* After-Hours — warm dark variant of the mid-century palette */
    --bg: #1c1814;
    --bg-grid: rgba(232, 177, 77, 0.04);
    --surface: #2d2722;
    --surface-hi: #38312a;
    --surface-2: #1f1a16;
    --titlebar: #5a8794;
    --titlebar-2: #3d6671;
    --titlebar-text: #f5efe2;
    --titlebar-inactive: #4a4438;
    --text: #ecd9a6;
    --muted: #b5a988;
    --dim: #88806a;
    --dim-2: #5a5447;
    --accent: #e8b14d;
    --accent-2: #e06a3e;
    --accent-border: #e8b14d;
    --accent-bg: rgba(232, 177, 77, 0.14);
    --gain: #b3c14d;
    --gain-bg: rgba(179, 193, 77, 0.16);
    --loss: #d94a40;
    --loss-bg: rgba(217, 74, 64, 0.14);
    --info: #7ba3b0;
    --bevel-light: #5a5447;
    --bevel-light-2: #4a443a;
    --bevel-dark: #0f0c09;
    --bevel-darker: #000000;
    --border: #0f0c09;
    --border-hi: #5a5447;
    --track: #1f1a16;
    --track-2: #2d2722;
    --track-line: #e8b14d;
    --hover: rgba(232, 177, 77, 0.08);
    --hover-2: rgba(232, 177, 77, 0.14);
    --shadow-window: 4px 4px 0 rgba(0, 0, 0, 0.5);
    --serif: 'Press Start 2P', 'VT323', 'Courier New', monospace;
    --sans: Tahoma, 'MS Sans Serif', 'Pixelify Sans', 'Segoe UI', sans-serif;
    --mono: 'VT323', 'Courier New', ui-monospace, monospace;
    color-scheme: dark;
  }
  [data-theme="light"] {
    /* Mid-Century Modern — earthy warm palette over beige */
    --bg: #e8e2d5;
    --bg-grid: rgba(74, 60, 49, 0.05);
    --surface: #f5efe2;
    --surface-hi: #faf6ec;
    --surface-2: #ecd9a6;
    --titlebar: #5a8794;
    --titlebar-2: #7ba3b0;
    --titlebar-text: #ffffff;
    --titlebar-inactive: #9c9387;
    --text: #2a2520;
    --muted: #5a5249;
    --dim: #786e63;
    --dim-2: #9c9387;
    --accent: #e06a3e;
    --accent-2: #e8b14d;
    --accent-border: #e06a3e;
    --accent-bg: rgba(224, 106, 62, 0.14);
    --gain: #8aa03a;
    --gain-bg: rgba(179, 193, 77, 0.20);
    --loss: #c13e36;
    --loss-bg: rgba(193, 62, 54, 0.12);
    --info: #5a8794;
    --bevel-light: #ffffff;
    --bevel-light-2: #faf6ec;
    --bevel-dark: #b3a896;
    --bevel-darker: #2a2520;
    --border: #2a2520;
    --border-hi: #5a5249;
    --track: #faf6ec;
    --track-2: #ecd9a6;
    --track-line: #2a2520;
    --hover: rgba(90, 135, 148, 0.10);
    --hover-2: rgba(90, 135, 148, 0.18);
    --shadow-window: 4px 4px 0 rgba(42, 37, 32, 0.30);
    color-scheme: light;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 17px;
    line-height: 1.4;
  }
  body {
    min-height: 100vh;
    padding: 20px 20px 80px;
    background-image: radial-gradient(circle, var(--bg-grid) 1px, transparent 1px);
    background-size: 4px 4px;
  }
  .root { max-width: 1400px; margin: 0 auto; }
  button { font-family: inherit; cursor: pointer; }
  input, select { font-family: inherit; }
  input::placeholder { color: var(--dim); }
  input:focus, select:focus { outline: 1px dotted var(--titlebar); outline-offset: -3px; }
  ::selection { background: var(--titlebar); color: var(--titlebar-text); }

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes blink { 50% { opacity: 0.35; } }
  .spin { animation: spin 1s linear infinite; }
  .blink { animation: blink 1s steps(2) infinite; }

  /* ============================================================
     Beveled chrome (Win95 outset/inset)
     ============================================================ */
  .bevel-out, .toolbar, .kpi, .chart-card, .holdings-section, .modal,
  header.head, .btn-primary, .btn-ghost, .btn-soft, .icon-btn, .lot-add-btn,
  .seg-btn:not(.active) {
    border: 2px solid;
    border-color: var(--bevel-light) var(--bevel-darker) var(--bevel-darker) var(--bevel-light);
    box-shadow: inset 1px 1px 0 var(--bevel-light-2), inset -1px -1px 0 var(--bevel-dark);
    border-radius: 0;
  }
  .bevel-in, .input, .profile-select, .table-wrap, .stack-card, .lot-summary,
  .bar-track, .div-track, .stack-bar, .empty, .error-bar, .seg-btn.active {
    border: 2px solid;
    border-color: var(--bevel-dark) var(--bevel-light) var(--bevel-light) var(--bevel-dark);
    box-shadow: inset 1px 1px 0 var(--bevel-darker), inset -1px -1px 0 var(--bevel-light-2);
    border-radius: 0;
  }

  /* ============================================================
     Title bars (gradient navy/magenta strip on every window)
     ============================================================ */
  .head-titlebar, .kpi-label, .chart-head, .holdings-head, .modal-head {
    background: linear-gradient(to right, var(--titlebar) 0%, var(--titlebar-2) 100%);
    color: var(--titlebar-text);
    padding: 3px 6px;
    font-family: var(--sans);
    font-size: 16px;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 6px;
    margin: 0;
    text-transform: none;
    letter-spacing: 0;
  }

  /* ============================================================
     Header (page title window)
     ============================================================ */
  header.head {
    display: block;
    background: var(--surface);
    padding: 0;
    margin-bottom: 14px;
  }
  .head-titlebar { font-size: 17px; }
  .head-titlebar-icon { font-size: 17px; }
  .head-content {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 18px;
    flex-wrap: wrap;
    padding: 14px 16px;
  }
  .eyebrow { font-family: var(--mono); font-size: 23px; color: var(--accent); margin-bottom: 2px; line-height: 1; }
  h1.title {
    font-family: 'Press Start 2P', 'VT323', monospace;
    font-size: 23px;
    font-weight: 400;
    line-height: 1.5;
    letter-spacing: 0;
    color: var(--text);
  }
  .head-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
  .head-meta { display: flex; align-items: center; gap: 14px; color: var(--text); font-size: 19px; font-family: var(--mono); }
  .head-meta-item { display: flex; align-items: center; gap: 6px; }

  /* ============================================================
     Profile bar (in header)
     ============================================================ */
  .profile-bar { display: flex; align-items: center; gap: 4px; }
  .profile-bar-label {
    font-family: var(--sans);
    font-size: 16px;
    font-weight: bold;
    color: var(--text);
    margin-right: 4px;
  }
  .profile-select {
    background: var(--surface-2);
    color: var(--text);
    padding: 3px 6px;
    font-family: var(--sans);
    font-size: 17px;
    min-width: 140px;
    cursor: pointer;
  }

  /* ============================================================
     Toolbar
     ============================================================ */
  .toolbar {
    display: flex;
    gap: 4px;
    align-items: center;
    flex-wrap: wrap;
    padding: 6px 8px;
    margin-bottom: 14px;
    background: var(--surface);
  }
  .btn-primary, .btn-ghost, .btn-soft {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    color: var(--text);
    padding: 4px 12px;
    font-family: var(--sans);
    font-size: 17px;
    cursor: pointer;
    min-height: 26px;
  }
  .btn-primary { font-weight: bold; }
  .btn-primary:active, .btn-ghost:active, .btn-soft:active,
  .icon-btn:active, .lot-add-btn:active {
    border-color: var(--bevel-darker) var(--bevel-light) var(--bevel-light) var(--bevel-darker) !important;
    box-shadow: inset 1px 1px 0 var(--bevel-dark), inset -1px -1px 0 var(--bevel-light-2) !important;
  }
  .btn-primary:focus, .btn-ghost:focus, .btn-soft:focus { outline: 1px dotted var(--text); outline-offset: -5px; }
  .btn-ghost:disabled, .btn-primary:disabled, .btn-soft:disabled {
    color: var(--dim-2);
    text-shadow: 1px 1px 0 var(--bevel-light);
    cursor: not-allowed;
  }
  [data-theme="light"]:root .btn-ghost:disabled,
  [data-theme="light"] .btn-primary:disabled,
  [data-theme="light"] .btn-soft:disabled { text-shadow: 1px 1px 0 var(--bevel-light); }
  :root .btn-ghost:disabled,
  :root .btn-primary:disabled,
  :root .btn-soft:disabled { text-shadow: 1px 1px 0 #000; }
  .save-status {
    margin-left: auto;
    color: var(--muted);
    font-size: 19px;
    font-family: var(--mono);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .toolbar-divider { width: 0; border-left: 1px solid var(--bevel-dark); border-right: 1px solid var(--bevel-light); height: 22px; margin: 0 4px; }

  /* Market filter segmented control (in toolbar) */
  .filter-seg { display: inline-flex; gap: 0; }
  .filter-btn {
    background: var(--surface);
    color: var(--text);
    border: 2px solid;
    border-color: var(--bevel-light) var(--bevel-darker) var(--bevel-darker) var(--bevel-light);
    box-shadow: inset 1px 1px 0 var(--bevel-light-2), inset -1px -1px 0 var(--bevel-dark);
    border-radius: 0;
    padding: 4px 10px;
    font-family: var(--sans);
    font-size: 17px;
    font-weight: bold;
    cursor: pointer;
    min-height: 26px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .filter-btn + .filter-btn { margin-left: -2px; }
  .filter-btn.active {
    border-color: var(--bevel-darker) var(--bevel-light) var(--bevel-light) var(--bevel-darker);
    box-shadow: inset 1px 1px 0 var(--bevel-dark), inset -1px -1px 0 var(--bevel-light-2);
    background: var(--surface-2);
    color: var(--accent);
  }
  .filter-btn:disabled { color: var(--dim-2); cursor: not-allowed; }
  .filter-count { font-family: var(--mono); font-size: 14px; font-weight: 400; opacity: 0.7; }

  /* ============================================================
     Markets strip (KOSPI / KOSDAQ / NASDAQ / S&P 500 / USDKRW)
     ============================================================ */
  .markets-strip {
    background: var(--surface);
    border: 2px solid;
    border-color: var(--bevel-light) var(--bevel-darker) var(--bevel-darker) var(--bevel-light);
    box-shadow: inset 1px 1px 0 var(--bevel-light-2), inset -1px -1px 0 var(--bevel-dark);
    margin-bottom: 14px;
    overflow: hidden;
  }
  .markets-titlebar {
    background: linear-gradient(to right, var(--titlebar) 0%, var(--titlebar-2) 100%);
    color: var(--titlebar-text);
    padding: 3px 6px;
    font-family: var(--sans);
    font-size: 17px;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .markets-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0;
  }
  .market-cell {
    padding: 10px 14px;
    border-right: 1px solid var(--bevel-dark);
    display: grid;
    grid-template-columns: 1fr auto;
    grid-template-rows: auto auto auto;
    column-gap: 12px;
    row-gap: 2px;
    align-items: center;
  }
  .market-cell:last-child { border-right: none; }
  .market-label {
    grid-column: 1 / 2;
    font-family: var(--sans);
    font-size: 16px;
    font-weight: bold;
    color: var(--muted);
  }
  .market-value {
    grid-column: 1 / 2;
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    line-height: 1.1;
  }
  .market-change {
    grid-column: 1 / 2;
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 600;
  }
  .market-spark {
    grid-column: 2 / 3;
    grid-row: 1 / 4;
    align-self: center;
  }
  @media (max-width: 1100px) {
    .markets-grid { grid-template-columns: repeat(3, 1fr); }
    .market-cell:nth-child(3n) { border-right: none; }
    .market-cell:nth-child(-n+3) { border-bottom: 1px solid var(--bevel-dark); }
  }
  @media (max-width: 640px) {
    .markets-grid { grid-template-columns: repeat(2, 1fr); }
    .market-cell:nth-child(2n) { border-right: none; }
    .market-cell:nth-child(3n) { border-right: 1px solid var(--bevel-dark); }
    .market-spark svg { width: 60px; }
  }

  /* ============================================================
     KPI windows
     ============================================================ */
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
  .kpi { background: var(--surface); padding: 0; position: relative; overflow: hidden; }
  .kpi-label { letter-spacing: 0; }
  .kpi-value {
    font-family: var(--mono);
    font-size: 44px;
    font-weight: 400;
    line-height: 1;
    padding: 14px 14px 4px;
    color: var(--text);
  }
  .kpi-sub {
    font-family: var(--mono);
    font-size: 20px;
    color: var(--muted);
    padding: 0 14px 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .kpi-accent-bar { display: none; }

  /* ============================================================
     Chart windows
     ============================================================ */
  .charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 14px; }
  .chart-card { background: var(--surface); padding: 0; min-height: 240px; display: flex; flex-direction: column; }
  .chart-icon { color: var(--titlebar-text); display: flex; }
  .chart-title { font-family: var(--sans); font-size: 17px; font-weight: bold; color: var(--titlebar-text); }
  .chart-meta { font-family: var(--mono); font-size: 17px; color: var(--titlebar-text); opacity: 0.85; margin-left: auto; font-weight: normal; }
  .chart-empty { color: var(--muted); font-size: 19px; padding: 30px 16px; text-align: center; line-height: 1.6; font-family: var(--sans); }

  /* Donut */
  .donut-wrap { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; padding: 14px; }
  .donut-svg { flex-shrink: 0; }
  .donut-center { font-family: var(--mono); }
  .legend-list { flex: 1; display: flex; flex-direction: column; gap: 6px; min-width: 160px; }
  .legend-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: 19px; }
  .legend-name { display: flex; align-items: center; gap: 8px; min-width: 0; overflow: hidden; }
  .legend-name span:last-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .legend-pct { font-family: var(--mono); font-size: 20px; font-weight: 400; flex-shrink: 0; }
  .dot { width: 10px; height: 10px; border-radius: 0; flex-shrink: 0; border: 1px solid var(--bevel-darker); }

  /* Bar chart */
  .bar-list { display: flex; flex-direction: column; gap: 7px; padding: 14px; }
  .bar-row { display: grid; grid-template-columns: minmax(80px, 150px) 1fr auto; gap: 10px; align-items: center; font-size: 19px; }
  .bar-label { font-family: var(--sans); font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar-track { position: relative; height: 18px; background: var(--track); overflow: hidden; }
  .bar-fill { position: absolute; top: 0; bottom: 0; transition: width .3s ease; }
  .bar-value { font-family: var(--mono); font-size: 19px; text-align: right; white-space: nowrap; }

  /* Diverging P/L */
  .div-list { display: flex; flex-direction: column; gap: 7px; padding: 14px; }
  .div-row { display: grid; grid-template-columns: minmax(80px, 150px) 1fr auto; gap: 10px; align-items: center; font-size: 19px; }
  .div-track { position: relative; height: 18px; background: var(--track); }
  .div-track::before { content: ''; position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: var(--track-line); z-index: 1; }
  .div-fill { position: absolute; top: 0; bottom: 0; transition: all .3s ease; }
  .div-fill.pos { background: var(--gain); left: 50%; }
  .div-fill.neg { background: var(--loss); right: 50%; }

  /* Stacked market split */
  .stack-bar { display: flex; height: 30px; overflow: hidden; margin: 14px; background: var(--track); }
  .stack-seg {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--sans);
    font-size: 17px;
    font-weight: bold;
    color: #ffffff;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
    transition: width .3s ease;
  }
  .stack-legend { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 0 14px 14px; }
  .stack-card { background: var(--surface-2); padding: 10px 12px; }
  .stack-card-label { font-family: var(--sans); font-size: 16px; font-weight: bold; color: var(--muted); margin-bottom: 6px; }
  .stack-card-value { font-family: var(--mono); font-size: 26px; font-weight: 400; margin-bottom: 4px; }
  .stack-card-sub { font-family: var(--mono); font-size: 19px; }

  /* ============================================================
     Holdings window + table
     ============================================================ */
  .holdings-section { background: var(--surface); padding: 0; }
  .holdings-title { font-family: var(--sans); font-size: 17px; font-weight: bold; color: var(--titlebar-text); }
  .holdings-meta { font-family: var(--mono); font-size: 17px; color: var(--titlebar-text); opacity: 0.85; margin-left: auto; font-weight: normal; }
  .table-wrap { overflow-x: auto; padding: 8px; background: var(--surface-2); margin: 8px; }
  table.holdings { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 19px; min-width: 900px; background: var(--surface-2); }
  table.holdings thead th {
    text-align: left;
    font-family: var(--sans);
    font-size: 16px;
    font-weight: bold;
    letter-spacing: 0;
    color: var(--text);
    padding: 4px 8px;
    background: var(--surface);
    border: 2px solid;
    border-color: var(--bevel-light) var(--bevel-darker) var(--bevel-darker) var(--bevel-light);
    box-shadow: inset 1px 1px 0 var(--bevel-light-2), inset -1px -1px 0 var(--bevel-dark);
    user-select: none;
    cursor: pointer;
    white-space: nowrap;
  }
  table.holdings thead th.no-sort { cursor: default; }
  table.holdings thead th.sorted { color: var(--accent); }
  table.holdings tbody td { padding: 6px 10px; border-bottom: 1px dotted var(--bevel-dark); vertical-align: middle; }
  table.holdings tbody tr:last-child td { border-bottom: none; }
  table.holdings tbody tr:hover { background: var(--accent-bg); }

  .ticker-cell { display: flex; flex-direction: column; gap: 1px; }
  .ticker-display { font-family: var(--sans); font-size: 19px; font-weight: bold; max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ticker-sub { font-family: var(--mono); font-size: 19px; color: var(--muted); }
  .market-tag {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: bold;
    padding: 0 4px;
    border-radius: 0;
    border: 1px solid var(--bevel-darker);
    display: inline-block;
    color: #ffffff;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
  }
  .market-tag.kr { background: #e8b14d; color: #2a2520; text-shadow: none; }
  .market-tag.us { background: #5a8794; }
  .cat-tag { font-family: var(--sans); font-size: 16px; font-weight: bold; padding: 0 6px; border-radius: 0; border: 1px solid; display: inline-block; }
  .num { font-family: var(--mono); font-size: 20px; font-weight: 400; text-align: right; }
  .num-strong { font-family: var(--mono); font-size: 20px; font-weight: 700; text-align: right; }
  .text-right { text-align: right; }
  .text-gain { color: var(--gain); }
  .text-loss { color: var(--loss); }
  .text-muted { color: var(--muted); }
  .text-dim { color: var(--dim); }

  .icon-btn {
    background: var(--surface);
    color: var(--text);
    padding: 2px 4px;
    display: inline-flex;
    cursor: pointer;
  }
  .icon-btn:hover { background: var(--surface-hi); }
  .weight-cell { display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
  .weight-track { width: 60px; height: 8px; background: var(--track); border: 1px solid var(--bevel-dark); border-radius: 0; overflow: hidden; box-shadow: inset 1px 1px 0 var(--bevel-darker); }
  .weight-fill { height: 100%; background: var(--accent); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 36px 18px;
    background: var(--surface-2);
    margin: 10px;
    color: var(--text);
  }
  .empty-title { font-family: var(--mono); font-size: 38px; margin-bottom: 8px; color: var(--accent); }
  .empty-sub { color: var(--text); font-size: 19px; line-height: 1.6; font-family: var(--sans); }
  .empty-hint { color: var(--muted); font-size: 17px; margin-top: 14px; font-family: var(--mono); }

  /* Error / info */
  .error-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--loss-bg);
    color: var(--loss);
    font-size: 19px;
    padding: 6px 12px;
    margin-bottom: 12px;
    font-family: var(--sans);
    font-weight: bold;
  }
  .error-close { background: transparent; border: none; color: inherit; display: flex; padding: 2px; cursor: pointer; }

  /* ============================================================
     Modal (Win95 dialog box)
     ============================================================ */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    z-index: 50;
  }
  .modal {
    background: var(--surface);
    box-shadow:
      inset 1px 1px 0 var(--bevel-light-2),
      inset -1px -1px 0 var(--bevel-dark),

    width: 100%;
    max-width: 460px;
    max-height: 90vh;
    overflow: auto;
  }
  .modal.modal-wide { max-width: 580px; }
  .modal-head { padding: 3px 4px 3px 6px; }
  .modal-title { font-family: var(--sans); font-size: 17px; font-weight: bold; color: var(--titlebar-text); letter-spacing: 0; }
  .modal-head .icon-btn {
    width: 18px;
    height: 18px;
    padding: 0;
    margin-left: auto;
    align-items: center;

  .modal-sub {
    color: var(--text);

    margin: 12px 14px;
    font-family: var(--sans);

  .field { margin: 0 14px 12px; }
  .lbl {
    display: block;
    font-family: var(--sans);
    font-size: 17px;
    font-weight: bold;
    color: var(--text);
    margin-bottom: 4px;
  }
  .input {
    width: 100%;
    background: var(--surface-2);
    padding: 3px 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 20px;
  }
  .seg-group { display: flex; gap: 2px; background: transparent; padding: 0; border: none; box-shadow: none; }
  .seg-btn {
    flex: 1;
    background: var(--surface);
    color: var(--text);
    padding: 4px 12px;
    font-family: var(--sans);
    font-size: 17px;
    font-weight: bold;
    cursor: pointer;
  }
  .seg-btn.active {
    background: var(--surface-2);
    background-image: repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
  }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Ticker auto-search dropdown */
  .search-field { position: relative; }
  .search-results {
    position: absolute;
    top: calc(100% + 2px);
    left: 0;
    min-width: 100%;
    width: max-content;
    max-width: 480px;
    background: var(--surface-2);
    border: 2px solid;
    border-color: var(--bevel-dark) var(--bevel-light) var(--bevel-light) var(--bevel-dark);
    box-shadow: 3px 3px 0 rgba(0,0,0,0.35);
    z-index: 20;
    max-height: 240px;
    overflow-y: auto;
    display: none;
  }
  .search-results.open { display: block; }
  .search-result { padding: 6px 10px; cursor: pointer; border-bottom: 1px dotted var(--bevel-dark); font-family: var(--sans); display: flex; flex-direction: column; gap: 1px; }
  .search-result:last-child { border-bottom: none; }
  .search-result:hover, .search-result.active { background: var(--accent-bg); }
  .search-result-row { display: flex; align-items: center; gap: 8px; }
  .search-result-symbol { font-family: var(--mono); font-weight: bold; font-size: 19px; color: var(--accent); }
  .search-result-mkt { font-family: var(--mono); font-size: 14px; padding: 0 5px; border: 1px solid var(--bevel-darker); color: #ffffff; text-shadow: 1px 1px 0 rgba(0,0,0,0.4); }
  .search-result-mkt.kr { background: #e8b14d; color: #2a2520; text-shadow: none; }
  .search-result-mkt.us { background: #5a8794; }
  .search-result-exchange { font-family: var(--mono); font-size: 14px; color: var(--muted); margin-left: auto; }
  .search-result-name { font-size: 16px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 460px; }
  .search-loading, .search-empty { padding: 8px 10px; color: var(--muted); font-size: 17px; font-family: var(--sans); }

  /* Modal action button rows (inline-styled flex containers in templates) */
  .modal > div[style*="display: flex"] { padding: 0 14px; margin-top: 12px !important; }

  /* ============================================================
     Lots
     ============================================================ */
  .lot-header {
    display: grid;
    grid-template-columns: 64px 1fr 1fr 1fr 32px;
    gap: 6px;
    padding: 0 4px 4px;
    font-family: var(--sans);
    font-size: 16px;
    font-weight: bold;
    color: var(--muted);
  }
  .lot-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
  .lot-row { display: grid; grid-template-columns: 64px 1fr 1fr 1fr 32px; gap: 6px; align-items: center; }
  .lot-row .input { padding: 3px 6px; font-size: 19px; }
  .lot-type-btn {
    background: var(--surface);
    border: 2px solid;
    border-color: var(--bevel-light) var(--bevel-darker) var(--bevel-darker) var(--bevel-light);
    box-shadow: inset 1px 1px 0 var(--bevel-light-2), inset -1px -1px 0 var(--bevel-dark);
    border-radius: 0;
    padding: 6px 4px;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    color: #ffffff;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.45);
  }
  .lot-type-buy { background: var(--gain); }
  .lot-type-sell { background: var(--loss); }
  .lot-type-btn:active {
    border-color: var(--bevel-darker) var(--bevel-light) var(--bevel-light) var(--bevel-darker);
    box-shadow: inset 1px 1px 0 var(--bevel-dark), inset -1px -1px 0 var(--bevel-light-2);
  }
  .lot-add-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    background: var(--surface);
    color: var(--text);
    padding: 5px 12px;
    font-family: var(--sans);
    font-size: 17px;
    font-weight: bold;
    cursor: pointer;
  }
  .lot-add-btn.lot-add-sell { color: var(--loss); }
  .lot-summary {
    font-family: var(--mono);
    font-size: 19px;
    color: var(--text);
    padding: 6px 10px;
    background: var(--surface-2);
    margin: 0 14px 12px;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .lot-summary-item { display: flex; gap: 6px; align-items: center; }
  .lot-summary-label { color: var(--muted); font-family: var(--sans); font-weight: bold; font-size: 16px; }
  .lot-count-badge {
    font-family: var(--mono);
    font-size: 16px;
    color: #ffffff;
    background: var(--accent);
    padding: 0 5px;
    border: 1px solid var(--bevel-darker);
    margin-left: 6px;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
  }

  /* Profile manager */
  .profile-list { display: flex; flex-direction: column; gap: 6px; margin: 0 14px 14px; }
  .profile-row { display: flex; gap: 6px; align-items: center; position: relative; padding-left: 16px; }
  .profile-row.active::before {
    content: '►';
    font-family: var(--mono);
    font-size: 20px;
    color: var(--accent);
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
  }
  .profile-row .input { flex: 1; }
  .profile-badge {
    font-family: var(--mono);
    font-size: 16px;
    padding: 0 5px;
    color: #ffffff;
    background: var(--accent);
    border: 1px solid var(--bevel-darker);
    white-space: nowrap;
    font-weight: bold;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
  }
  .profile-add-row {
    display: flex;
    gap: 6px;
    align-items: center;
    padding: 12px 14px 0;
    margin-bottom: 6px;
    border-top: 1px solid var(--bevel-dark);
  }
  .profile-add-row .input { flex: 1; }

  /* SVG icons */
  .icon { width: 1em; height: 1em; display: inline-block; vertical-align: -0.125em; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* Holding detail sub-panel */
  .detail-panel { margin-bottom: 14px; }
  .detail-body { padding: 10px 14px 14px; }
  .detail-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 8px;
    margin-bottom: 14px;
    background: var(--surface-2);
    padding: 10px 12px;
    border: 2px solid;
    border-color: var(--bevel-dark) var(--bevel-light) var(--bevel-light) var(--bevel-dark);
  }
  .detail-stat { display: flex; flex-direction: column; gap: 2px; }
  .detail-stat-label { font-family: var(--sans); font-size: 16px; font-weight: bold; color: var(--muted); }
  .detail-stat-value { font-family: var(--mono); font-size: 19px; }
  .detail-chart-label { font-family: var(--sans); font-size: 16px; font-weight: bold; color: var(--muted); margin: 12px 0 6px; }
  .detail-chart-wrap {
    background: var(--surface-2);
    padding: 8px;
    border: 2px solid;
    border-color: var(--bevel-dark) var(--bevel-light) var(--bevel-light) var(--bevel-dark);
  }

  /* Clickable ticker name in holdings table */
  .ticker-link {
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--accent);
    text-decoration: underline;
    text-decoration-thickness: 2px;
    text-underline-offset: 2px;
    padding: 0;
    text-align: left;
  }
  .ticker-link:hover { color: var(--accent-2); }
  .ticker-link:focus-visible { outline: 1px dotted var(--text); outline-offset: 2px; }
  table.holdings tbody tr.row-selected { background: var(--accent-bg); }
  table.holdings tbody tr.row-selected:hover { background: var(--accent-bg); }

  /* Custom scrollbars (WebKit only) */
  ::-webkit-scrollbar { width: 16px; height: 16px; }
  ::-webkit-scrollbar-track { background: var(--surface-2); border: 1px solid var(--bevel-dark); }
  ::-webkit-scrollbar-thumb {
    background: var(--surface);
    border: 2px solid;
    border-color: var(--bevel-light) var(--bevel-darker) var(--bevel-darker) var(--bevel-light);
    box-shadow: inset 1px 1px 0 var(--bevel-light-2), inset -1px -1px 0 var(--bevel-dark);
  }
  ::-webkit-scrollbar-corner { background: var(--surface); }

  /* Responsive */
  @media (max-width: 1100px) {
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
    .charts-grid { grid-template-columns: 1fr; }
    .head-content { flex-direction: column; align-items: flex-start; }
    .head-right { align-items: flex-start; }
  }
  @media (max-width: 640px) {
    body { padding: 12px 8px 60px; }
    h1.title { font-size: 19px; }
    .kpi-row { grid-template-columns: 1fr 1fr; gap: 8px; }
    .kpi-value { font-size: 32px; }
    .save-status { margin-left: 0; flex-basis: 100%; }
  }
</style>
</head>

<script>
(function () {
  'use strict';

  // ---------- SVG icons (lucide subset, inlined) ----------
  const I = {
    plus: '<svg class="icon" viewBox="0 0 24 24" width="16" height="16"><path d="M12 5v14M5 12h14"/></svg>',

    refresh: '<svg class="icon" viewBox="0 0 24 24" width="14" height="14"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8M21 3v5h-5M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16M3 21v-5h5"/></svg>',
