<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Portfolio Dashboard</title>
<meta name="color-scheme" content="dark light">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Pixelify+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     90s Retro Theme — Midnight 95 (dark) / Classic Win95 (light)
     ============================================================ */
  :root {
    /* After-Hours — warm dark variant of the mid-century palette */
    --bg: #1c1814;
    --bg-grid: rgba(232, 177, 77, 0.04);
    --surface: #2d2722;
    --surface-hi: #38312a;
    --surface-2: #1f1a16;
    --titlebar: #5a8794;
    --titlebar-2: #3d6671;
    --titlebar-text: #f5efe2;
    --titlebar-inactive: #4a4438;
    --text: #ecd9a6;
    --muted: #b5a988;
    --dim: #88806a;
    --dim-2: #5a5447;
    --accent: #e8b14d;
    --accent-2: #e06a3e;
    --accent-border: #e8b14d;
    --accent-bg: rgba(232, 177, 77, 0.14);
    --gain: #b3c14d;
    --gain-bg: rgba(179, 193, 77, 0.16);
    --loss: #d94a40;
    --loss-bg: rgba(217, 74, 64, 0.14);
    --info: #7ba3b0;
    --bevel-light: #5a5447;
    --bevel-light-2: #4a443a;
    --bevel-dark: #0f0c09;
    --bevel-darker: #000000;
    --border: #0f0c09;
    --border-hi: #5a5447;
    --track: #1f1a16;
    --track-2: #2d2722;
    --track-line: #e8b14d;
    --hover: rgba(232, 177, 77, 0.08);
    --hover-2: rgba(232, 177, 77, 0.14);
    --shadow-window: 4px 4px 0 rgba(0, 0, 0, 0.5);
    --serif: 'Press Start 2P', 'VT323', 'Courier New', monospace;
    --sans: Tahoma, 'MS Sans Serif', 'Pixelify Sans', 'Segoe UI', sans-serif;
    --mono: 'VT323', 'Courier New', ui-monospace, monospace;
    color-scheme: dark;
  }
  [data-theme="light"] {
    /* Mid-Century Modern — earthy warm palette over beige */
    --bg: #e8e2d5;
    --bg-grid: rgba(74, 60, 49, 0.05);
    --surface: #f5efe2;
    --surface-hi: #faf6ec;
    --surface-2: #ecd9a6;
    --titlebar: #5a8794;
    --titlebar-2: #7ba3b0;
    --titlebar-text: #ffffff;
    --titlebar-inactive: #9c9387;
    --text: #2a2520;
    --muted: #5a5249;
    --dim: #786e63;
    --dim-2: #9c9387;
    --accent: #e06a3e;
    --accent-2: #e8b14d;
    --accent-border: #e06a3e;
    --accent-bg: rgba(224, 106, 62, 0.14);
    --gain: #8aa03a;
    --gain-bg: rgba(179, 193, 77, 0.20);
    --loss: #c13e36;
    --loss-bg: rgba(193, 62, 54, 0.12);
    --info: #5a8794;
    --bevel-light: #ffffff;
    --bevel-light-2: #faf6ec;
    --bevel-dark: #b3a896;
    --bevel-darker: #2a2520;
    --border: #2a2520;
    --border-hi: #5a5249;
    --track: #faf6ec;
    --track-2: #ecd9a6;
    --track-line: #2a2520;
    --hover: rgba(90, 135, 148, 0.10);
    --hover-2: rgba(90, 135, 148, 0.18);
    --shadow-window: 4px 4px 0 rgba(42, 37, 32, 0.30);
    color-scheme: light;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 12px;
    line-height: 1.4;
  }
  body {
    min-height: 100vh;
    padding: 20px 20px 80px;
    background-image: radial-gradient(circle, var(--bg-grid) 1px, transparent 1px);
    background-size: 4px 4px;
  }
  .root { max-width: 1400px; margin: 0 auto; }
  button { font-family: inherit; cursor: pointer; }
  input, select { font-family: inherit; }
  input::placeholder { color: var(--dim); }
  input:focus, select:focus { outline: 1px dotted var(--titlebar); outline-offset: -3px; }
  ::selection { background: var(--titlebar); color: var(--titlebar-text); }

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes blink { 50% { opacity: 0.35; } }
  .spin { animation: spin 1s linear infinite; }
  .blink { animation: blink 1s steps(2) infinite; }

  /* ============================================================
     Beveled chrome (Win95 outset/inset)
     ============================================================ */
  .bevel-out, .toolbar, .kpi, .chart-card, .holdings-section, .modal,
  header.head, .btn-primary, .btn-ghost, .btn-soft, .icon-btn, .lot-add-btn,
  .seg-btn:not(.active) {
    border: 2px solid;
    border-color: var(--bevel-light) var(--bevel-darker) var(--bevel-darker) var(--bevel-light);
    box-shadow: inset 1px 1px 0 var(--bevel-light-2), inset -1px -1px 0 var(--bevel-dark);
    border-radius: 0;
  }
  .bevel-in, .input, .profile-select, .table-wrap, .stack-card, .lot-summary,
  .bar-track, .div-track, .stack-bar, .empty, .error-bar, .seg-btn.active {
    border: 2px solid;
    border-color: var(--bevel-dark) var(--bevel-light) var(--bevel-light) var(--bevel-dark);
    box-shadow: inset 1px 1px 0 var(--bevel-darker), inset -1px -1px 0 var(--bevel-light-2);
    border-radius: 0;
  }

  /* ============================================================
     Title bars (gradient navy/magenta strip on every window)
     ============================================================ */
  .head-titlebar, .kpi-label, .chart-head, .holdings-head, .modal-head {
    background: linear-gradient(to right, var(--titlebar) 0%, var(--titlebar-2) 100%);
    color: var(--titlebar-text);
    padding: 3px 6px;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 6px;
    margin: 0;
    text-transform: none;
    letter-spacing: 0;
  }

  /* ============================================================
     Header (page title window)
     ============================================================ */
  header.head {
    display: block;
    background: var(--surface);
    padding: 0;
    margin-bottom: 14px;
  }
  .head-titlebar { font-size: 12px; }
  .head-titlebar-icon { font-size: 12px; }
  .head-content {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 18px;
    flex-wrap: wrap;
    padding: 14px 16px;
  }
  .eyebrow { font-family: var(--mono); font-size: 16px; color: var(--accent); margin-bottom: 2px; line-height: 1; }
  h1.title {
    font-family: 'Press Start 2P', 'VT323', monospace;
    font-size: 16px;
    font-weight: 400;
    line-height: 1.5;
    letter-spacing: 0;
    color: var(--text);
  }
  .head-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
  .head-meta { display: flex; align-items: center; gap: 14px; color: var(--text); font-size: 13px; font-family: var(--mono); }
  .head-meta-item { display: flex; align-items: center; gap: 6px; }

  /* ============================================================
     Profile bar (in header)
     ============================================================ */
  .profile-bar { display: flex; align-items: center; gap: 4px; }
  .profile-bar-label {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: bold;
    color: var(--text);
    margin-right: 4px;
  }
  .profile-select {
    background: var(--surface-2);
    color: var(--text);
    padding: 3px 6px;
    font-family: var(--sans);
    font-size: 12px;
    min-width: 140px;
    cursor: pointer;
  }

  /* ============================================================
     Toolbar
     ============================================================ */
  .toolbar {
    display: flex;
    gap: 4px;
    align-items: center;
    flex-wrap: wrap;
    padding: 6px 8px;
    margin-bottom: 14px;
    background: var(--surface);
  }
  .btn-primary, .btn-ghost, .btn-soft {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    color: var(--text);
    padding: 4px 12px;
    font-family: var(--sans);
    font-size: 12px;
    cursor: pointer;
    min-height: 26px;
  }
  .btn-primary { font-weight: bold; }
  .btn-primary:active, .btn-ghost:active, .btn-soft:active,
  .icon-btn:active, .lot-add-btn:active {
    border-color: var(--bevel-darker) var(--bevel-light) var(--bevel-light) var(--bevel-darker) !important;
    box-shadow: inset 1px 1px 0 var(--bevel-dark), inset -1px -1px 0 var(--bevel-light-2) !important;
  }
  .btn-primary:focus, .btn-ghost:focus, .btn-soft:focus { outline: 1px dotted var(--text); outline-offset: -5px; }
  .btn-ghost:disabled, .btn-primary:disabled, .btn-soft:disabled {
    color: var(--dim-2);
    text-shadow: 1px 1px 0 var(--bevel-light);
    cursor: not-allowed;
  }
  [data-theme="light"]:root .btn-ghost:disabled,
  [data-theme="light"] .btn-primary:disabled,
  [data-theme="light"] .btn-soft:disabled { text-shadow: 1px 1px 0 var(--bevel-light); }
  :root .btn-ghost:disabled,
  :root .btn-primary:disabled,
  :root .btn-soft:disabled { text-shadow: 1px 1px 0 #000; }
  .save-status {
    margin-left: auto;
    color: var(--muted);
    font-size: 13px;
    font-family: var(--mono);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .toolbar-divider { width: 0; border-left: 1px solid var(--bevel-dark); border-right: 1px solid var(--bevel-light); height: 22px; margin: 0 4px; }

  /* ============================================================
     KPI windows
     ============================================================ */
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
  .kpi { background: var(--surface); padding: 0; position: relative; overflow: hidden; }
  .kpi-label { letter-spacing: 0; }
  .kpi-value {
    font-family: var(--mono);
    font-size: 30px;
    font-weight: 400;
    line-height: 1;
    padding: 14px 14px 4px;
    color: var(--text);
  }
  .kpi-sub {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--muted);
    padding: 0 14px 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .kpi-accent-bar { display: none; }

  /* ============================================================
     Chart windows
     ============================================================ */
  .charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 14px; }
  .chart-card { background: var(--surface); padding: 0; min-height: 240px; display: flex; flex-direction: column; }
  .chart-icon { color: var(--titlebar-text); display: flex; }
  .chart-title { font-family: var(--sans); font-size: 12px; font-weight: bold; color: var(--titlebar-text); }
  .chart-meta { font-family: var(--mono); font-size: 12px; color: var(--titlebar-text); opacity: 0.85; margin-left: auto; font-weight: normal; }
  .chart-empty { color: var(--muted); font-size: 13px; padding: 30px 16px; text-align: center; line-height: 1.6; font-family: var(--sans); }

  /* Donut */
  .donut-wrap { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; padding: 14px; }
  .donut-svg { flex-shrink: 0; }
  .donut-center { font-family: var(--mono); }
  .legend-list { flex: 1; display: flex; flex-direction: column; gap: 6px; min-width: 160px; }
  .legend-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: 13px; }
  .legend-name { display: flex; align-items: center; gap: 8px; min-width: 0; overflow: hidden; }
  .legend-name span:last-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .legend-pct { font-family: var(--mono); font-size: 14px; font-weight: 400; flex-shrink: 0; }
  .dot { width: 10px; height: 10px; border-radius: 0; flex-shrink: 0; border: 1px solid var(--bevel-darker); }

  /* Bar chart */
  .bar-list { display: flex; flex-direction: column; gap: 7px; padding: 14px; }
  .bar-row { display: grid; grid-template-columns: minmax(80px, 150px) 1fr auto; gap: 10px; align-items: center; font-size: 13px; }
  .bar-label { font-family: var(--sans); font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar-track { position: relative; height: 18px; background: var(--track); overflow: hidden; }
  .bar-fill { position: absolute; top: 0; bottom: 0; transition: width .3s ease; }
  .bar-value { font-family: var(--mono); font-size: 13px; text-align: right; white-space: nowrap; }

  /* Diverging P/L */
  .div-list { display: flex; flex-direction: column; gap: 7px; padding: 14px; }
  .div-row { display: grid; grid-template-columns: minmax(80px, 150px) 1fr auto; gap: 10px; align-items: center; font-size: 13px; }
  .div-track { position: relative; height: 18px; background: var(--track); }
  .div-track::before { content: ''; position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: var(--track-line); z-index: 1; }
  .div-fill { position: absolute; top: 0; bottom: 0; transition: all .3s ease; }
  .div-fill.pos { background: var(--gain); left: 50%; }
  .div-fill.neg { background: var(--loss); right: 50%; }

  /* Stacked market split */
  .stack-bar { display: flex; height: 30px; overflow: hidden; margin: 14px; background: var(--track); }
  .stack-seg {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: bold;
    color: #ffffff;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
    transition: width .3s ease;
  }
  .stack-legend { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 0 14px 14px; }
  .stack-card { background: var(--surface-2); padding: 10px 12px; }
  .stack-card-label { font-family: var(--sans); font-size: 11px; font-weight: bold; color: var(--muted); margin-bottom: 6px; }
  .stack-card-value { font-family: var(--mono); font-size: 18px; font-weight: 400; margin-bottom: 4px; }
  .stack-card-sub { font-family: var(--mono); font-size: 13px; }

  /* ============================================================
     Holdings window + table
     ============================================================ */
  .holdings-section { background: var(--surface); padding: 0; }
  .holdings-title { font-family: var(--sans); font-size: 12px; font-weight: bold; color: var(--titlebar-text); }
  .holdings-meta { font-family: var(--mono); font-size: 12px; color: var(--titlebar-text); opacity: 0.85; margin-left: auto; font-weight: normal; }
  .table-wrap { overflow-x: auto; padding: 8px; background: var(--surface-2); margin: 8px; }
  table.holdings { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; min-width: 900px; background: var(--surface-2); }
  table.holdings thead th {
    text-align: left;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 0;
    color: var(--text);
    padding: 4px 8px;
    background: var(--surface);
    border: 2px solid;
    border-color: var(--bevel-light) var(--bevel-darker) var(--bevel-darker) var(--bevel-light);
    box-shadow: inset 1px 1px 0 var(--bevel-light-2), inset -1px -1px 0 var(--bevel-dark);
    user-select: none;
    cursor: pointer;
    white-space: nowrap;
  }
  table.holdings thead th.no-sort { cursor: default; }
  table.holdings thead th.sorted { color: var(--accent); }
  table.holdings tbody td { padding: 6px 10px; border-bottom: 1px dotted var(--bevel-dark); vertical-align: middle; }
  table.holdings tbody tr:last-child td { border-bottom: none; }
  table.holdings tbody tr:hover { background: var(--accent-bg); }

  .ticker-cell { display: flex; flex-direction: column; gap: 1px; }
  .ticker-display { font-family: var(--sans); font-size: 13px; font-weight: bold; max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ticker-sub { font-family: var(--mono); font-size: 13px; color: var(--muted); }
  .market-tag {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: bold;
    padding: 0 4px;
    border-radius: 0;
    border: 1px solid var(--bevel-darker);
    display: inline-block;
    color: #ffffff;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
  }
  .market-tag.kr { background: #e8b14d; color: #2a2520; text-shadow: none; }
  .market-tag.us { background: #5a8794; }
  .cat-tag { font-family: var(--sans); font-size: 11px; font-weight: bold; padding: 0 6px; border-radius: 0; border: 1px solid; display: inline-block; }
  .num { font-family: var(--mono); font-size: 14px; font-weight: 400; text-align: right; }
  .num-strong { font-family: var(--mono); font-size: 14px; font-weight: 700; text-align: right; }
  .text-right { text-align: right; }
  .text-gain { color: var(--gain); }
  .text-loss { color: var(--loss); }
  .text-muted { color: var(--muted); }
  .text-dim { color: var(--dim); }

  .icon-btn {
    background: var(--surface);
    color: var(--text);
    padding: 2px 4px;
    display: inline-flex;
    cursor: pointer;
  }
  .icon-btn:hover { background: var(--surface-hi); }
  .weight-cell { display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
  .weight-track { width: 60px; height: 8px; background: var(--track); border: 1px solid var(--bevel-dark); border-radius: 0; overflow: hidden; box-shadow: inset 1px 1px 0 var(--bevel-darker); }
  .weight-fill { height: 100%; background: var(--accent); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 36px 18px;
    background: var(--surface-2);
    margin: 10px;
    color: var(--text);
  }
  .empty-title { font-family: var(--mono); font-size: 26px; margin-bottom: 8px; color: var(--accent); }
  .empty-sub { color: var(--text); font-size: 13px; line-height: 1.6; font-family: var(--sans); }
  .empty-hint { color: var(--muted); font-size: 12px; margin-top: 14px; font-family: var(--mono); }

  /* Error / info */
  .error-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--loss-bg);
    color: var(--loss);
    font-size: 13px;
    padding: 6px 12px;
    margin-bottom: 12px;
    font-family: var(--sans);
    font-weight: bold;
  }
  .error-close { background: transparent; border: none; color: inherit; display: flex; padding: 2px; cursor: pointer; }

  /* ============================================================
     Modal (Win95 dialog box)
     ============================================================ */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    z-index: 50;
  }
  .modal {
    background: var(--surface);
    box-shadow:
      inset 1px 1px 0 var(--bevel-light-2),
      inset -1px -1px 0 var(--bevel-dark),
      var(--shadow-window);
    padding: 0 0 12px;
    width: 100%;
    max-width: 460px;
    max-height: 90vh;
    overflow: auto;
  }
  .modal.modal-wide { max-width: 580px; }
  .modal-head { padding: 3px 4px 3px 6px; }
  .modal-title { font-family: var(--sans); font-size: 12px; font-weight: bold; color: var(--titlebar-text); letter-spacing: 0; }
  .modal-head .icon-btn {
    width: 18px;
    height: 18px;
    padding: 0;
    margin-left: auto;
    align-items: center;
    justify-content: center;
  }
  .modal-sub {
    color: var(--text);
    font-size: 12px;
    line-height: 1.5;
    margin: 12px 14px;
    font-family: var(--sans);
  }
  .field { margin: 0 14px 12px; }
  .lbl {
    display: block;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: bold;
    color: var(--text);
    margin-bottom: 4px;
  }
  .input {
    width: 100%;
    background: var(--surface-2);
    padding: 3px 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
  }
  .seg-group { display: flex; gap: 2px; background: transparent; padding: 0; border: none; box-shadow: none; }
  .seg-btn {
    flex: 1;
    background: var(--surface);
    color: var(--text);
    padding: 4px 12px;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
  }
  .seg-btn.active {
    background: var(--surface-2);
    background-image: repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
  }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Modal action button rows (inline-styled flex containers in templates) */
  .modal > div[style*="display: flex"] { padding: 0 14px; margin-top: 12px !important; }

  /* ============================================================
     Lots
     ============================================================ */
  .lot-header {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 32px;
    gap: 6px;
    padding: 0 4px 4px;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: bold;
    color: var(--muted);
  }
  .lot-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
  .lot-row { display: grid; grid-template-columns: 1fr 1fr 1fr 32px; gap: 6px; align-items: center; }
  .lot-row .input { padding: 3px 6px; font-size: 13px; }
  .lot-add-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    background: var(--surface);
    color: var(--text);
    padding: 5px 12px;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
  }
  .lot-summary {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    padding: 6px 10px;
    background: var(--surface-2);
    margin: 0 14px 12px;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .lot-summary-item { display: flex; gap: 6px; align-items: center; }
  .lot-summary-label { color: var(--muted); font-family: var(--sans); font-weight: bold; font-size: 11px; }
  .lot-count-badge {
    font-family: var(--mono);
    font-size: 11px;
    color: #ffffff;
    background: var(--accent);
    padding: 0 5px;
    border: 1px solid var(--bevel-darker);
    margin-left: 6px;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
  }

  /* Profile manager */
  .profile-list { display: flex; flex-direction: column; gap: 6px; margin: 0 14px 14px; }
  .profile-row { display: flex; gap: 6px; align-items: center; position: relative; padding-left: 16px; }
  .profile-row.active::before {
    content: '►';
    font-family: var(--mono);
    font-size: 14px;
    color: var(--accent);
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
  }
  .profile-row .input { flex: 1; }
  .profile-badge {
    font-family: var(--mono);
    font-size: 11px;
    padding: 0 5px;
    color: #ffffff;
    background: var(--accent);
    border: 1px solid var(--bevel-darker);
    white-space: nowrap;
    font-weight: bold;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
  }
  .profile-add-row {
    display: flex;
    gap: 6px;
    align-items: center;
    padding: 12px 14px 0;
    margin-bottom: 6px;
    border-top: 1px solid var(--bevel-dark);
  }
  .profile-add-row .input { flex: 1; }

  /* SVG icons */
  .icon { width: 1em; height: 1em; display: inline-block; vertical-align: -0.125em; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* Custom scrollbars (WebKit only) */
  ::-webkit-scrollbar { width: 16px; height: 16px; }
  ::-webkit-scrollbar-track { background: var(--surface-2); border: 1px solid var(--bevel-dark); }
  ::-webkit-scrollbar-thumb {
    background: var(--surface);
    border: 2px solid;
    border-color: var(--bevel-light) var(--bevel-darker) var(--bevel-darker) var(--bevel-light);
    box-shadow: inset 1px 1px 0 var(--bevel-light-2), inset -1px -1px 0 var(--bevel-dark);
  }
  ::-webkit-scrollbar-corner { background: var(--surface); }

  /* Responsive */
  @media (max-width: 1100px) {
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
    .charts-grid { grid-template-columns: 1fr; }
    .head-content { flex-direction: column; align-items: flex-start; }
    .head-right { align-items: flex-start; }
  }
  @media (max-width: 640px) {
    body { padding: 12px 8px 60px; }
    h1.title { font-size: 13px; }
    .kpi-row { grid-template-columns: 1fr 1fr; gap: 8px; }
    .kpi-value { font-size: 22px; }
    .save-status { margin-left: 0; flex-basis: 100%; }
  }
</style>
</head>
<body>
<div class="root" id="app"></div>
<input type="file" id="import-file" accept="application/json,.json" style="display:none">

<script>
(function () {
  'use strict';

  // ---------- SVG icons (lucide subset, inlined) ----------
  const I = {
    plus: '<svg class="icon" viewBox="0 0 24 24" width="16" height="16"><path d="M12 5v14M5 12h14"/></svg>',
    trash: '<svg class="icon" viewBox="0 0 24 24" width="13" height="13"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
    refresh: '<svg class="icon" viewBox="0 0 24 24" width="14" height="14"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8M21 3v5h-5M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16M3 21v-5h5"/></svg>',
    close: '<svg class="icon" viewBox="0 0 24 24" width="16" height="16"><path d="M18 6 6 18M6 6l12 12"/></svg>',
    closeS: '<svg class="icon" viewBox="0 0 24 24" width="14" height="14"><path d="M18 6 6 18M6 6l12 12"/></svg>',
    spinner: '<svg class="icon spin" viewBox="0 0 24 24" width="14" height="14"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>',
    wallet: '<svg class="icon" viewBox="0 0 24 24" width="14" height="14"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4M3 5v14a2 2 0 0 0 2 2h16v-5M16 12h6v4h-6a2 2 0 0 1 0-4z"/></svg>',
    up: '<svg class="icon" viewBox="0 0 24 24" width="14" height="14"><path d="M7 17 17 7M7 7h10v10"/></svg>',
    down: '<svg class="icon" viewBox="0 0 24 24" width="14" height="14"><path d="M7 7l10 10M17 7v10H7"/></svg>',
    pencil: '<svg class="icon" viewBox="0 0 24 24" width="13" height="13"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/></svg>',
    pie: '<svg class="icon" viewBox="0 0 24 24" width="14" height="14"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>',
    bar: '<svg class="icon" viewBox="0 0 24 24" width="14" height="14"><path d="M3 3v18h18M7 16V8m5 8V5m5 11v-6"/></svg>',
    scale: '<svg class="icon" viewBox="0 0 24 24" width="14" height="14"><path d="M16 16l3-8 3 8M2 16l3-8 3 8M7 21h10M12 3v18M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/></svg>',
    globe: '<svg class="icon" viewBox="0 0 24 24" width="14" height="14"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 0 1 0 20M12 2a15 15 0 0 0 0 20"/></svg>',
    download: '<svg class="icon" viewBox="0 0 24 24" width="14" height="14"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>',
    upload: '<svg class="icon" viewBox="0 0 24 24" width="14" height="14"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>',
    coins: '<svg class="icon" viewBox="0 0 24 24" width="14" height="14"><circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18M7 6h1v4M16.71 13.88l.71.71-2.82 2.82"/></svg>',
    trend: '<svg class="icon" viewBox="0 0 24 24" width="14" height="14"><path d="M3 17l6-6 4 4 8-8M14 7h7v7"/></svg>',
    hash: '<svg class="icon" viewBox="0 0 24 24" width="14" height="14"><path d="M4 9h16M4 15h16M10 3 8 21M16 3l-2 18"/></svg>',
    sortUp: '<svg class="icon" viewBox="0 0 24 24" width="10" height="10"><path d="M7 14l5-5 5 5"/></svg>',
    sortDown: '<svg class="icon" viewBox="0 0 24 24" width="10" height="10"><path d="M7 10l5 5 5-5"/></svg>',
    sun: '<svg class="icon" viewBox="0 0 24 24" width="14" height="14"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>',
    moon: '<svg class="icon" viewBox="0 0 24 24" width="14" height="14"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>',
    users: '<svg class="icon" viewBox="0 0 24 24" width="14" height="14"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/><circle cx="9" cy="7" r="4"/></svg>',
  };

  // ---------- design tokens ----------
  // Mid-century modern palette (mustard, brick, teal, cream, orange, olive)
  const CAT_COLORS = ['#e8b14d', '#c13e36', '#5a8794', '#ecd9a6', '#e06a3e', '#b3c14d', '#7ba3b0', '#a87545', '#d4a06f', '#8aa03a'];
  const UNCATEGORIZED = 'Uncategorized';
  const SUGGESTED = ['Tech', 'Semiconductors', 'Finance', 'Healthcare', 'Energy', 'Consumer', 'Industrial', 'ETF', 'Dividend', 'Growth'];
  const STORAGE_KEY = 'portfolio.v2';
  const STORAGE_KEY_V1 = 'portfolio.v1';
  const THEME_KEY = 'portfolio.theme';
  const KR_COLOR = '#e8b14d';
  const US_COLOR = '#5a8794';

  // ---------- formatters ----------
  const fmtKRW = (n) => '₩' + Math.round(n).toLocaleString('en-US');
  const fmtUSD = (n) => '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const fmtMoney = (n, c) => (c === 'KRW' ? fmtKRW(n) : fmtUSD(n));
  const fmtKRWcompact = (n) => {
    const abs = Math.abs(n);
    if (abs >= 1e8) return '₩' + (n / 1e8).toFixed(2) + 'B';
    if (abs >= 1e6) return '₩' + (n / 1e6).toFixed(2) + 'M';
    if (abs >= 1e3) return '₩' + (n / 1e3).toFixed(1) + 'K';
    return '₩' + Math.round(n).toLocaleString('en-US');
  };
  const fmtUSDcompact = (n) => {
    const abs = Math.abs(n);
    if (abs >= 1e9) return '$' + (n / 1e9).toFixed(2) + 'B';
    if (abs >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
    if (abs >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'K';
    return '$' + Math.round(n).toLocaleString('en-US');
  };
  const fmtPct = (n) => (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
  const fmtDate = (iso) => {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleString('en-US', { month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit' });
  };
  const escape = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

  // ---------- state ----------
  const state = {
    profiles: [],
    activeProfileId: null,
    // Mirrors of the active profile, kept in sync via syncFromActive/syncToActive
    holdings: [],
    fxRate: null,
    lastUpdated: null,
    // UI state
    updating: false,
    saveStatus: 'idle',
    error: null,
    info: null,
    dialog: null,
    sort: { key: 'value', dir: 'desc' },
    theme: 'dark',
  };

  // ---------- id helpers ----------
  function makeProfileId() {
    return 'p_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }
  function makeHoldingId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }
  function makeLotId() {
    return 'l_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
  }

  // ---------- lot math ----------
  // Aggregates a list of buy lots into total shares, total cost, and average cost.
  function lotsTotals(lots) {
    let shares = 0, cost = 0;
    for (const l of (lots || [])) {
      const s = Number(l.shares) || 0;
      const p = Number(l.price) || 0;
      if (s > 0 && p > 0) { shares += s; cost += s * p; }
    }
    return { shares, cost, avgCost: shares > 0 ? cost / shares : 0 };
  }

  // Convert any version of a holding payload (v1, v2 single-buy, v3 with lots) into the
  // canonical v3 shape. Idempotent — safe to run on already-migrated data.
  function migrateHolding(h) {
    if (!h || typeof h !== 'object') return null;
    const market = h.market === 'KR' || h.market === 'US' ? h.market : null;
    if (!market) return null;
    const ticker = typeof h.ticker === 'string' ? h.ticker.toUpperCase() : null;
    if (!ticker) return null;

    let lots;
    if (Array.isArray(h.lots) && h.lots.length > 0) {
      lots = h.lots
        .filter(l => Number(l.shares) > 0 && Number(l.price) > 0)
        .map(l => ({
          id: l.id || makeLotId(),
          shares: Number(l.shares),
          price: Number(l.price),
          date: l.date || new Date().toISOString().slice(0, 10),
        }));
    } else if (Number(h.shares) > 0 && Number(h.buyPrice) > 0) {
      lots = [{
        id: makeLotId(),
        shares: Number(h.shares),
        price: Number(h.buyPrice),
        date: h.buyDate || new Date().toISOString().slice(0, 10),
      }];
    } else {
      return null;
    }
    if (lots.length === 0) return null;

    return {
      id: h.id || makeHoldingId(),
      ticker,
      name: h.name || '',
      market,
      category: h.category || '',
      lots,
      currentPrice: typeof h.currentPrice === 'number' ? h.currentPrice : null,
      currency: h.currency || (market === 'KR' ? 'KRW' : 'USD'),
      lastPriceAt: h.lastPriceAt || null,
    };
  }
  function isValidHolding(h) { return migrateHolding(h) !== null; }

  // ---------- profile helpers ----------
  function newProfile(name) {
    return { id: makeProfileId(), name: name || 'Default', holdings: [], fxRate: null, lastUpdated: null };
  }
  function getActive() {
    return state.profiles.find(p => p.id === state.activeProfileId) || state.profiles[0];
  }
  function syncFromActive() {
    const p = getActive();
    if (!p) return;
    state.activeProfileId = p.id;
    state.holdings = p.holdings;
    state.fxRate = p.fxRate;
    state.lastUpdated = p.lastUpdated;
  }
  function syncToActive() {
    const p = getActive();
    if (!p) return;
    p.holdings = state.holdings;
    p.fxRate = state.fxRate;
    p.lastUpdated = state.lastUpdated;
  }

  // ---------- persistence (localStorage) ----------
  function hasLocalStorage() {
    try {
      const k = '__test__';
      localStorage.setItem(k, '1');
      localStorage.removeItem(k);
      return true;
    } catch (_) { return false; }
  }

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const d = JSON.parse(raw);
        if (Array.isArray(d.profiles) && d.profiles.length > 0) {
          state.profiles = d.profiles.map(p => ({
            id: p.id || makeProfileId(),
            name: p.name || 'Profile',
            holdings: (Array.isArray(p.holdings) ? p.holdings : []).map(migrateHolding).filter(Boolean),
            fxRate: typeof p.fxRate === 'number' ? p.fxRate : null,
            lastUpdated: p.lastUpdated || null,
          }));
          state.activeProfileId = (d.activeProfileId && state.profiles.some(p => p.id === d.activeProfileId))
            ? d.activeProfileId : state.profiles[0].id;
          syncFromActive();
          return;
        }
      }
      // Migrate from v1 single-portfolio format
      const rawV1 = localStorage.getItem(STORAGE_KEY_V1);
      if (rawV1) {
        const d1 = JSON.parse(rawV1);
        const p = newProfile('Default');
        p.holdings = (Array.isArray(d1.holdings) ? d1.holdings : []).map(migrateHolding).filter(Boolean);
        p.fxRate = typeof d1.fxRate === 'number' ? d1.fxRate : null;
        p.lastUpdated = d1.lastUpdated || null;
        state.profiles = [p];
        state.activeProfileId = p.id;
        syncFromActive();
        save();
        return;
      }
    } catch (e) {
      console.error('Load failed:', e);
    }
    // Fresh start
    state.profiles = [newProfile('Default')];
    state.activeProfileId = state.profiles[0].id;
    syncFromActive();
  }

  function save() {
    try {
      syncToActive();
      const data = JSON.stringify({
        version: 2,
        activeProfileId: state.activeProfileId,
        profiles: state.profiles,
      });
      localStorage.setItem(STORAGE_KEY, data);
      state.saveStatus = 'saved';
      render();
      setTimeout(() => { if (state.saveStatus === 'saved') { state.saveStatus = 'idle'; render(); } }, 1500);
    } catch (e) {
      console.error('Save failed:', e);
      state.saveStatus = 'error';
      state.error = 'Save failed: ' + e.message;
      render();
    }
  }

  function loadTheme() {
    try {
      const t = localStorage.getItem(THEME_KEY);
      if (t === 'light' || t === 'dark') return t;
    } catch (_) {}
    return 'dark';
  }
  function applyTheme() {
    document.documentElement.dataset.theme = state.theme;
  }
  function toggleTheme() {
    state.theme = state.theme === 'dark' ? 'light' : 'dark';
    applyTheme();
    try { localStorage.setItem(THEME_KEY, state.theme); } catch (_) {}
    render();
  }

  // ---------- profile actions ----------
  function switchProfile(id) {
    if (!id || id === state.activeProfileId) return;
    syncToActive();
    state.activeProfileId = id;
    syncFromActive();
    state.error = null;
    save();
  }
  function addProfile(name) {
    const trimmed = (name || '').trim();
    if (!trimmed) return;
    syncToActive();
    const p = newProfile(trimmed);
    state.profiles.push(p);
    state.activeProfileId = p.id;
    syncFromActive();
    save();
  }
  function renameProfile(id, name) {
    const trimmed = (name || '').trim();
    if (!trimmed) return;
    const p = state.profiles.find(x => x.id === id);
    if (p) { p.name = trimmed; save(); }
  }
  function deleteProfile(id) {
    if (state.profiles.length <= 1) { state.error = 'At least one profile is required.'; render(); return; }
    const p = state.profiles.find(x => x.id === id);
    if (!p) return;
    if (!confirm(`Delete profile "${p.name}" and all its holdings? This cannot be undone.`)) return;
    state.profiles = state.profiles.filter(x => x.id !== id);
    if (state.activeProfileId === id) {
      state.activeProfileId = state.profiles[0].id;
      syncFromActive();
    }
    save();
  }

  // ---------- backup / restore (file based) ----------
  function exportJSON() {
    try {
      syncToActive();
      const payload = {
        version: 2,
        exportedAt: new Date().toISOString(),
        activeProfileId: state.activeProfileId,
        profiles: state.profiles,
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const today = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = `portfolio-${today}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      const total = state.profiles.reduce((s, p) => s + p.holdings.length, 0);
      state.info = `Backup downloaded (${state.profiles.length} profile${state.profiles.length === 1 ? '' : 's'}, ${total} holdings)`;
      render();
      setTimeout(() => { if (state.info) { state.info = null; render(); } }, 2500);
    } catch (e) {
      state.error = 'Backup failed: ' + e.message;
      render();
    }
  }

  function importJSON(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const d = JSON.parse(ev.target.result);
        if (Array.isArray(d.profiles)) {
          // v2 format — replace all profiles
          const profiles = d.profiles.map(p => ({
            id: p.id || makeProfileId(),
            name: p.name || 'Profile',
            holdings: (Array.isArray(p.holdings) ? p.holdings : []).map(migrateHolding).filter(Boolean),
            fxRate: typeof p.fxRate === 'number' ? p.fxRate : null,
            lastUpdated: p.lastUpdated || null,
          })).filter(p => p.id);
          if (profiles.length === 0) throw new Error('No valid profiles in file');
          const totalH = profiles.reduce((s, p) => s + p.holdings.length, 0);
          if (!confirm(
            `Restore ${profiles.length} profile(s) with ${totalH} holdings?\n` +
            `All current profiles (${state.profiles.length}) will be replaced.`
          )) return;
          state.profiles = profiles;
          state.activeProfileId = (d.activeProfileId && profiles.some(p => p.id === d.activeProfileId))
            ? d.activeProfileId : profiles[0].id;
          syncFromActive();
          state.error = null;
          save();
          state.info = `Restored ${profiles.length} profile(s)`;
          render();
          setTimeout(() => { if (state.info) { state.info = null; render(); } }, 2500);
        } else if (Array.isArray(d.holdings)) {
          // v1 format — import as a new profile
          const valid = d.holdings.map(migrateHolding).filter(Boolean);
          if (valid.length === 0) throw new Error('No valid holdings in file');
          const baseName = 'Imported';
          let name = baseName;
          let i = 2;
          while (state.profiles.some(p => p.name === name)) name = baseName + ' ' + (i++);
          if (!confirm(`Import ${valid.length} holdings as a new profile "${name}"?`)) return;
          syncToActive();
          const p = newProfile(name);
          p.holdings = valid;
          p.fxRate = typeof d.fxRate === 'number' ? d.fxRate : null;
          p.lastUpdated = d.lastUpdated || null;
          state.profiles.push(p);
          state.activeProfileId = p.id;
          syncFromActive();
          state.error = null;
          save();
          state.info = `Imported ${valid.length} holdings into "${name}"`;
          render();
          setTimeout(() => { if (state.info) { state.info = null; render(); } }, 2500);
        } else {
          throw new Error('Unrecognized backup format');
        }
      } catch (e) {
        state.error = 'Restore failed: ' + e.message;
        render();
      }
    };
    reader.onerror = () => { state.error = 'Could not read file'; render(); };
    reader.readAsText(file);
  }

  // ---------- holding actions ----------
  function addOrUpdate(data, editId) {
    if (editId) {
      state.holdings = state.holdings.map(h => h.id === editId ? { ...h, ...data } : h);
    } else {
      state.holdings = [...state.holdings, {
        id: makeHoldingId(),
        ticker: data.ticker,
        name: data.name,
        market: data.market,
        category: data.category,
        lots: data.lots,
        currentPrice: null,
        currency: data.market === 'KR' ? 'KRW' : 'USD',
        lastPriceAt: null,
      }];
    }
    state.dialog = null;
    save();
  }

  function appendLotsToHolding(holdingId, newLots) {
    state.holdings = state.holdings.map(h => h.id === holdingId
      ? { ...h, lots: [...h.lots, ...newLots.map(l => ({ ...l, id: l.id || makeLotId() }))] }
      : h);
    state.dialog = null;
    save();
  }

  function remove(id) {
    const h = state.holdings.find(x => x.id === id);
    if (h && !confirm(`Delete ${h.ticker}${h.name ? ' (' + h.name + ')' : ''}?`)) return;
    state.holdings = state.holdings.filter(h => h.id !== id);
    save();
  }

  function submitPrices() {
    const now = new Date().toISOString();
    const updated = state.holdings.map(h => {
      const input = document.querySelector(`[data-price-id="${h.id}"]`);
      const v = parseFloat(input?.value);
      if (!isNaN(v) && v > 0) {
        return { ...h, currentPrice: v, currency: h.market === 'KR' ? 'KRW' : 'USD', lastPriceAt: now };
      }
      return h;
    });
    const fxInput = document.getElementById('manual-fx');
    const fx = parseFloat(fxInput?.value);
    state.holdings = updated;
    if (!isNaN(fx) && fx > 0) state.fxRate = fx;
    state.lastUpdated = now;
    state.dialog = null;
    save();
  }

  // ---------- price fetch ----------
  function yahooSymbol(h) {
    if (h.market === 'US') return h.ticker;
    return h.ticker + '.KS';
  }

  const PROXIES = [
    (u) => 'https://corsproxy.io/?' + encodeURIComponent(u),
    (u) => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
    (u) => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u),
    (u) => 'https://thingproxy.freeboard.io/fetch/' + u,
  ];

  function withTimeout(promise, ms) {
    return Promise.race([
      promise,
      new Promise((_, rej) => setTimeout(() => rej(new Error('Timeout ' + ms + 'ms')), ms)),
    ]);
  }

  async function fetchYahoo(symbol) {
    const url = 'https://query1.finance.yahoo.com/v8/finance/chart/' + encodeURIComponent(symbol);
    let lastErr;
    for (let i = 0; i < PROXIES.length; i++) {
      try {
        const proxiedUrl = PROXIES[i](url);
        const r = await withTimeout(fetch(proxiedUrl), 10000);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const data = await r.json();
        const meta = data?.chart?.result?.[0]?.meta;
        if (meta && typeof meta.regularMarketPrice === 'number') {
          return { price: meta.regularMarketPrice, currency: meta.currency };
        }
        throw new Error('No price in response');
      } catch (e) {
        lastErr = e;
      }
    }
    throw lastErr || new Error('All proxies failed');
  }

  async function fetchFx() {
    try {
      const r = await withTimeout(fetch('https://api.exchangerate-api.com/v4/latest/USD'), 8000);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const d = await r.json();
      if (d?.rates?.KRW) return d.rates.KRW;
      throw new Error('No FX data');
    } catch (e) {
      try {
        const fx = await fetchYahoo('USDKRW=X');
        return fx.price;
      } catch (e2) {
        return null;
      }
    }
  }

  async function updatePrices() {
    if (state.holdings.length === 0) return;
    state.updating = true; state.error = null; render();
    try {
      const results = await Promise.allSettled(
        state.holdings.map(async (h) => {
          try {
            return { id: h.id, ...(await fetchYahoo(yahooSymbol(h))) };
          } catch (e) {
            if (h.market === 'KR') {
              try {
                return { id: h.id, ...(await fetchYahoo(h.ticker + '.KQ')) };
              } catch (e2) { throw e2; }
            }
            throw e;
          }
        })
      );
      const fx = await fetchFx();
      const now = new Date().toISOString();
      const failed = [];
      state.holdings = state.holdings.map((h, i) => {
        const r = results[i];
        if (r.status === 'fulfilled' && typeof r.value.price === 'number') {
          return { ...h, currentPrice: r.value.price, currency: r.value.currency, lastPriceAt: now };
        }
        failed.push(`${h.ticker} (${r.reason?.message || 'unknown error'})`);
        return h;
      });
      if (fx) state.fxRate = fx;
      state.lastUpdated = now;
      if (failed.length) {
        state.error = 'Update failed for: ' + failed.join(' · ') + '. Try again later or check console.';
      }
      save();
    } catch (e) {
      console.error('[update] failed:', e);
      state.error = 'Price update failed: ' + (e?.message || 'unknown error');
    } finally {
      state.updating = false;
      render();
    }
  }

  // ---------- derived metrics ----------
  function derive() {
    const holdings = state.holdings;
    const fx = state.fxRate;
    const hasKR = holdings.some(h => h.market === 'KR');
    const hasUS = holdings.some(h => h.market === 'US');
    const allUS = holdings.length > 0 && !hasKR;
    const baseCcy = allUS ? 'USD' : 'KRW';
    const needsFx = hasKR && hasUS;
    const fxOk = !needsFx || (fx && fx > 0);

    const toBase = (v, market) => {
      if (baseCcy === 'KRW') return market === 'KR' ? v : v * (fx || 0);
      return market === 'US' ? v : v / (fx || 1);
    };

    const items = holdings.map(h => {
      const t = lotsTotals(h.lots);
      const shares = t.shares;
      const cost = t.cost;
      const avgCost = t.avgCost;
      const lotCount = (h.lots || []).length;
      const hasPrice = h.currentPrice != null;
      const value = hasPrice ? shares * h.currentPrice : null;
      const pnl = hasPrice ? value - cost : null;
      const pct = hasPrice && cost > 0 ? (pnl / cost) * 100 : null;
      const cur = h.market === 'KR' ? 'KRW' : 'USD';
      const costBase = toBase(cost, h.market);
      const valueBase = hasPrice ? toBase(value, h.market) : costBase;
      const pnlBase = hasPrice ? valueBase - costBase : 0;
      return { h, shares, avgCost, lotCount, cost, hasPrice, value, pnl, pct, cur, costBase, valueBase, pnlBase };
    });

    const tCost = items.reduce((s, it) => s + it.costBase, 0);
    const tValue = items.reduce((s, it) => s + it.valueBase, 0);
    const tPnl = tValue - tCost;
    const tPct = tCost ? (tPnl / tCost) * 100 : 0;
    const anyPrice = items.some(it => it.hasPrice);

    const krItems = items.filter(it => it.h.market === 'KR');
    const usItems = items.filter(it => it.h.market === 'US');
    const krCost = krItems.reduce((s, it) => s + it.cost, 0);
    const krValue = krItems.reduce((s, it) => s + (it.hasPrice ? it.value : it.cost), 0);
    const usCost = usItems.reduce((s, it) => s + it.cost, 0);
    const usValue = usItems.reduce((s, it) => s + (it.hasPrice ? it.value : it.cost), 0);

    const byCat = {};
    items.forEach(it => {
      const cat = (it.h.category || '').trim() || UNCATEGORIZED;
      if (!byCat[cat]) byCat[cat] = { name: cat, value: 0, cost: 0, pnl: 0 };
      byCat[cat].value += it.valueBase;
      byCat[cat].cost += it.costBase;
      byCat[cat].pnl += it.pnlBase;
    });
    const catList = Object.values(byCat).sort((a, b) => b.value - a.value);

    const catOrder = [];
    const seen = new Set();
    holdings.forEach(h => {
      const c = (h.category || '').trim() || UNCATEGORIZED;
      if (!seen.has(c)) { seen.add(c); catOrder.push(c); }
    });
    const colorFor = (cat) => CAT_COLORS[Math.max(0, catOrder.indexOf(cat)) % CAT_COLORS.length];

    return {
      items, holdings, baseCcy, needsFx, fxOk, anyPrice,
      tCost, tValue, tPnl, tPct,
      krCost, krValue, krCount: krItems.length,
      usCost, usValue, usCount: usItems.length,
      catList, colorFor,
    };
  }

  // Display name: prefer human name, fall back to ticker.
  const displayName = (h) => h.name && h.name.trim() ? h.name : h.ticker;

  // ---------- charts ----------
  function donutSVG(data, size = 160) {
    const cx = size / 2, cy = size / 2, rOuter = size * 0.46, rInner = size * 0.30;
    const total = data.reduce((s, d) => s + d.value, 0);
    if (total === 0) return '';
    let angle = -Math.PI / 2;
    const gap = data.length > 1 ? 0.02 : 0;
    const paths = data.map((d) => {
      const slice = (d.value / total) * Math.PI * 2 - gap;
      const start = angle + gap / 2;
      const end = start + slice;
      angle += (d.value / total) * Math.PI * 2;
      const large = slice > Math.PI ? 1 : 0;
      const x1 = cx + rOuter * Math.cos(start), y1 = cy + rOuter * Math.sin(start);
      const x2 = cx + rOuter * Math.cos(end), y2 = cy + rOuter * Math.sin(end);
      const x3 = cx + rInner * Math.cos(end), y3 = cy + rInner * Math.sin(end);
      const x4 = cx + rInner * Math.cos(start), y4 = cy + rInner * Math.sin(start);
      const path = ['M', x1, y1, 'A', rOuter, rOuter, 0, large, 1, x2, y2,
        'L', x3, y3, 'A', rInner, rInner, 0, large, 0, x4, y4, 'Z'].join(' ');
      return `<path d="${path}" fill="${d.color}"/>`;
    }).join('');
    return `<svg class="donut-svg" viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">${paths}</svg>`;
  }

      </button>
      <span class="toolbar-divider"></span>

      <button class="btn-soft" data-act="import-json" title="Restore from a JSON file">${I.upload} Restore</button>

  function tplKPI(D) {
    if (state.holdings.length === 0) return '';
    const ccy = D.baseCcy;
    const fmt = ccy === 'KRW' ? fmtKRW : fmtUSD;

    const valueDisplay = D.fxOk ? fmt(D.tValue) : '<span class="text-dim">—</span>';
    const costDisplay = fmt(D.tCost);
    const pnlSign = D.tPnl >= 0;
    const pnlDisplay = D.fxOk && D.anyPrice
      ? `<span style="color: ${pnlSign ? 'var(--gain)' : 'var(--loss)'}">${pnlSign ? '+' : '−'}${fmt(Math.abs(D.tPnl))}</span>`
      : '<span class="text-dim">—</span>';
    const pctDisplay = D.fxOk && D.anyPrice
      ? `<span style="color: ${pnlSign ? 'var(--gain)' : 'var(--loss)'}">${pnlSign ? I.up : I.down}${fmtPct(D.tPct)}</span>`
      : '<span class="text-dim">—</span>';

    const pnlBar = !D.anyPrice || !D.fxOk ? 'muted' : pnlSign ? 'gain' : 'loss';

    return `<div class="kpi-row">
      <div class="kpi">
        <div class="kpi-accent-bar"></div>

  function chartCard(icon, title, meta, body) {
