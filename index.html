      <button class="btn-ghost" data-act="open-prices" ${empty ? 'disabled' : ''}>${I.pencil} Edit Prices</button>
      <button class="btn-ghost" data-act="update-prices" ${dis ? 'disabled' : ''}>
        ${state.updating ? I.spinner : I.refresh}${state.updating ? 'Updating…' : 'Auto Update'}
      </button>
      <button class="btn-ghost" data-act="open-value-chart" ${empty ? 'disabled' : ''}>${I.trend} Value Chart</button>
      <span class="toolbar-divider"></span>
      ${filterBtns}
      <span class="toolbar-divider"></span>
      <button class="btn-soft" data-act="export-json" title="Download all profiles as JSON">${I.download} Backup</button>
      <button class="btn-soft" data-act="import-json" title="Restore from a JSON file">${I.upload} Restore</button>
      <span class="toolbar-divider"></span>
      ${ccyBtn}
      ${themeBtn}
      <div class="save-status">${status}</div>
    </div>`;
  }

  function tplKPI(D) {
    if (D.holdings.length === 0) return '';
    const ccy = D.baseCcy;
    const fmt = ccy === 'KRW' ? fmtKRW : fmtUSD;

    const valueDisplay = D.fxOk ? fmt(D.tValue) : '<span class="text-dim">—</span>';
    const costDisplay = fmt(D.tCost);
    const pnlSign = D.tPnl >= 0;
    const pnlDisplay = D.fxOk && D.anyPrice
      ? `<span style="color: ${pnlSign ? 'var(--gain)' : 'var(--loss)'}">${pnlSign ? '+' : '−'}${fmt(Math.abs(D.tPnl))}</span>`
      : '<span class="text-dim">—</span>';
    const pctDisplay = D.fxOk && D.anyPrice
      ? `<span style="color: ${pnlSign ? 'var(--gain)' : 'var(--loss)'}">${pnlSign ? I.up : I.down}${fmtPct(D.tPct)}</span>`
      : '<span class="text-dim">—</span>';

    const pnlBar = !D.anyPrice || !D.fxOk ? 'muted' : pnlSign ? 'gain' : 'loss';

    return `<div class="kpi-row">
      <div class="kpi">
        <div class="kpi-accent-bar"></div>
        <div class="kpi-label">${I.wallet} Total Value</div>
        <div class="kpi-value">${valueDisplay}</div>
        <div class="kpi-sub text-muted">Cost ${costDisplay}</div>
      </div>
      <div class="kpi">
        <div class="kpi-accent-bar ${pnlBar}"></div>
        <div class="kpi-label">${I.coins} P/L</div>
        <div class="kpi-value">${pnlDisplay}</div>
        <div class="kpi-sub text-muted">In ${ccy}</div>
      </div>
      <div class="kpi">
        <div class="kpi-accent-bar ${pnlBar}"></div>
        <div class="kpi-label">${I.trend} Return</div>
        <div class="kpi-value">${pctDisplay}</div>
        <div class="kpi-sub text-muted">${D.anyPrice ? 'Value / Cost' : 'Run price update'}</div>
      </div>
      <div class="kpi">
        <div class="kpi-accent-bar"></div>
        <div class="kpi-label">${I.hash} Holdings</div>
        <div class="kpi-value">${state.holdings.length}<span style="font-size: 26px; color: var(--muted); margin-left: 4px;">total</span></div>
        <div class="kpi-sub text-muted">KR ${D.krCount} · US ${D.usCount}</div>
      </div>
    </div>`;
  }

  function chartCard(icon, title, meta, body) {
    return `<div class="chart-card">
      <div class="chart-head">
        <span class="chart-icon">${icon}</span>
        <h3 class="chart-title">${title}</h3>
        ${meta ? `<span class="chart-meta">${meta}</span>` : ''}
      </div>
      ${body}
    </div>`;
  }

  function tplChartAllocation(D) {
    const title = 'Allocation by Category';
    if (!D.fxOk) {
      return chartCard(I.pie, title, '', `<div class="chart-empty">FX rate required for mixed KR/US portfolios.<br>Run <span style="color: var(--accent);">Auto Update</span> or <span style="color: var(--accent);">Edit Prices</span>.</div>`);
    }
    const onlyUncat = D.catList.length === 1 && D.catList[0].name === UNCATEGORIZED;
    if (onlyUncat) {
      return chartCard(I.pie, title, '', `<div class="chart-empty">Set categories on your holdings to see allocation.<br>Use the ${I.pencil} button in the table below.</div>`);
    }
    const total = D.catList.reduce((s, c) => s + c.value, 0);
    const data = D.catList.map(c => ({ ...c, color: D.colorFor(c.name), pct: total ? (c.value / total) * 100 : 0 }));
    const fmt = D.baseCcy === 'KRW' ? fmtKRWcompact : fmtUSDcompact;
    const meta = `${D.baseCcy} · ${D.anyPrice ? 'market value' : 'cost basis'}`;
    const body = `<div class="donut-wrap">
      <div style="position: relative; width: 180px; height: 180px;">
        ${donutSVG(data, 180)}
        <div style="position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none;">
          <div style="font-family: var(--mono); font-size: 14px; color: var(--muted); letter-spacing: 0.08em;">TOTAL</div>
          <div class="donut-center" style="font-size: 20px; font-weight: 600; margin-top: 2px;">${fmt(total)}</div>
        </div>
      </div>
      <div class="legend-list">
        ${data.map(c => `
          <div class="legend-row">
            <div class="legend-name">
              <span class="dot" style="background: ${c.color};"></span>
              <span>${escape(c.name)}</span>
            </div>
            <div class="legend-pct">${c.pct.toFixed(1)}%</div>
          </div>`).join('')}
      </div>
    </div>`;
    return chartCard(I.pie, title, meta, body);
  }

  function tplChartTopHoldings(D) {
    const title = 'Top Holdings';
    if (!D.fxOk) {
      return chartCard(I.bar, title, '', `<div class="chart-empty">FX rate required.</div>`);
    }
    if (D.items.length === 0) {
      return chartCard(I.bar, title, '', `<div class="chart-empty">No data</div>`);
    }
    const sorted = [...D.items].sort((a, b) => b.valueBase - a.valueBase).slice(0, 10);
    const max = sorted[0].valueBase || 1;
    const fmt = D.baseCcy === 'KRW' ? fmtKRWcompact : fmtUSDcompact;
    const total = D.tValue || 1;
    const meta = `Top ${sorted.length} · ${D.baseCcy}`;
    const body = `<div class="bar-list">
      ${sorted.map(it => {
        const pct = (it.valueBase / max) * 100;
        const ofTotal = (it.valueBase / total) * 100;
        const cat = (it.h.category || '').trim() || UNCATEGORIZED;
        const color = D.colorFor(cat);
        const label = displayName(it.h);
        return `<div class="bar-row">
          <div class="bar-label" title="${escape(label)} (${escape(it.h.ticker)})">${escape(label)}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width: ${pct.toFixed(1)}%; background: ${color};"></div>
          </div>
          <div class="bar-value">${fmt(it.valueBase)} <span class="text-dim" style="font-size: 14px;">(${ofTotal.toFixed(1)}%)</span></div>
        </div>`;
      }).join('')}
    </div>`;
    return chartCard(I.bar, title, meta, body);
  }

  function tplChartPnL(D) {
    const title = 'P/L by Holding';
    if (!D.anyPrice) {
      return chartCard(I.scale, title, '', `<div class="chart-empty">No current prices yet.<br>Run <span style="color: var(--accent);">Auto Update</span> to fetch them.</div>`);
    }
    if (!D.fxOk) {
      return chartCard(I.scale, title, '', `<div class="chart-empty">FX rate required.</div>`);
    }
    const withPrice = D.items.filter(it => it.hasPrice);
    if (withPrice.length === 0) {
      return chartCard(I.scale, title, '', `<div class="chart-empty">No data to display.</div>`);
    }
    const sorted = [...withPrice].sort((a, b) => Math.abs(b.pnlBase) - Math.abs(a.pnlBase)).slice(0, 10);
    const max = Math.max(...sorted.map(it => Math.abs(it.pnlBase)), 1);
    const fmt = D.baseCcy === 'KRW' ? fmtKRWcompact : fmtUSDcompact;
    const meta = `Top ${sorted.length} · ${D.baseCcy}`;
    const body = `<div class="div-list">
      ${sorted.map(it => {
        const w = (Math.abs(it.pnlBase) / max) * 50;
        const pos = it.pnlBase >= 0;
        const sign = pos ? '+' : '−';
        const label = displayName(it.h);
        return `<div class="div-row">
          <div class="bar-label" title="${escape(label)} (${escape(it.h.ticker)})">${escape(label)}</div>
          <div class="div-track">
            <div class="div-fill ${pos ? 'pos' : 'neg'}" style="width: ${w.toFixed(2)}%;"></div>
          </div>
          <div class="bar-value" style="color: ${pos ? 'var(--gain)' : 'var(--loss)'};">
            ${sign}${fmt(Math.abs(it.pnlBase))} <span class="text-dim" style="font-size: 14px;">(${fmtPct(it.pct)})</span>
          </div>
        </div>`;
      }).join('')}
    </div>`;
    return chartCard(I.scale, title, meta, body);
  }

  function tplChartMarketSplit(D) {
    const title = 'Market Distribution';
    if (D.holdings.length === 0) {
      return chartCard(I.globe, title, '', `<div class="chart-empty">No data</div>`);
    }
    if (!D.fxOk) {
      return chartCard(I.globe, title, '', `<div class="chart-empty">FX rate required for mixed KR/US portfolios.</div>`);
    }
    const krBase = D.items.filter(it => it.h.market === 'KR').reduce((s, it) => s + it.valueBase, 0);
    const usBase = D.items.filter(it => it.h.market === 'US').reduce((s, it) => s + it.valueBase, 0);
    const total = krBase + usBase;
    if (total === 0) {
      return chartCard(I.globe, title, '', `<div class="chart-empty">No data</div>`);
    }
    const krPct = (krBase / total) * 100;
    const usPct = (usBase / total) * 100;

    const stack = `<div class="stack-bar">
      ${krPct > 0 ? `<div class="stack-seg" style="width: ${krPct}%; background: ${KR_COLOR};">${krPct >= 8 ? 'KR ' + krPct.toFixed(1) + '%' : ''}</div>` : ''}
      ${usPct > 0 ? `<div class="stack-seg" style="width: ${usPct}%; background: ${US_COLOR};">${usPct >= 8 ? 'US ' + usPct.toFixed(1) + '%' : ''}</div>` : ''}
    </div>`;

    const krPnl = D.krValue - D.krCost;
    const usPnl = D.usValue - D.usCost;
    const krPctNative = D.krCost ? (krPnl / D.krCost) * 100 : 0;
    const usPctNative = D.usCost ? (usPnl / D.usCost) * 100 : 0;

    const cards = `<div class="stack-legend">
      <div class="stack-card" style="border-left: 3px solid ${KR_COLOR};">
        <div class="stack-card-label">Korea · ${D.krCount} holdings</div>
        <div class="stack-card-value">${D.krCost > 0 ? fmtKRWcompact(D.krValue) : '—'}</div>
        <div class="stack-card-sub" style="color: ${D.krCount === 0 ? 'var(--dim)' : krPnl >= 0 ? 'var(--gain)' : 'var(--loss)'};">
          ${D.krCount === 0 ? '—' : (D.anyPrice ? `${krPnl >= 0 ? '+' : ''}${fmtKRWcompact(krPnl)} · ${fmtPct(krPctNative)}` : 'at cost basis')}
        </div>
      </div>
      <div class="stack-card" style="border-left: 3px solid ${US_COLOR};">
        <div class="stack-card-label">United States · ${D.usCount} holdings</div>
        <div class="stack-card-value">${D.usCost > 0 ? fmtUSD(D.usValue) : '—'}</div>
        <div class="stack-card-sub" style="color: ${D.usCount === 0 ? 'var(--dim)' : usPnl >= 0 ? 'var(--gain)' : 'var(--loss)'};">
          ${D.usCount === 0 ? '—' : (D.anyPrice ? `${usPnl >= 0 ? '+' : ''}${fmtUSD(Math.abs(usPnl))} · ${fmtPct(usPctNative)}` : 'at cost basis')}
        </div>
      </div>
    </div>`;
    const meta = `In ${D.baseCcy}`;
    return chartCard(I.globe, title, meta, stack + cards);
  }

  function tplCharts(D) {
    if (D.holdings.length === 0) return '';
    // The market-split chart degenerates to a single 100% segment when filtered
    // to a single market, so hide it in that case.
    const showSplit = state.marketFilter === 'ALL';
    return `<div class="charts-grid">
      ${tplChartAllocation(D)}
      ${tplChartTopHoldings(D)}
      ${tplChartPnL(D)}
      ${showSplit ? tplChartMarketSplit(D) : ''}
    </div>`;
  }

  // ---------- holdings table ----------
  const SORT_KEYS = {
    name: it => displayName(it.h).toLowerCase(),
    market: it => it.h.market,
    category: it => (it.h.category || '').trim() || UNCATEGORIZED,
    shares: it => it.shares,
    avgCost: it => it.avgCost,
    currentPrice: it => it.h.currentPrice ?? -Infinity,
    value: it => it.valueBase,
    pnl: it => it.hasPrice ? it.pnlBase : -Infinity,
    pct: it => it.hasPrice ? it.pct : -Infinity,
    weight: it => it.valueBase,
  };

  function sortIndicator(key) {
    if (state.sort.key !== key) return '';
    return state.sort.dir === 'asc' ? I.sortUp : I.sortDown;
  }

  function thSort(key, label, opts) {
    const right = opts && opts.right;
    const sorted = state.sort.key === key ? 'sorted' : '';
    return `<th class="${sorted}" data-act="sort" data-key="${key}" style="${right ? 'text-align: right;' : ''}">
      <span style="display: inline-flex; align-items: center; gap: 4px; ${right ? 'flex-direction: row-reverse;' : ''}">
        ${label} ${sortIndicator(key)}
      </span>
    </th>`;
  }

  function tplHoldingDetail(D) {
    if (!state.selectedHoldingId) return '';
    const h = state.holdings.find(x => x.id === state.selectedHoldingId);
    if (!h) return '';
    const item = D.items.find(it => it.h.id === h.id) || (function(){
      // selected holding may be filtered out — recompute basics from scratch
      const t = lotsTotals(h.lots);
      return { h, shares: t.shares, avgCost: t.avgCost, cost: t.cost, hasPrice: h.currentPrice != null,
               value: h.currentPrice != null ? t.shares * h.currentPrice : null,
               pnl: h.currentPrice != null ? (t.shares * h.currentPrice) - t.cost : null,
               pct: h.currentPrice != null && t.cost > 0 ? (((t.shares * h.currentPrice) - t.cost) / t.cost) * 100 : null,
               cur: h.market === 'KR' ? 'KRW' : 'USD' };
    })();
    const range = state.detailRange || '1y';
    const cacheKey = yahooSymbol(h) + '_' + range;
    const cached = state.historyCache[cacheKey];
    const loading = state.historyLoading[cacheKey];
    const cur = item.cur;
    const ranges = [['1mo','1M'],['3mo','3M'],['6mo','6M'],['1y','1Y'],['2y','2Y'],['5y','5Y']];
    const rangeBtns = ranges.map(([v,l]) =>
      `<button class="filter-btn ${range === v ? 'active' : ''}" data-act="set-detail-range" data-v="${v}">${l}</button>`
    ).join('');

    const fmtMoneyCcy = (n) => fmtMoney(n, cur);

    let body;
    if (loading) {
      body = '<div class="chart-empty" style="padding: 40px 0;">Loading price history…</div>';
    } else if (!cached) {
      body = '<div class="chart-empty" style="padding: 40px 0;">Fetching…</div>';
    } else if (cached.error) {
      body = `<div class="chart-empty" style="color: var(--loss); padding: 40px 0;">Failed to load: ${escape(cached.error)}</div>`;
    } else if (cached.points.length === 0) {
      body = '<div class="chart-empty" style="padding: 40px 0;">No data for this range.</div>';
    } else {
      const earliest = cached.points[0].x;
      const totals = lotsTotals(h.lots);
      const txHistory = totals.history; // chronological avgCost timeline
      const buyCount = (h.lots || []).filter(l => (l.type || 'buy') === 'buy').length;
      const sellCount = (h.lots || []).filter(l => l.type === 'sell').length;

      // Transaction markers — circles for buys, downward triangles for sells.
      const markers = (h.lots || [])
        .map(l => ({
          x: new Date(l.date).getTime(),
          y: Number(l.price),
          type: l.type === 'sell' ? 'sell' : 'buy',
          color: l.type === 'sell' ? 'var(--loss)' : 'var(--gain)',
        }))
        .filter(m => m.x >= earliest && !isNaN(m.x));

      // Stepped avg-cost line: clip points before chart's earliest, but seed
      // the visible left edge with the avg cost as of that earliest date.
      const stepPoints = txHistory.map(p => ({ x: p.x, y: p.avgCost }));
      // Find avg cost at the earliest visible timestamp (last txn at or before)
      let initialAvg = null;
      for (const p of txHistory) {
        if (p.x <= earliest) initialAvg = p.avgCost;
        else break;
      }
      const visibleSteps = stepPoints.filter(p => p.x >= earliest);
      if (initialAvg != null && (visibleSteps.length === 0 || visibleSteps[0].x > earliest)) {
        visibleSteps.unshift({ x: earliest, y: initialAvg });
      }

      // Stats
      const first = cached.points[0];
      const last = cached.points[cached.points.length - 1];
      const change = last.y - first.y;
      const changePct = first.y > 0 ? (change / first.y) * 100 : 0;
      const changeColor = change >= 0 ? 'var(--gain)' : 'var(--loss)';
      const realizedColor = totals.realized >= 0 ? 'var(--gain)' : 'var(--loss)';

      const priceChart = lineChartSVG(cached.points, {
        width: 1100, height: 280,
        steppedLine: visibleSteps.length > 0
          ? { points: visibleSteps, color: 'var(--accent)', label: 'avg cost ' + fmtMoneyCcy(item.avgCost), extendToEnd: true }
          : null,
        // Fall back to a flat ref line if no transactions recorded somehow.
        refLine: visibleSteps.length === 0 ? item.avgCost : null,
        refLabel: 'avg cost ' + fmtMoneyCcy(item.avgCost),
        markers,
        color: 'var(--info)',
        formatY: fmtMoneyCcy,
      });

      // Profit-rate chart with TIME-VARYING avg cost: at each date use the
      // avg cost in effect at that date (last transition at or before).
      const findAvgAt = (ts) => {
        let lo = 0, hi = txHistory.length - 1, idx = -1;
        while (lo <= hi) {
          const mid = (lo + hi) >> 1;
          if (txHistory[mid].x <= ts) { idx = mid; lo = mid + 1; } else hi = mid - 1;
        }
        return idx >= 0 ? txHistory[idx].avgCost : null;
      };
      const ratePoints = cached.points
        .map(p => {
          const avg = findAvgAt(p.x);
          return avg != null && avg > 0 ? { x: p.x, y: ((p.y - avg) / avg) * 100 } : null;
        })
        .filter(Boolean);
      const rateChart = ratePoints.length > 0
        ? lineChartSVG(ratePoints, {
            width: 1100, height: 200,
            refLine: 0,
            refLabel: 'break-even',
            refColor: 'currentColor',
            color: ratePoints[ratePoints.length - 1].y >= 0 ? 'var(--gain)' : 'var(--loss)',
            formatY: v => v.toFixed(1) + '%',
          })
        : '';

      const txSummary = `${buyCount} buy${buyCount === 1 ? '' : 's'}${sellCount > 0 ? ' · ' + sellCount + ' sell' + (sellCount === 1 ? '' : 's') : ''}`;
      const stats = `<div class="detail-stats">
        <div class="detail-stat"><span class="detail-stat-label">Range start</span><span class="detail-stat-value">${escape(fmtMoneyCcy(first.y))}</span></div>
        <div class="detail-stat"><span class="detail-stat-label">Range end</span><span class="detail-stat-value">${escape(fmtMoneyCcy(last.y))}</span></div>
        <div class="detail-stat"><span class="detail-stat-label">Range change</span><span class="detail-stat-value" style="color: ${changeColor};">${change >= 0 ? '+' : '−'}${fmtMoneyCcy(Math.abs(change))} · ${fmtPct(changePct)}</span></div>
        <div class="detail-stat"><span class="detail-stat-label">Avg cost</span><span class="detail-stat-value">${escape(fmtMoneyCcy(item.avgCost))} <span class="text-dim" style="font-size: 14px;">(${item.shares.toLocaleString()} sh · ${escape(txSummary)})</span></span></div>
        <div class="detail-stat"><span class="detail-stat-label">Unrealized</span><span class="detail-stat-value" style="color: ${item.hasPrice && item.pnl >= 0 ? 'var(--gain)' : 'var(--loss)'};">${item.hasPrice ? (item.pnl >= 0 ? '+' : '−') + fmtMoneyCcy(Math.abs(item.pnl)) + ' · ' + fmtPct(item.pct) : '—'}</span></div>
        ${totals.realized !== 0 ? `<div class="detail-stat"><span class="detail-stat-label">Realized</span><span class="detail-stat-value" style="color: ${realizedColor};">${totals.realized >= 0 ? '+' : '−'}${fmtMoneyCcy(Math.abs(totals.realized))}</span></div>` : ''}
      </div>`;

      body = `${stats}
        <div class="detail-chart-label">Price · avg cost (stepped) · transaction markers (● buy / ▼ sell)</div>
        <div class="detail-chart-wrap">${priceChart}</div>
        ${rateChart ? `<div class="detail-chart-label">Profit rate vs avg cost (avg cost varies over time)</div><div class="detail-chart-wrap">${rateChart}</div>` : ''}`;
    }

    return `<section class="holdings-section detail-panel">
      <div class="holdings-head">
        ${I.bar}<h2 class="holdings-title">${escape(displayName(h))} <span style="opacity: 0.7; font-weight: normal;">${escape(h.ticker)} · ${h.market}</span></h2>
        <span class="holdings-meta">price history</span>
        <button class="icon-btn" data-act="close-detail" title="Close detail panel">${I.closeS}</button>
      </div>
      <div class="detail-body">
        <div class="filter-seg" style="margin-bottom: 12px;">${rangeBtns}</div>
        ${body}
      </div>
    </section>`;
  }

  function tplHoldingsTable(D) {
    if (state.holdings.length === 0) {
      return `<section class="holdings-section">
        <div class="holdings-head">
          ${I.wallet}<h2 class="holdings-title">Holdings</h2>
          <span class="holdings-meta">empty</span>
        </div>
        <div class="empty">
          <div class="empty-title">▒ NO HOLDINGS YET ▒</div>
          <div class="empty-sub">Click <strong style="color: var(--accent);">Add Holding</strong> above to get started,<br>or use <strong style="color: var(--accent);">Restore</strong> to load a previous backup.</div>
          <div class="empty-hint">Data auto-saves to your browser. Use JSON backup for permanent storage.</div>
        </div>
      </section>`;
    }
    if (D.holdings.length === 0) {
      const hidden = state.holdings.length;
      return `<section class="holdings-section">
        <div class="holdings-head">
          ${I.wallet}<h2 class="holdings-title">Holdings</h2>
          <span class="holdings-meta">filter: ${escape(state.marketFilter)}</span>
        </div>
        <div class="empty">
          <div class="empty-title">▒ NO ${escape(state.marketFilter)} HOLDINGS ▒</div>
          <div class="empty-sub">${hidden} holding${hidden === 1 ? '' : 's'} hidden by current market filter.<br>Click <strong style="color: var(--accent);">ALL</strong> in the toolbar to see them.</div>
        </div>
      </section>`;
    }

    const total = D.tValue || 1;
    const sorter = SORT_KEYS[state.sort.key] || SORT_KEYS.value;
    const dir = state.sort.dir === 'asc' ? 1 : -1;
    const sorted = [...D.items].sort((a, b) => {
      const va = sorter(a), vb = sorter(b);
      if (typeof va === 'string') return va.localeCompare(vb) * dir;
      return (va - vb) * dir;
    });

    const rows = sorted.map(it => {
      const h = it.h;
      const cat = (h.category || '').trim();
      const catColor = cat ? D.colorFor(cat) : null;
      const weight = D.fxOk ? (it.valueBase / total) * 100 : 0;
      const pnlColor = !it.hasPrice ? 'var(--muted)' : it.pnl >= 0 ? 'var(--gain)' : 'var(--loss)';
      const primary = displayName(h);
      const showSub = h.name && h.name.trim() && h.name.trim() !== h.ticker;

      const buyN = (h.lots || []).filter(l => (l.type || 'buy') === 'buy').length;
      const sellN = (h.lots || []).filter(l => l.type === 'sell').length;
      const lotBadge = sellN > 0
        ? `<span class="lot-count-badge" title="${buyN} buy(s), ${sellN} sell(s)">${buyN}B/${sellN}S</span>`
        : (buyN > 1 ? `<span class="lot-count-badge" title="${buyN} buy lots">${buyN} buys</span>` : '');
      const isSelected = state.selectedHoldingId === h.id;
      return `<tr class="${isSelected ? 'row-selected' : ''}">
        <td>
          <div class="ticker-cell">
            <div style="display: flex; align-items: center; gap: 8px; min-width: 0;">
              <span class="ticker-display ticker-link" data-act="select-holding" data-id="${h.id}" title="View price history of ${escape(primary)}" tabindex="0" role="button">${escape(primary)}</span>
              <span class="market-tag ${h.market === 'KR' ? 'kr' : 'us'}">${h.market}</span>
            </div>
            ${showSub ? `<span class="ticker-sub" title="${escape(h.ticker)}">${escape(h.ticker)}</span>` : ''}
          </div>
        </td>
        <td>
          ${cat ? `<span class="cat-tag" style="color: ${catColor}; border-color: ${catColor}55; background: ${catColor}12;">${escape(cat)}</span>` : '<span class="text-dim">—</span>'}
        </td>
        <td class="num">${it.shares.toLocaleString()}</td>
        <td class="num">${fmtMoney(it.avgCost, it.cur)}${lotBadge}</td>
        <td class="num">${it.hasPrice ? fmtMoney(h.currentPrice, it.cur) : '<span class="text-dim">—</span>'}</td>
        <td class="num-strong">${it.hasPrice ? fmtMoney(it.value, it.cur) : fmtMoney(it.cost, it.cur)}</td>
        <td class="num-strong" style="color: ${pnlColor};">
          ${it.hasPrice ? `${it.pnl >= 0 ? '+' : '−'}${fmtMoney(Math.abs(it.pnl), it.cur)}` : '<span class="text-dim">—</span>'}
        </td>
        <td class="num" style="color: ${pnlColor};">${it.hasPrice ? fmtPct(it.pct) : '<span class="text-dim">—</span>'}</td>
        <td>
          <div class="weight-cell">
            <div class="weight-track"><div class="weight-fill" style="width: ${weight.toFixed(1)}%;"></div></div>
            <span class="num" style="min-width: 40px;">${D.fxOk ? weight.toFixed(1) + '%' : '—'}</span>
          </div>
        </td>
        <td>
          <div style="display: flex; gap: 2px; justify-content: flex-end;">
            <button class="icon-btn" data-act="add-buy" data-id="${h.id}" aria-label="Add buy" title="Add another buy">${I.plus}</button>
            <button class="icon-btn" data-act="edit" data-id="${h.id}" aria-label="Edit">${I.pencil}</button>
            <button class="icon-btn" data-act="delete" data-id="${h.id}" aria-label="Delete">${I.trash}</button>
          </div>
        </td>
      </tr>`;
    }).join('');

    const filtered = state.marketFilter !== 'ALL';
    const headMeta = filtered
      ? `${D.holdings.length} of ${state.holdings.length} · ${escape(state.marketFilter)} only`
      : `${state.holdings.length} total · click any header to sort`;
    return `<section class="holdings-section">
      <div class="holdings-head">
        ${I.wallet}<h2 class="holdings-title">Holdings</h2>
        <span class="holdings-meta">${headMeta}</span>
      </div>
      <div class="table-wrap">
        <table class="holdings">
          <thead>
            <tr>
              ${thSort('name', 'Name')}
              ${thSort('category', 'Category')}
              ${thSort('shares', 'Shares', { right: true })}
              ${thSort('avgCost', 'Avg Cost', { right: true })}
              ${thSort('currentPrice', 'Price', { right: true })}
              ${thSort('value', 'Value', { right: true })}
              ${thSort('pnl', 'P/L', { right: true })}
              ${thSort('pct', 'Return', { right: true })}
              ${thSort('weight', 'Weight', { right: true })}
              <th class="no-sort"></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </section>`;
  }

  function tplError() {
    let msg = '';
    if (state.error) msg = `<div class="error-bar">
      <span>${escape(state.error)}</span>
      <button class="error-close" data-act="dismiss-error">${I.closeS}</button>
    </div>`;
    if (state.info) msg += `<div class="error-bar" style="background: var(--gain-bg); border-color: rgba(16,185,129,0.25); color: var(--gain);">
      <span>${escape(state.info)}</span>
      <button class="error-close" data-act="dismiss-info">${I.closeS}</button>
    </div>`;
    return msg;
  }

  function tplDialog() {
    if (!state.dialog) return '';
    if (state.dialog.mode === 'prices') return tplPriceDialog();
    if (state.dialog.mode === 'profiles') return tplProfileDialog();
    if (state.dialog.mode === 'value-chart') return tplValueChartDialog();
    return tplHoldingDialog();
  }

  function tplValueChartDialog() {
    const range = state.valueRange || '1y';
    const cached = state.valueHistoryCache[range];
    const loading = state.valueHistoryLoading[range];
    const D = derive();
    const baseCcy = D.baseCcy;
    const fmt = baseCcy === 'KRW' ? fmtKRWcompact : fmtUSDcompact;
    const ranges = [['3mo','3M'],['6mo','6M'],['1y','1Y'],['2y','2Y'],['5y','5Y'],['max','MAX']];
    const rangeBtns = ranges.map(([v,l]) =>
      `<button class="filter-btn ${range === v ? 'active' : ''}" data-act="set-value-range" data-v="${v}">${l}</button>`
    ).join('');

    let body;
    if (loading) {
      body = '<div class="chart-empty" style="padding: 60px 0;">Fetching ' + state.holdings.length + ' price history series…</div>';
    } else if (!cached) {
      body = '<div class="chart-empty" style="padding: 60px 0;">Loading…</div>';
    } else if (cached.error) {
      body = `<div class="chart-empty" style="color: var(--loss); padding: 60px 0;">Failed: ${escape(cached.error)}</div>`;
    } else if (cached.points.length === 0) {
      body = '<div class="chart-empty" style="padding: 60px 0;">No data points for this range.</div>';
    } else {
      const first = cached.points[0];
      const last = cached.points[cached.points.length - 1];
      const change = last.y - first.y;
      const pct = first.y > 0 ? (change / first.y) * 100 : 0;
      const color = change >= 0 ? 'var(--gain)' : 'var(--loss)';
      const chart = lineChartSVG(cached.points, {
        width: 900, height: 320,
        formatY: fmt,
        color: 'var(--info)',
      });
      body = `${chart}
        <div class="detail-stats" style="margin-top: 14px;">
          <div class="detail-stat"><span class="detail-stat-label">Range start</span><span class="detail-stat-value">${escape(fmt(first.y))}</span></div>
          <div class="detail-stat"><span class="detail-stat-label">Range end</span><span class="detail-stat-value">${escape(fmt(last.y))}</span></div>
          <div class="detail-stat"><span class="detail-stat-label">Range change</span><span class="detail-stat-value" style="color: ${color};">${change >= 0 ? '+' : '−'}${fmt(Math.abs(change))} · ${fmtPct(pct)}</span></div>
        </div>
        <div class="text-dim" style="font-size: 14px; margin-top: 10px; font-family: var(--sans);">
          Each point sums (shares owned at that date × close price), converted to ${baseCcy} via historical USDKRW where needed.
        </div>`;
    }

    return `<div class="modal-bg" data-act="modal-bg">
      <div class="modal modal-wide" data-stop style="max-width: 1000px;">
        <div class="modal-head">
          <h3 class="modal-title">Total Value Over Time (${baseCcy})</h3>
          <button class="icon-btn" data-act="close-dialog">${I.close}</button>
        </div>
        <p class="modal-sub">Historical portfolio value computed from each holding's daily close. Lots are accounted for from their purchase date forward.</p>
        <div style="padding: 0 14px 16px;">
          <div class="filter-seg" style="margin-bottom: 14px;">${rangeBtns}</div>
          ${body}
        </div>
      </div>
    </div>`;
  }

  function tplLotRow(l, market, canRemove) {
    const today = new Date().toISOString().slice(0, 10);
    const type = l.type === 'sell' ? 'sell' : 'buy';
    return `<div class="lot-row" data-lot-row="${l.id}">
      <button class="lot-type-btn lot-type-${type}" data-act="toggle-lot-type" data-lot-id="${l.id}" title="Click to switch BUY/SELL">${type === 'sell' ? 'SELL' : 'BUY'}</button>
      <input class="input" data-lot-field="shares" type="number" step="any" placeholder="100" value="${l.shares ?? ''}">
      <input class="input" data-lot-field="price" type="number" step="any" placeholder="${market === 'KR' ? '70000' : '150.00'}" value="${l.price ?? ''}">
      <input class="input" data-lot-field="date" type="date" value="${l.date || today}">
      <button class="icon-btn" data-act="remove-lot" data-lot-id="${l.id}" ${canRemove ? '' : 'disabled style="opacity: 0.3; cursor: not-allowed;"'} aria-label="Remove">${I.trash}</button>
    </div>`;
  }

  function tplHoldingDialog() {
    const isEdit = state.dialog.mode === 'edit';

    return `<div class="modal-bg" data-act="modal-bg">

          <button class="icon-btn" data-act="close-dialog">${I.close}</button>
        </div>
        <div class="field">
          <label class="lbl">Market</label>
          <div class="seg-group">
            <button class="seg-btn ${market === 'KR' ? 'active' : ''}" data-act="set-market" data-v="KR" ${isEdit ? 'disabled style="opacity: 0.5; cursor: not-allowed;"' : ''}>Korea (KR)</button>
            <button class="seg-btn ${market === 'US' ? 'active' : ''}" data-act="set-market" data-v="US" ${isEdit ? 'disabled style="opacity: 0.5; cursor: not-allowed;"' : ''}>United States</button>

        </div>
        <div class="field grid-2">

            <input class="input" id="f-ticker" value="${escape(h.ticker || '')}" placeholder="${market === 'KR' ? '005930 or company name' : 'AAPL or company name'}" autocomplete="off">
            <div class="search-results" id="ticker-search"></div>
          </div>
          <div>
            <label class="lbl">Name (optional)</label>
            <input class="input" id="f-name" value="${escape(h.name || '')}" placeholder="${market === 'KR' ? 'Samsung Electronics' : 'Apple Inc.'}" style="font-family: var(--sans);">
          </div>
        </div>
        <div class="field">
          <label class="lbl">Category (optional)</label>
          <input class="input" id="f-category" value="${escape(h.category || '')}" placeholder="e.g. Tech, Semiconductors, Dividend…" list="cat-list" style="font-family: var(--sans);">
          <datalist id="cat-list">${allCats.map(c => `<option value="${escape(c)}">`).join('')}</datalist>
        </div>
        <div class="field">
          <label class="lbl">Transactions · ${cur}</label>
          <div class="lot-header">
            <span>Type</span>
            <span>Shares</span>
            <span>Price</span>
            <span>Date</span>
            <span></span>
          </div>
          <div class="lot-list">
            ${lots.map(l => tplLotRow(l, market, canRemove)).join('')}
          </div>
          <div style="display: flex; gap: 6px;">
            <button class="lot-add-btn" data-act="add-lot">${I.plus} Add Buy</button>
            <button class="lot-add-btn lot-add-sell" data-act="add-lot-sell">${I.plus} Add Sell</button>
          </div>
        </div>
        <div class="lot-summary" id="lot-summary">
          <div class="lot-summary-item"><span class="lot-summary-label">Shares</span><span>${t.shares.toLocaleString()}</span></div>
          <div class="lot-summary-item"><span class="lot-summary-label">Avg cost</span><span>${fmtMoney(t.avgCost, cur)}</span></div>
          <div class="lot-summary-item"><span class="lot-summary-label">Cost basis</span><span>${fmtMoney(t.cost, cur)}</span></div>
          ${t.realized !== 0 ? `<div class="lot-summary-item"><span class="lot-summary-label">Realized</span><span style="color: ${t.realized >= 0 ? 'var(--gain)' : 'var(--loss)'};">${t.realized >= 0 ? '+' : '−'}${fmtMoney(Math.abs(t.realized), cur)}</span></div>` : ''}
        </div>
        <div style="display: flex; gap: 10px;">
          <button class="btn-ghost" data-act="close-dialog" style="flex: 1;">Cancel</button>
          <button class="btn-primary" data-act="submit-dialog" style="flex: 1;">${isEdit ? 'Save' : 'Add'}</button>
        </div>
      </div>
    </div>`;
  }

  function tplPriceDialog() {
    const needsFx = state.holdings.some(h => h.market === 'KR') && state.holdings.some(h => h.market === 'US');
    return `<div class="modal-bg" data-act="modal-bg">
      <div class="modal modal-wide" data-stop>
        <div class="modal-head">
          <h3 class="modal-title">Edit Prices</h3>
          <button class="icon-btn" data-act="close-dialog">${I.close}</button>
        </div>
        <p class="modal-sub">Look up current prices on Yahoo Finance, Google Finance, etc. and enter them below. Blank fields keep the existing value.</p>
        ${state.holdings.map(h => `
          <div class="field">
            <label class="lbl">${escape(h.ticker)}${h.name ? ' · ' + escape(h.name) : ''} <span style="color: var(--dim);">(${h.market === 'KR' ? 'KRW' : 'USD'})</span></label>
            <input class="input" data-price-id="${h.id}" type="number" step="any"
              value="${h.currentPrice ?? ''}"
              placeholder="${h.market === 'KR' ? '70000' : '150.00'}">
          </div>`).join('')}
        ${needsFx ? `
          <div class="field" style="border-top: 1px solid var(--border); padding-top: 14px; margin-top: 6px;">
            <label class="lbl">USD / KRW exchange rate</label>
            <input class="input" id="manual-fx" type="number" step="any"
              value="${state.fxRate ?? ''}" placeholder="1380">
          </div>` : ''}
        <div style="display: flex; gap: 10px; margin-top: 14px;">
          <button class="btn-ghost" data-act="close-dialog" style="flex: 1;">Cancel</button>
          <button class="btn-primary" data-act="submit-prices" style="flex: 1;">Save</button>
        </div>
      </div>
    </div>`;
  }

  function tplProfileDialog() {
    const canDelete = state.profiles.length > 1;
    const rows = state.profiles.map(p => {
      const isActive = p.id === state.activeProfileId;
      const count = p.holdings.length;
      return `<div class="profile-row ${isActive ? 'active' : ''}">
        <input class="input" data-profile-name="${p.id}" value="${escape(p.name)}" placeholder="Profile name" style="font-family: var(--sans);">
        <span class="text-dim" style="font-family: var(--mono); font-size: 16px; min-width: 70px; text-align: right;">${count} holding${count === 1 ? '' : 's'}</span>
        ${isActive ? '<span class="profile-badge">ACTIVE</span>' : ''}
        <button class="icon-btn" data-act="profile-delete" data-id="${p.id}" ${canDelete ? '' : 'disabled style="opacity: 0.3; cursor: not-allowed;"'} title="${canDelete ? 'Delete profile' : 'At least one profile required'}">${I.trash}</button>
      </div>`;
    }).join('');

    return `<div class="modal-bg" data-act="modal-bg">
      <div class="modal" data-stop>
        <div class="modal-head">
          <h3 class="modal-title">Manage Users</h3>
          <button class="icon-btn" data-act="close-dialog">${I.close}</button>
        </div>
        <p class="modal-sub">Each user keeps their own holdings, prices, and FX rate. Switch users from the dropdown in the header.</p>
        <div class="profile-list">${rows}</div>
        <div class="profile-add-row">
          <input class="input" id="new-profile-name" placeholder="New user name (e.g. Alice)" style="font-family: var(--sans);">
          <button class="btn-primary" data-act="profile-add">${I.plus} Add</button>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 16px;">
          <button class="btn-primary" data-act="profile-save-all" style="flex: 1;">Done</button>
        </div>
      </div>
    </div>`;
  }

  // ---------- render & events ----------
  function render() {
    const root = document.getElementById('app');
    const isHoldingDialog = state.dialog && (state.dialog.mode === 'add' || state.dialog.mode === 'edit');
    let topFields = null;
    if (isHoldingDialog) {
      // Capture top-level fields so they survive a re-render. Lot rows are kept
      // in sync continuously via the input listener (syncDialogLotsFromDOM), so
      // we don't snapshot them here — that would overwrite handler-driven
      // changes like remove-lot.
      topFields = {
        ticker: document.getElementById('f-ticker')?.value,
        name: document.getElementById('f-name')?.value,
        category: document.getElementById('f-category')?.value,
      };
    }
    const D = derive();
    root.innerHTML =
      tplHeader() +
      tplMarketsStrip() +
      tplToolbar(D) +
      tplError() +
      tplKPI(D) +
      tplCharts(D) +
      tplHoldingDetail(D) +
      tplHoldingsTable(D) +
      tplDialog();
    if (topFields) {
      const set = (id, val) => { const el = document.getElementById(id); if (el && val != null) el.value = val; };
      set('f-ticker', topFields.ticker);
      set('f-name', topFields.name);
      set('f-category', topFields.category);
    }
  }

  function readLotsFromDOM() {
    const lots = [];
    document.querySelectorAll('[data-lot-row]').forEach(row => {
      const id = row.getAttribute('data-lot-row');
      const shares = row.querySelector('[data-lot-field="shares"]')?.value;
      const price = row.querySelector('[data-lot-field="price"]')?.value;
      const date = row.querySelector('[data-lot-field="date"]')?.value;
      lots.push({ id, shares, price, date });
    });
    return lots;
  }

  // Sync the open dialog's lot state from the live DOM. Called on every keystroke
  // in a lot field so that state.dialog.lots always reflects what the user typed,
  // and so subsequent add/remove handlers can mutate state directly without the
  // render pass re-reading a stale DOM and clobbering their changes.
  function syncDialogLotsFromDOM() {
    if (!state.dialog || !state.dialog.lots) return;
    const live = readLotsFromDOM();
    if (live.length === 0) return;
    // Type isn't in any DOM input — preserve it from existing state by lot id.
    const typeMap = new Map(state.dialog.lots.map(l => [l.id, l.type === 'sell' ? 'sell' : 'buy']));
    state.dialog.lots = live.map(l => ({ ...l, type: typeMap.get(l.id) || 'buy' }));
  }

  function readForm() {
    const get = (id) => document.getElementById(id);
    return {
      ticker: get('f-ticker')?.value,
      name: get('f-name')?.value,
      category: get('f-category')?.value,
      lots: readLotsFromDOM(),
    };
  }

  // Recompute the lot summary footer from the current state.dialog.lots.
  // Called after every input/toggle event; state is kept in sync via
  // syncDialogLotsFromDOM, so we don't re-read from DOM here directly.
  function updateLotSummary() {
    const summary = document.getElementById('lot-summary');
    if (!summary || !state.dialog) return;
    const market = state.dialog.market || state.dialog.holding?.market || 'KR';
    const cur = market === 'KR' ? 'KRW' : 'USD';
    const t = lotsTotals(state.dialog.lots || []);
    let html = ''
      + `<div class="lot-summary-item"><span class="lot-summary-label">Shares</span><span>${t.shares.toLocaleString()}</span></div>`
      + `<div class="lot-summary-item"><span class="lot-summary-label">Avg cost</span><span>${fmtMoney(t.avgCost, cur)}</span></div>`
      + `<div class="lot-summary-item"><span class="lot-summary-label">Cost basis</span><span>${fmtMoney(t.cost, cur)}</span></div>`;
    if (t.realized !== 0) {
      html += `<div class="lot-summary-item"><span class="lot-summary-label">Realized</span><span style="color: ${t.realized >= 0 ? 'var(--gain)' : 'var(--loss)'};">${t.realized >= 0 ? '+' : '−'}${fmtMoney(Math.abs(t.realized), cur)}</span></div>`;
    }
    summary.innerHTML = html;
  }

  function commitProfileNames() {
    document.querySelectorAll('[data-profile-name]').forEach(input => {
      const id = input.getAttribute('data-profile-name');
      renameProfile(id, input.value);
    });
  }

  document.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-act]');
    if (!btn) return;
    const act = btn.dataset.act;
    const id = btn.dataset.id;
    if (act === 'open-add') {
      state.dialog = { mode: 'add', market: 'KR', lots: [{ id: makeLotId(), shares: '', price: '', date: new Date().toISOString().slice(0, 10) }] };
      render();
    }
    else if (act === 'open-prices') { state.dialog = { mode: 'prices' }; render(); }
    else if (act === 'submit-prices') { submitPrices(); }
    else if (act === 'edit') {
      const h = state.holdings.find(x => x.id === id);
      if (h) {
        state.dialog = { mode: 'edit', holding: h, market: h.market, lots: h.lots.map(l => ({ ...l })) };
        render();
      }
    }
    else if (act === 'add-buy') {
      const h = state.holdings.find(x => x.id === id);
      if (h) {
        const lots = [...h.lots.map(l => ({ ...l })), { id: makeLotId(), shares: '', price: '', date: new Date().toISOString().slice(0, 10) }];
        state.dialog = { mode: 'edit', holding: h, market: h.market, lots };
        render();
        // Focus the new shares input
        setTimeout(() => {
          const rows = document.querySelectorAll('[data-lot-row]');
          const last = rows[rows.length - 1];
          last?.querySelector('[data-lot-field="shares"]')?.focus();
        }, 30);
      }
    }
    else if (act === 'add-lot') {
      if (state.dialog) {
        syncDialogLotsFromDOM();
        state.dialog.lots = [...(state.dialog.lots || []), { id: makeLotId(), type: 'buy', shares: '', price: '', date: new Date().toISOString().slice(0, 10) }];
        render();
      }
    }
    else if (act === 'add-lot-sell') {
      if (state.dialog) {
        syncDialogLotsFromDOM();
        state.dialog.lots = [...(state.dialog.lots || []), { id: makeLotId(), type: 'sell', shares: '', price: '', date: new Date().toISOString().slice(0, 10) }];
        render();
      }
    }
    else if (act === 'toggle-lot-type') {
      if (state.dialog) {
        syncDialogLotsFromDOM();
        const lotId = btn.dataset.lotId;
        state.dialog.lots = (state.dialog.lots || []).map(l =>
          l.id === lotId ? { ...l, type: l.type === 'sell' ? 'buy' : 'sell' } : l
        );
        render();
      }
    }
    else if (act === 'remove-lot') {
      if (state.dialog) {
        syncDialogLotsFromDOM();
        const lotId = btn.dataset.lotId;
        const remaining = (state.dialog.lots || []).filter(l => l.id !== lotId);
        if (remaining.length === 0) return; // Always keep at least one lot row
        state.dialog.lots = remaining;
        render();
      }
    }
    else if (act === 'delete') { remove(id); }
    else if (act === 'update-prices') { updatePrices(); }
    else if (act === 'export-json') { exportJSON(); }
    else if (act === 'import-json') { document.getElementById('import-file').click(); }
    else if (act === 'toggle-theme') { toggleTheme(); }
    else if (act === 'cycle-currency') {
      const c = state.displayCurrency;
      state.displayCurrency = c === null ? 'KRW' : c === 'KRW' ? 'USD' : null;
      save();
    }
    else if (act === 'set-filter') {
      const v = btn.dataset.v;
      if (v === 'ALL' || v === 'KR' || v === 'US') {
        state.marketFilter = v;
        render();
      }
    }
    else if (act === 'select-holding') {
      const sid = btn.dataset.id;
      if (state.selectedHoldingId === sid) {
        state.selectedHoldingId = null;
        render();
      } else {
        state.selectedHoldingId = sid;
        const h = state.holdings.find(x => x.id === sid);
        render();
        if (h) ensureHoldingHistory(h, state.detailRange || '1y');
      }
    }
    else if (act === 'close-detail') {
      state.selectedHoldingId = null;
      render();
    }
    else if (act === 'set-detail-range') {
      state.detailRange = btn.dataset.v;
      const h = state.holdings.find(x => x.id === state.selectedHoldingId);
      render();
      if (h) ensureHoldingHistory(h, state.detailRange);
    }
    else if (act === 'open-value-chart') {
      state.dialog = { mode: 'value-chart' };
      render();
      ensureValueHistory(state.valueRange || '1y');
    }
    else if (act === 'set-value-range') {
      state.valueRange = btn.dataset.v;
      render();
      ensureValueHistory(state.valueRange);
    }
    else if (act === 'manage-profiles') { state.dialog = { mode: 'profiles' }; render(); }
    else if (act === 'quick-add-profile') {
      const name = prompt('New user name:');
      if (name && name.trim()) addProfile(name.trim());
    }
    else if (act === 'profile-add') {
      commitProfileNames();
      const input = document.getElementById('new-profile-name');
      const name = input && input.value.trim();
      if (!name) { input?.focus(); return; }
      addProfile(name);
    }
    else if (act === 'profile-delete') {
      commitProfileNames();
      deleteProfile(id);
    }
    else if (act === 'profile-save-all') {
      commitProfileNames();
      state.dialog = null;
      render();
    }
    else if (act === 'close-dialog' || act === 'modal-bg') {
      if (act === 'modal-bg' && e.target.closest('[data-stop]')) return;
      if (state.dialog && state.dialog.mode === 'profiles') commitProfileNames();
      state.dialog = null; render();
    }
    else if (act === 'set-market') {
      state.dialog = { ...state.dialog, market: btn.dataset.v };
      render();
    }
    else if (act === 'pick-ticker') {
      const symbol = btn.dataset.symbol || '';
      const name = btn.dataset.name || '';
      const market = btn.dataset.market || 'KR';
      const tickerInput = document.getElementById('f-ticker');
      const nameInput = document.getElementById('f-name');
      if (tickerInput) tickerInput.value = cleanSymbol(symbol);
      if (nameInput && !nameInput.value.trim()) nameInput.value = name;
      closeTickerSearch();
      // If market differs, switch and re-render (render preserves typed values).
      if (state.dialog && state.dialog.market !== market) {
        state.dialog.market = market;
        render();
      }
    }
    else if (act === 'submit-dialog') { submitForm(); }
    else if (act === 'dismiss-error') { state.error = null; render(); }
    else if (act === 'dismiss-info') { state.info = null; render(); }
    else if (act === 'sort') {
      const key = btn.dataset.key;
      if (state.sort.key === key) {
        state.sort.dir = state.sort.dir === 'asc' ? 'desc' : 'asc';
      } else {
        state.sort.key = key;
        state.sort.dir = (key === 'name' || key === 'category' || key === 'market') ? 'asc' : 'desc';
      }
      render();
    }
  });

  document.addEventListener('change', (e) => {
    if (e.target && e.target.id === 'import-file') {
      const file = e.target.files && e.target.files[0];
      if (file) importJSON(file);
      e.target.value = '';
    } else if (e.target && e.target.id === 'profile-select') {
      switchProfile(e.target.value);
    }
  });

  document.addEventListener('input', (e) => {
    if (e.target && e.target.matches('[data-lot-field]')) {
      syncDialogLotsFromDOM();
      updateLotSummary();
    } else if (e.target && e.target.id === 'f-ticker') {
      scheduleTickerSearch(e.target.value);
    }
  });

  document.addEventListener('keydown', (e) => {
    if ((e.key === 'Enter' || e.key === ' ') && e.target && e.target.classList && e.target.classList.contains('ticker-link')) {
      e.preventDefault();
      e.target.click();
    }
  });

  // Hide ticker search when focus leaves both the input and the results panel.
  document.addEventListener('mousedown', (e) => {
    const inField = e.target.closest('.search-field');
    if (!inField) closeTickerSearch();
  });

  function submitForm() {
    const v = readForm();
    const editId = state.dialog.holding?.id;
    const market = state.dialog.market || state.dialog.holding?.market || 'KR';
    const ticker = (v.ticker || '').trim().toUpperCase();
    if (!ticker) { state.error = 'Ticker is required.'; render(); return; }
    const typeMap = new Map((state.dialog.lots || []).map(l => [l.id, l.type === 'sell' ? 'sell' : 'buy']));
    const validLots = v.lots
      .map(l => ({
        id: l.id || makeLotId(),
        type: typeMap.get(l.id) || 'buy',
        shares: Number(l.shares),
        price: Number(l.price),
        date: l.date || new Date().toISOString().slice(0, 10),
      }))
      .filter(l => l.shares > 0 && l.price > 0);
    if (validLots.length === 0) {
      state.error = 'Add at least one transaction with shares and price greater than zero.';
      render(); return;
    }
    // Validate: no transaction should leave running shares negative.
    const sortedCheck = [...validLots].sort((a, b) => {
      const da = new Date(a.date).getTime(), db = new Date(b.date).getTime();
      if (da !== db) return da - db;
      return (a.type === 'sell' ? 1 : 0) - (b.type === 'sell' ? 1 : 0);
    });
    let running = 0;
    for (const l of sortedCheck) {
      if (l.type === 'sell') {
        if (l.shares > running + 1e-6) {
          state.error = `Cannot sell ${l.shares} shares on ${l.date} — only ${running.toFixed(4).replace(/\.?0+$/, '')} shares held at that date.`;
          render(); return;
        }
        running -= l.shares;
      } else {
        running += l.shares;
      }
    }

    // When adding a new holding for a ticker that already exists in the same market,
    // offer to append the lots to the existing position instead of creating a duplicate.
    if (!editId) {
      const existing = state.holdings.find(h => h.ticker === ticker && h.market === market);
      if (existing) {
        const ok = confirm(
          `${ticker} (${existing.name || existing.ticker}) already exists with ${existing.lots.length} buy(s).\n` +
          `Add these ${validLots.length} buy(s) to the existing holding?\n\n` +
          `Click Cancel to create a separate holding instead.`
        );
        if (ok) {
          appendLotsToHolding(existing.id, validLots);
          return;
        }
      }
    }

    addOrUpdate({
      ticker,
      name: (v.name || '').trim(),
      market,
      category: (v.category || '').trim(),
      lots: validLots,
    }, editId);
  }

  // ---------- init ----------
  state.theme = loadTheme();
  applyTheme();
  loadIndicesCache();
  if (!hasLocalStorage()) {
    state.error = 'localStorage is unavailable (private mode?). Auto-save is disabled, but JSON backup/restore still works.';
    state.profiles = [newProfile('Default')];
    state.activeProfileId = state.profiles[0].id;
    syncFromActive();
  } else {
    load();
  }
  render();
})();
</script>
</body>
</html>
