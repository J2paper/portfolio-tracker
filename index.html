    scale: '<svg class="icon" viewBox="0 0 24 24" width="14" height="14"><path d="M16 16l3-8 3 8M2 16l3-8 3 8M7 21h10M12 3v18M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/></svg>',
    globe: '<svg class="icon" viewBox="0 0 24 24" width="14" height="14"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 0 1 0 20M12 2a15 15 0 0 0 0 20"/></svg>',
    download: '<svg class="icon" viewBox="0 0 24 24" width="14" height="14"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>',
    upload: '<svg class="icon" viewBox="0 0 24 24" width="14" height="14"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>',
    coins: '<svg class="icon" viewBox="0 0 24 24" width="14" height="14"><circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18M7 6h1v4M16.71 13.88l.71.71-2.82 2.82"/></svg>',
    trend: '<svg class="icon" viewBox="0 0 24 24" width="14" height="14"><path d="M3 17l6-6 4 4 8-8M14 7h7v7"/></svg>',
    hash: '<svg class="icon" viewBox="0 0 24 24" width="14" height="14"><path d="M4 9h16M4 15h16M10 3 8 21M16 3l-2 18"/></svg>',
    sortUp: '<svg class="icon" viewBox="0 0 24 24" width="10" height="10"><path d="M7 14l5-5 5 5"/></svg>',
    sortDown: '<svg class="icon" viewBox="0 0 24 24" width="10" height="10"><path d="M7 10l5 5 5-5"/></svg>',
    sun: '<svg class="icon" viewBox="0 0 24 24" width="14" height="14"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>',
    moon: '<svg class="icon" viewBox="0 0 24 24" width="14" height="14"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>',
    users: '<svg class="icon" viewBox="0 0 24 24" width="14" height="14"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/><circle cx="9" cy="7" r="4"/></svg>',
  };

  // ---------- design tokens ----------
  // Mid-century modern palette (mustard, brick, teal, cream, orange, olive)
  const CAT_COLORS = ['#e8b14d', '#c13e36', '#5a8794', '#ecd9a6', '#e06a3e', '#b3c14d', '#7ba3b0', '#a87545', '#d4a06f', '#8aa03a'];
  const UNCATEGORIZED = 'Uncategorized';
  const SUGGESTED = ['Tech', 'Semiconductors', 'Finance', 'Healthcare', 'Energy', 'Consumer', 'Industrial', 'ETF', 'Dividend', 'Growth'];
  const STORAGE_KEY = 'portfolio.v2';
  const STORAGE_KEY_V1 = 'portfolio.v1';
  const THEME_KEY = 'portfolio.theme';
  const INDICES_KEY = 'portfolio.indices.v1';
  const KR_COLOR = '#e8b14d';
  const US_COLOR = '#5a8794';

  // Major market indices shown in the top strip. Symbols are Yahoo-finance.
  const INDICES = [
    { symbol: '^KS11',    label: 'KOSPI',   currency: 'KRW' },
    { symbol: '^KQ11',    label: 'KOSDAQ',  currency: 'KRW' },
    { symbol: '^IXIC',    label: 'NASDAQ',  currency: 'USD' },
    { symbol: '^GSPC',    label: 'S&P 500', currency: 'USD' },
    { symbol: 'USDKRW=X', label: 'USD/KRW', currency: 'KRW' },
  ];

  // ---------- formatters ----------
  const fmtKRW = (n) => '₩' + Math.round(n).toLocaleString('en-US');
  const fmtUSD = (n) => '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const fmtMoney = (n, c) => (c === 'KRW' ? fmtKRW(n) : fmtUSD(n));
  const fmtKRWcompact = (n) => {
    const abs = Math.abs(n);
    if (abs >= 1e8) return '₩' + (n / 1e8).toFixed(2) + 'B';
    if (abs >= 1e6) return '₩' + (n / 1e6).toFixed(2) + 'M';
    if (abs >= 1e3) return '₩' + (n / 1e3).toFixed(1) + 'K';
    return '₩' + Math.round(n).toLocaleString('en-US');
  };
  const fmtUSDcompact = (n) => {
    const abs = Math.abs(n);
    if (abs >= 1e9) return '$' + (n / 1e9).toFixed(2) + 'B';
    if (abs >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
    if (abs >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'K';
    return '$' + Math.round(n).toLocaleString('en-US');
  };
  const fmtPct = (n) => (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
  const fmtDate = (iso) => {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleString('en-US', { month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit' });
  };
  const escape = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

  // ---------- state ----------
  const state = {
    profiles: [],
    activeProfileId: null,
    // Mirrors of the active profile, kept in sync via syncFromActive/syncToActive
    holdings: [],
    fxRate: null,
    lastUpdated: null,
    displayCurrency: null, // null = auto (derive from holdings); 'KRW' | 'USD' = forced
    // UI state
    updating: false,
    saveStatus: 'idle',
    error: null,
    info: null,
    dialog: null,
    sort: { key: 'value', dir: 'desc' },
    theme: 'dark',
    marketFilter: 'ALL', // ALL | KR | US — view-only filter for the dashboard
    selectedHoldingId: null,
    detailRange: '1y',
    valueRange: '1y',
    historyCache: {},        // key: 'symbol_range' -> { points, currency, error?, fetchedAt }
    historyLoading: {},      // key: 'symbol_range' -> bool
    valueHistoryCache: {},   // key: range -> { points, currency, error?, fetchedAt }
    valueHistoryLoading: {}, // key: range -> bool
    indices: {},             // key: symbol -> { price, prevClose, currency, points, fetchedAt, error? }
    indicesUpdating: false,
  };

  // ---------- id helpers ----------
  function makeProfileId() {
    return 'p_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }
  function makeHoldingId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }
  function makeLotId() {
    return 'l_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
  }

  // ---------- lot math ----------
  // Replay buys + sells in chronological order using the average-cost method:
  // - buy:  cost += shares × price; shares += shares; avgCost recomputed.
  // - sell: realized += (sellPrice − avgCost) × soldShares;
  //         cost -= avgCost × soldShares; shares -= soldShares; avgCost preserved.
  // Returns { shares, cost, avgCost, realized, history } where history[i] is a
  // post-transaction snapshot used by the detail chart for stepped overlays.
  function lotsTotals(lots) {
    const sorted = [...(lots || [])]
      .filter(l => Number(l.shares) > 0 && Number(l.price) > 0)
      .map(l => ({
        id: l.id,
        type: l.type === 'sell' ? 'sell' : 'buy',
        shares: Number(l.shares),
        price: Number(l.price),
        date: l.date,
        _t: new Date(l.date || 0).getTime(),
      }))
      .sort((a, b) => {
        if (a._t !== b._t) return a._t - b._t;
        return (a.type === 'sell' ? 1 : 0) - (b.type === 'sell' ? 1 : 0);
      });
    let shares = 0, cost = 0, realized = 0;
    const history = [];
    for (const l of sorted) {
      if (l.type === 'sell') {
        const avgBefore = shares > 0 ? cost / shares : 0;
        const sellShares = Math.min(l.shares, shares);
        realized += (l.price - avgBefore) * sellShares;
        cost -= avgBefore * sellShares;
        shares -= sellShares;
      } else {
        cost += l.shares * l.price;
        shares += l.shares;
      }
      history.push({
        x: l._t,
        avgCost: shares > 0 ? cost / shares : 0,
        shares,
        type: l.type,
        txPrice: l.price,
        txShares: l.shares,
        id: l.id,
      });
    }
    return { shares, cost, avgCost: shares > 0 ? cost / shares : 0, realized, history };
  }

  // Convert any version of a holding payload (v1, v2 single-buy, v3 with lots) into the
  // canonical v3 shape. Idempotent — safe to run on already-migrated data.
  function migrateHolding(h) {
    if (!h || typeof h !== 'object') return null;
    const market = h.market === 'KR' || h.market === 'US' ? h.market : null;
    if (!market) return null;
    const ticker = typeof h.ticker === 'string' ? h.ticker.toUpperCase() : null;
    if (!ticker) return null;

    let lots;
    if (Array.isArray(h.lots) && h.lots.length > 0) {
      lots = h.lots
        .filter(l => Number(l.shares) > 0 && Number(l.price) > 0)
        .map(l => ({
          id: l.id || makeLotId(),
          type: l.type === 'sell' ? 'sell' : 'buy',
          shares: Number(l.shares),
          price: Number(l.price),
          date: l.date || new Date().toISOString().slice(0, 10),
        }));
    } else if (Number(h.shares) > 0 && Number(h.buyPrice) > 0) {
      lots = [{
        id: makeLotId(),
        type: 'buy',
        shares: Number(h.shares),
        price: Number(h.buyPrice),
        date: h.buyDate || new Date().toISOString().slice(0, 10),
      }];
    } else {
      return null;
    }
    if (lots.length === 0) return null;

    return {
      id: h.id || makeHoldingId(),
      ticker,
      name: h.name || '',
      market,
      category: h.category || '',
      lots,
      currentPrice: typeof h.currentPrice === 'number' ? h.currentPrice : null,
      currency: h.currency || (market === 'KR' ? 'KRW' : 'USD'),
      lastPriceAt: h.lastPriceAt || null,
    };
  }
  function isValidHolding(h) { return migrateHolding(h) !== null; }

  // ---------- profile helpers ----------
  function newProfile(name) {
    return { id: makeProfileId(), name: name || 'Default', holdings: [], fxRate: null, lastUpdated: null, displayCurrency: null };
  }
  function getActive() {
    return state.profiles.find(p => p.id === state.activeProfileId) || state.profiles[0];
  }
  function syncFromActive() {
    const p = getActive();
    if (!p) return;
    state.activeProfileId = p.id;
    state.holdings = p.holdings;
    state.fxRate = p.fxRate;
    state.lastUpdated = p.lastUpdated;
    state.displayCurrency = (p.displayCurrency === 'KRW' || p.displayCurrency === 'USD') ? p.displayCurrency : null;
  }
  function syncToActive() {
    const p = getActive();
    if (!p) return;
    p.holdings = state.holdings;
    p.fxRate = state.fxRate;
    p.lastUpdated = state.lastUpdated;
    p.displayCurrency = state.displayCurrency;
  }

  // ---------- persistence (localStorage) ----------
  function hasLocalStorage() {
    try {
      const k = '__test__';
      localStorage.setItem(k, '1');
      localStorage.removeItem(k);
      return true;
    } catch (_) { return false; }
  }

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const d = JSON.parse(raw);
        if (Array.isArray(d.profiles) && d.profiles.length > 0) {
          state.profiles = d.profiles.map(p => ({
            id: p.id || makeProfileId(),
            name: p.name || 'Profile',
            holdings: (Array.isArray(p.holdings) ? p.holdings : []).map(migrateHolding).filter(Boolean),
            fxRate: typeof p.fxRate === 'number' ? p.fxRate : null,
            lastUpdated: p.lastUpdated || null,
            displayCurrency: (p.displayCurrency === 'KRW' || p.displayCurrency === 'USD') ? p.displayCurrency : null,
          }));
          state.activeProfileId = (d.activeProfileId && state.profiles.some(p => p.id === d.activeProfileId))
            ? d.activeProfileId : state.profiles[0].id;
          syncFromActive();
          return;
        }
      }
      // Migrate from v1 single-portfolio format
      const rawV1 = localStorage.getItem(STORAGE_KEY_V1);
      if (rawV1) {
        const d1 = JSON.parse(rawV1);
        const p = newProfile('Default');
        p.holdings = (Array.isArray(d1.holdings) ? d1.holdings : []).map(migrateHolding).filter(Boolean);
        p.fxRate = typeof d1.fxRate === 'number' ? d1.fxRate : null;
        p.lastUpdated = d1.lastUpdated || null;
        state.profiles = [p];
        state.activeProfileId = p.id;
        syncFromActive();
        save();
        return;
      }
    } catch (e) {
      console.error('Load failed:', e);
    }
    // Fresh start
    state.profiles = [newProfile('Default')];
    state.activeProfileId = state.profiles[0].id;
    syncFromActive();
  }

  function save() {
    try {
      syncToActive();
      const data = JSON.stringify({
        version: 2,
        activeProfileId: state.activeProfileId,
        profiles: state.profiles,
      });
      localStorage.setItem(STORAGE_KEY, data);
      state.saveStatus = 'saved';
      render();
      setTimeout(() => { if (state.saveStatus === 'saved') { state.saveStatus = 'idle'; render(); } }, 1500);
    } catch (e) {
      console.error('Save failed:', e);
      state.saveStatus = 'error';
      state.error = 'Save failed: ' + e.message;
      render();
    }
  }

  function loadIndicesCache() {
    try {
      const raw = localStorage.getItem(INDICES_KEY);
      if (!raw) return;
      const d = JSON.parse(raw);
      if (d && typeof d === 'object') state.indices = d;
    } catch (_) {}
  }
  function saveIndicesCache() {
    try { localStorage.setItem(INDICES_KEY, JSON.stringify(state.indices)); } catch (_) {}
  }

  // Fetch a single index quote (latest close + recent points for sparkline).
  // Reuses fetchHistory which goes through the CORS proxy chain.
  async function fetchIndexQuote(symbol) {
    const data = await fetchHistory(symbol, '1mo', '1d');
    if (!data.points || data.points.length === 0) throw new Error('No data');
    const last = data.points[data.points.length - 1];
    const prev = data.points.length >= 2 ? data.points[data.points.length - 2] : last;
    return {
      symbol,
      price: last.y,
      prevClose: prev.y,
      currency: data.currency,
      points: data.points,
    };
  }

  // Refresh all indices in parallel. Individual failures are recorded per
  // symbol so the strip can show "—" for the broken ones while the rest update.
  async function updateIndices() {
    state.indicesUpdating = true;
    render();
    try {
      const results = await Promise.allSettled(INDICES.map(idx => fetchIndexQuote(idx.symbol)));
      const now = Date.now();
      INDICES.forEach((idx, i) => {
        const r = results[i];
        if (r.status === 'fulfilled') {
          state.indices[idx.symbol] = { ...idx, ...r.value, fetchedAt: now };
        } else {
          const prev = state.indices[idx.symbol] || {};
          state.indices[idx.symbol] = { ...idx, ...prev, error: (r.reason && r.reason.message) || 'failed', fetchedAt: prev.fetchedAt || null };
        }
      });
      saveIndicesCache();
    } finally {
      state.indicesUpdating = false;
      render();
    }
  }

  function loadTheme() {
    try {
      const t = localStorage.getItem(THEME_KEY);
      if (t === 'light' || t === 'dark') return t;
    } catch (_) {}
    return 'dark';
  }
  function applyTheme() {
    document.documentElement.dataset.theme = state.theme;
  }
  function toggleTheme() {
    state.theme = state.theme === 'dark' ? 'light' : 'dark';
    applyTheme();
    try { localStorage.setItem(THEME_KEY, state.theme); } catch (_) {}
    render();
  }

  // ---------- profile actions ----------
  function switchProfile(id) {
    if (!id || id === state.activeProfileId) return;
    syncToActive();
    state.activeProfileId = id;
    syncFromActive();
    state.error = null;
    save();
  }
  function addProfile(name) {
    const trimmed = (name || '').trim();
    if (!trimmed) return;
    syncToActive();
    const p = newProfile(trimmed);
    state.profiles.push(p);
    state.activeProfileId = p.id;
    syncFromActive();
    save();
  }
  function renameProfile(id, name) {
    const trimmed = (name || '').trim();
    if (!trimmed) return;
    const p = state.profiles.find(x => x.id === id);
    if (p) { p.name = trimmed; save(); }
  }
  function deleteProfile(id) {
    if (state.profiles.length <= 1) { state.error = 'At least one profile is required.'; render(); return; }
    const p = state.profiles.find(x => x.id === id);
    if (!p) return;
    if (!confirm(`Delete profile "${p.name}" and all its holdings? This cannot be undone.`)) return;
    state.profiles = state.profiles.filter(x => x.id !== id);
    if (state.activeProfileId === id) {
      state.activeProfileId = state.profiles[0].id;
      syncFromActive();
    }
    save();
  }

  // ---------- backup / restore (file based) ----------
  function exportJSON() {
    try {
      syncToActive();
      const payload = {
        version: 2,
        exportedAt: new Date().toISOString(),
        activeProfileId: state.activeProfileId,
        profiles: state.profiles,
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const today = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = `portfolio-${today}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      const total = state.profiles.reduce((s, p) => s + p.holdings.length, 0);
      state.info = `Backup downloaded (${state.profiles.length} profile${state.profiles.length === 1 ? '' : 's'}, ${total} holdings)`;
      render();
      setTimeout(() => { if (state.info) { state.info = null; render(); } }, 2500);
    } catch (e) {
      state.error = 'Backup failed: ' + e.message;
      render();
    }
  }

  function importJSON(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const d = JSON.parse(ev.target.result);
        if (Array.isArray(d.profiles)) {
          // v2 format — replace all profiles
          const profiles = d.profiles.map(p => ({
            id: p.id || makeProfileId(),
            name: p.name || 'Profile',
            holdings: (Array.isArray(p.holdings) ? p.holdings : []).map(migrateHolding).filter(Boolean),
            fxRate: typeof p.fxRate === 'number' ? p.fxRate : null,
            lastUpdated: p.lastUpdated || null,
            displayCurrency: (p.displayCurrency === 'KRW' || p.displayCurrency === 'USD') ? p.displayCurrency : null,
          })).filter(p => p.id);
          if (profiles.length === 0) throw new Error('No valid profiles in file');
          const totalH = profiles.reduce((s, p) => s + p.holdings.length, 0);
          if (!confirm(
            `Restore ${profiles.length} profile(s) with ${totalH} holdings?\n` +
            `All current profiles (${state.profiles.length}) will be replaced.`
          )) return;
          state.profiles = profiles;
          state.activeProfileId = (d.activeProfileId && profiles.some(p => p.id === d.activeProfileId))
            ? d.activeProfileId : profiles[0].id;
          syncFromActive();
          state.error = null;
          save();
          state.info = `Restored ${profiles.length} profile(s)`;
          render();
          setTimeout(() => { if (state.info) { state.info = null; render(); } }, 2500);
        } else if (Array.isArray(d.holdings)) {
          // v1 format — import as a new profile
          const valid = d.holdings.map(migrateHolding).filter(Boolean);
          if (valid.length === 0) throw new Error('No valid holdings in file');
          const baseName = 'Imported';
          let name = baseName;
          let i = 2;
          while (state.profiles.some(p => p.name === name)) name = baseName + ' ' + (i++);
          if (!confirm(`Import ${valid.length} holdings as a new profile "${name}"?`)) return;
          syncToActive();
          const p = newProfile(name);
          p.holdings = valid;
          p.fxRate = typeof d.fxRate === 'number' ? d.fxRate : null;
          p.lastUpdated = d.lastUpdated || null;
          state.profiles.push(p);
          state.activeProfileId = p.id;
          syncFromActive();
          state.error = null;
          save();
          state.info = `Imported ${valid.length} holdings into "${name}"`;
          render();
          setTimeout(() => { if (state.info) { state.info = null; render(); } }, 2500);
        } else {
          throw new Error('Unrecognized backup format');
        }
      } catch (e) {
        state.error = 'Restore failed: ' + e.message;
        render();
      }
    };
    reader.onerror = () => { state.error = 'Could not read file'; render(); };
    reader.readAsText(file);
  }

  // ---------- holding actions ----------
  function addOrUpdate(data, editId) {
    if (editId) {
      state.holdings = state.holdings.map(h => h.id === editId ? { ...h, ...data } : h);
    } else {
      state.holdings = [...state.holdings, {
        id: makeHoldingId(),
        ticker: data.ticker,
        name: data.name,
        market: data.market,
        category: data.category,
        lots: data.lots,
        currentPrice: null,
        currency: data.market === 'KR' ? 'KRW' : 'USD',
        lastPriceAt: null,
      }];
    }
    state.dialog = null;
    save();
  }

  function appendLotsToHolding(holdingId, newLots) {
    state.holdings = state.holdings.map(h => h.id === holdingId
      ? { ...h, lots: [...h.lots, ...newLots.map(l => ({ ...l, id: l.id || makeLotId() }))] }
      : h);
    state.dialog = null;
    save();
  }

  function remove(id) {
    const h = state.holdings.find(x => x.id === id);
    if (h && !confirm(`Delete ${h.ticker}${h.name ? ' (' + h.name + ')' : ''}?`)) return;
    state.holdings = state.holdings.filter(h => h.id !== id);
    save();
  }

  function submitPrices() {
    const now = new Date().toISOString();
    const updated = state.holdings.map(h => {
      const input = document.querySelector(`[data-price-id="${h.id}"]`);
      const v = parseFloat(input?.value);
      if (!isNaN(v) && v > 0) {
        return { ...h, currentPrice: v, currency: h.market === 'KR' ? 'KRW' : 'USD', lastPriceAt: now };
      }
      return h;
    });
    const fxInput = document.getElementById('manual-fx');
    const fx = parseFloat(fxInput?.value);
    state.holdings = updated;
    if (!isNaN(fx) && fx > 0) state.fxRate = fx;
    state.lastUpdated = now;
    state.dialog = null;
    save();
  }

  // ---------- price fetch ----------
  function yahooSymbol(h) {
    if (h.market === 'US') return h.ticker;
    return h.ticker + '.KS';
  }

  const PROXIES = [
    (u) => 'https://corsproxy.io/?' + encodeURIComponent(u),
    (u) => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
    (u) => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u),
    (u) => 'https://thingproxy.freeboard.io/fetch/' + u,
  ];

  function withTimeout(promise, ms) {
    return Promise.race([
      promise,
      new Promise((_, rej) => setTimeout(() => rej(new Error('Timeout ' + ms + 'ms')), ms)),
    ]);
  }

  async function fetchYahoo(symbol) {
    const url = 'https://query1.finance.yahoo.com/v8/finance/chart/' + encodeURIComponent(symbol);
    let lastErr;
    for (let i = 0; i < PROXIES.length; i++) {
      try {
        const proxiedUrl = PROXIES[i](url);
        const r = await withTimeout(fetch(proxiedUrl), 10000);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const data = await r.json();
        const meta = data?.chart?.result?.[0]?.meta;
        if (meta && typeof meta.regularMarketPrice === 'number') {
          return { price: meta.regularMarketPrice, currency: meta.currency };
        }
        throw new Error('No price in response');
      } catch (e) {
        lastErr = e;
      }
    }
    throw lastErr || new Error('All proxies failed');
  }

  // ---------- ticker auto-search ----------
  // Yahoo Finance security search via the same CORS proxy chain.
  // Returns { results, error }. error is non-null when every proxy + host
  // combination failed, so the UI can distinguish "no matches" from "search down".
  async function searchSecurity(query) {
    if (!query) return { results: [], error: null };
    const hosts = ['query1.finance.yahoo.com', 'query2.finance.yahoo.com'];
    const path = '/v1/finance/search?q=' + encodeURIComponent(query) + '&quotesCount=10&newsCount=0&lang=en-US&region=US';
    let lastErr = null;
    for (const host of hosts) {
      const url = 'https://' + host + path;
      for (let i = 0; i < PROXIES.length; i++) {
        try {
          const proxiedUrl = PROXIES[i](url);
          const r = await withTimeout(fetch(proxiedUrl), 6000);
          if (!r.ok) throw new Error('HTTP ' + r.status);
          const text = await r.text();
          if (!text || text[0] !== '{') throw new Error('Non-JSON response');
          const data = JSON.parse(text);
          const quotes = (data?.quotes || []).filter(q => q && q.symbol);
          console.log('[search] "' + query + '" via ' + host + ' / proxy ' + (i + 1) + ' → ' + quotes.length + ' result(s)');
          return {
            results: quotes.map(q => ({
              symbol: q.symbol,
              name: q.shortname || q.longname || q.symbol,
              exchange: q.exchDisp || q.exchange || '',
              type: q.typeDisp || q.quoteType || '',
            })),
            error: null,
          };
        } catch (e) {
          console.warn('[search] ' + host + ' proxy ' + (i + 1) + ' failed:', e.message);
          lastErr = e;
        }
      }
    }
    return { results: [], error: lastErr ? lastErr.message : 'All proxies failed' };
  }

  function detectMarket(symbol) {
    const s = (symbol || '').toUpperCase();
    if (/\.(KS|KQ|KX)$/.test(s)) return 'KR';
    if (/^\d{6}$/.test(s)) return 'KR';
    return 'US';
  }
  function cleanSymbol(symbol) {
    return (symbol || '').replace(/\.(KS|KQ|KX)$/i, '');
  }

  let _searchTimer = null;
  let _searchVersion = 0;
  const SEARCH_DEBOUNCE_MS = 300;

  function scheduleTickerSearch(query) {
    if (_searchTimer) clearTimeout(_searchTimer);
    const q = (query || '').trim();
    const box = document.getElementById('ticker-search');
    if (!box) return;
    if (!q) { box.innerHTML = ''; box.classList.remove('open'); return; }
    box.innerHTML = '<div class="search-loading">Searching…</div>';
    box.classList.add('open');
    _searchTimer = setTimeout(() => runTickerSearch(q), SEARCH_DEBOUNCE_MS);
  }

  async function runTickerSearch(q) {
    const v = ++_searchVersion;
    const { results, error } = await searchSecurity(q);
    if (v !== _searchVersion) return;
    const box = document.getElementById('ticker-search');
    if (!box) return;
    const live = document.getElementById('f-ticker');
    if (!live || live.value.trim() !== q) return;
    if (results.length === 0) {
      box.innerHTML = error
        ? `<div class="search-empty" style="color: var(--loss);">Search unavailable (${escape(error)}). You can still type the ticker manually.</div>`
        : '<div class="search-empty">No matches</div>';
      box.classList.add('open');
      return;
    }
    box.innerHTML = results.map(r => {
      const market = detectMarket(r.symbol);
      return `<div class="search-result" data-act="pick-ticker" data-symbol="${escape(r.symbol)}" data-name="${escape(r.name)}" data-market="${market}">
        <div class="search-result-row">
          <span class="search-result-symbol">${escape(cleanSymbol(r.symbol))}</span>
          <span class="search-result-mkt ${market === 'KR' ? 'kr' : 'us'}">${market}</span>
          <span class="search-result-exchange">${escape(r.exchange)}${r.type ? ' · ' + escape(r.type) : ''}</span>
        </div>
        <div class="search-result-name">${escape(r.name)}</div>
      </div>`;
    }).join('');
    box.classList.add('open');
  }

  function closeTickerSearch() {
    const box = document.getElementById('ticker-search');
    if (box) { box.classList.remove('open'); box.innerHTML = ''; }
  }

  // ---------- price history ----------
  // Fetch daily closes from Yahoo's chart endpoint via the proxy chain.
  async function fetchHistory(symbol, range, interval) {
    const url = 'https://query1.finance.yahoo.com/v8/finance/chart/' + encodeURIComponent(symbol)
      + '?range=' + encodeURIComponent(range) + '&interval=' + encodeURIComponent(interval || '1d');
    let lastErr;
    for (let i = 0; i < PROXIES.length; i++) {
      try {
        const r = await withTimeout(fetch(PROXIES[i](url)), 10000);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const data = await r.json();
        const result = data?.chart?.result?.[0];
        if (!result) throw new Error('No chart result');
        const ts = result.timestamp || [];
        const closes = result.indicators?.quote?.[0]?.close || [];
        const points = [];
        for (let j = 0; j < ts.length; j++) {
          if (typeof ts[j] === 'number' && typeof closes[j] === 'number') {
            points.push({ x: ts[j] * 1000, y: closes[j] });
          }
        }
        return { points, currency: result.meta?.currency || null, symbol: result.meta?.symbol || symbol };
      } catch (e) { lastErr = e; }
    }
    throw lastErr || new Error('All proxies failed');
  }

  // Try Yahoo for a holding, falling back from .KS to .KQ for Korean tickers.
  async function fetchHoldingHistory(h, range, interval) {
    try {
      return await fetchHistory(yahooSymbol(h), range, interval);
    } catch (e) {
      if (h.market === 'KR') {
        return await fetchHistory(h.ticker + '.KQ', range, interval);
      }
      throw e;
    }
  }

  // Pick a sensible interval for a given range so we don't request 5y of intraday data.
  function intervalFor(range) {
    if (range === '5y' || range === '2y') return '1wk';
    if (range === 'max') return '1mo';
    return '1d';
  }

  // ---------- SVG line chart ----------
  function lineChartSVG(points, opts) {
    opts = opts || {};
    const w = opts.width || 1100;
    const h = opts.height || 280;
    const pL = 70, pR = 24, pT = 14, pB = 30;
    const iW = w - pL - pR;
    const iH = h - pT - pB;
    if (!points || points.length === 0) return '';

    const xMin = points[0].x;
    const xMax = points[points.length - 1].x || (xMin + 1);
    let yMin = Infinity, yMax = -Infinity;
    for (const p of points) { if (p.y < yMin) yMin = p.y; if (p.y > yMax) yMax = p.y; }
    if (opts.refLine != null) {
      yMin = Math.min(yMin, opts.refLine);
      yMax = Math.max(yMax, opts.refLine);
    }
    const yRange = (yMax - yMin) || Math.abs(yMax) || 1;
    yMin -= yRange * 0.05;
    yMax += yRange * 0.05;

    const sx = x => pL + ((x - xMin) / (xMax - xMin || 1)) * iW;
    const sy = y => pT + (1 - (y - yMin) / (yMax - yMin || 1)) * iH;

    const d = points.map((p, i) => (i === 0 ? 'M' : 'L') + sx(p.x).toFixed(1) + ',' + sy(p.y).toFixed(1)).join(' ');

    const fy = opts.formatY || (v => v.toFixed(2));
    const fx = opts.formatX || (v => new Date(v).toLocaleDateString('en-US', { month: 'short', year: '2-digit' }));

    const yTicks = 5;
    const yEls = [];
    for (let i = 0; i < yTicks; i++) {
      const y = yMin + (i / (yTicks - 1)) * (yMax - yMin);
      const yp = sy(y);
      yEls.push(`<line x1="${pL}" x2="${w - pR}" y1="${yp.toFixed(1)}" y2="${yp.toFixed(1)}" stroke="currentColor" stroke-opacity="0.15" stroke-dasharray="2 3"/>`);
      yEls.push(`<text x="${pL - 6}" y="${(yp + 5).toFixed(1)}" text-anchor="end" font-family="var(--mono)" font-size="14" fill="currentColor" opacity="0.7">${escape(fy(y))}</text>`);
    }

    const xTicks = 6;
    const xEls = [];
    for (let i = 0; i < xTicks; i++) {
      const x = xMin + (i / (xTicks - 1)) * (xMax - xMin);
      xEls.push(`<text x="${sx(x).toFixed(1)}" y="${(h - pB + 18).toFixed(1)}" text-anchor="middle" font-family="var(--mono)" font-size="14" fill="currentColor" opacity="0.7">${escape(fx(x))}</text>`);
    }

    let refEl = '';
    if (opts.refLine != null) {
      const ry = sy(opts.refLine);
      const refColor = opts.refColor || '#e8b14d';
      refEl = `<line x1="${pL}" x2="${w - pR}" y1="${ry.toFixed(1)}" y2="${ry.toFixed(1)}" stroke="${refColor}" stroke-width="1.5" stroke-dasharray="5 4"/>
        <text x="${(w - pR - 4).toFixed(1)}" y="${(ry - 4).toFixed(1)}" text-anchor="end" font-family="var(--mono)" font-size="14" font-weight="bold" fill="${refColor}">${escape(opts.refLabel || ('avg ' + fy(opts.refLine)))}</text>`;
    }

    // Stepped line: held flat between transition points, jumping at each one.
    let steppedEl = '';
    if (opts.steppedLine && opts.steppedLine.points && opts.steppedLine.points.length > 0) {
      const pts = opts.steppedLine.points;
      const segs = [];
      for (let i = 0; i < pts.length; i++) {
        const p = pts[i];
        if (i === 0) {
          segs.push('M' + sx(p.x).toFixed(1) + ',' + sy(p.y).toFixed(1));
        } else {
          segs.push('L' + sx(p.x).toFixed(1) + ',' + sy(pts[i - 1].y).toFixed(1));
          segs.push('L' + sx(p.x).toFixed(1) + ',' + sy(p.y).toFixed(1));
        }
      }
      if (opts.steppedLine.extendToEnd !== false && pts.length > 0) {
        segs.push('L' + sx(xMax).toFixed(1) + ',' + sy(pts[pts.length - 1].y).toFixed(1));
      }
      const sc = opts.steppedLine.color || '#e8b14d';
      const lastY = pts[pts.length - 1].y;
      steppedEl = `<path d="${segs.join(' ')}" fill="none" stroke="${sc}" stroke-width="1.5" stroke-dasharray="5 4"/>
        <text x="${(w - pR - 4).toFixed(1)}" y="${(sy(lastY) - 4).toFixed(1)}" text-anchor="end" font-family="var(--mono)" font-size="14" font-weight="bold" fill="${sc}">${escape(opts.steppedLine.label || ('avg ' + fy(lastY)))}</text>`;
    }

    const markEls = (opts.markers || []).map(m => {
      const x = sx(m.x);
      if (x < pL || x > w - pR) return '';
      const y = sy(m.y);
      const c = m.color || '#5a8794';
      const isSell = m.type === 'sell';
      const shape = isSell
        ? `<polygon points="${(x - 5.5).toFixed(1)},${(y - 5.5).toFixed(1)} ${(x + 5.5).toFixed(1)},${(y - 5.5).toFixed(1)} ${x.toFixed(1)},${(y + 5).toFixed(1)}" fill="${c}" stroke="var(--surface)" stroke-width="1.5"/>`
        : `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="4.5" fill="${c}" stroke="var(--surface)" stroke-width="1.5"/>`;
      return `<line x1="${x.toFixed(1)}" x2="${x.toFixed(1)}" y1="${pT}" y2="${(h - pB).toFixed(1)}" stroke="${c}" stroke-opacity="0.45" stroke-dasharray="2 4"/>${shape}`;
    }).join('');

    const lineColor = opts.color || '#5a8794';
    return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="width: 100%; height: auto; max-height: 360px; color: var(--text);">
      ${yEls.join('')}
      ${refEl}
      ${steppedEl}
      ${markEls}
      <path d="${d}" fill="none" stroke="${lineColor}" stroke-width="2"/>
      ${xEls.join('')}
    </svg>`;
  }

  async function ensureHoldingHistory(holding, range) {
    const key = (yahooSymbol(holding)) + '_' + range;
    const cached = state.historyCache[key];
    if (cached && !cached.error) return;
    if (state.historyLoading[key]) return;
    state.historyLoading[key] = true;
    render();
    try {
      const data = await fetchHoldingHistory(holding, range, intervalFor(range));
      state.historyCache[key] = { ...data, fetchedAt: Date.now() };
    } catch (e) {
      state.historyCache[key] = { points: [], currency: null, error: e.message || String(e) };
    } finally {
      state.historyLoading[key] = false;
      render();
    }
  }

  // Compute portfolio value over time. For each timestamp on the union timeline,
  // sum (sharesOwnedAtThatDate × priceAtThatDate) across holdings, converting to
  // the current display base via FX history (USDKRW=X) when needed.
  async function ensureValueHistory(range) {
    const cached = state.valueHistoryCache[range];
    if (cached && !cached.error) return;
    if (state.valueHistoryLoading[range]) return;
    state.valueHistoryLoading[range] = true;
    render();
    try {
      if (state.holdings.length === 0) throw new Error('No holdings to chart');
      const D = derive();
      const baseCcy = D.baseCcy;
      const interval = intervalFor(range);
      const fxNeeded = state.holdings.some(h => h.market === 'KR') && state.holdings.some(h => h.market === 'US')
                    || (baseCcy === 'KRW' && state.holdings.some(h => h.market === 'US'))
                    || (baseCcy === 'USD' && state.holdings.some(h => h.market === 'KR'));

      const symbolFetches = state.holdings.map(h =>
        fetchHoldingHistory(h, range, interval).then(data => ({ holding: h, data }), () => ({ holding: h, data: null }))
      );
      const fxFetch = fxNeeded ? fetchHistory('USDKRW=X', range, interval).catch(() => null) : Promise.resolve(null);
      const [results, fxData] = await Promise.all([Promise.all(symbolFetches), fxFetch]);

      const valid = results.filter(r => r.data && r.data.points.length > 0);
      if (valid.length === 0) throw new Error('No price history available for any holding');
      if (fxNeeded && !fxData) throw new Error('FX history (USDKRW) unavailable');

      // Build sorted union of timestamps from all sources
      const tsSet = new Set();
      valid.forEach(r => r.data.points.forEach(p => tsSet.add(p.x)));
      if (fxData) fxData.points.forEach(p => tsSet.add(p.x));
      const timestamps = [...tsSet].sort((a, b) => a - b);

      // priceAt: last known close at-or-before ts, via binary search
      const priceAt = (pts, ts) => {
        let lo = 0, hi = pts.length - 1;
        while (lo <= hi) {
          const mid = (lo + hi) >> 1;
          if (pts[mid].x <= ts) lo = mid + 1; else hi = mid - 1;
        }
        return hi >= 0 ? pts[hi].y : null;
      };

      const points = [];
      for (const ts of timestamps) {
        let total = 0;
        let anyContribution = false;
        let abort = false;
        const fx = fxData ? priceAt(fxData.points, ts) : null;
        for (const r of valid) {
          // Sum only lots already purchased at this ts
          const lotsAt = (r.holding.lots || []).filter(l => new Date(l.date).getTime() <= ts);
          if (lotsAt.length === 0) continue;
          const shares = lotsAt.reduce((s, l) => s + l.shares, 0);
          const price = priceAt(r.data.points, ts);
          if (price == null) continue;
          let value = shares * price;
          if (baseCcy === 'KRW' && r.holding.market === 'US') {
            if (fx == null) { abort = true; break; }
            value = value * fx;
          } else if (baseCcy === 'USD' && r.holding.market === 'KR') {
            if (fx == null) { abort = true; break; }
            value = value / fx;
          }
          total += value;
          anyContribution = true;
        }
        if (!abort && anyContribution) points.push({ x: ts, y: total });
      }
      if (points.length === 0) throw new Error('Could not compute any data points');
      state.valueHistoryCache[range] = { points, currency: baseCcy, fetchedAt: Date.now() };
    } catch (e) {
      state.valueHistoryCache[range] = { points: [], error: e.message || String(e) };
    } finally {
      state.valueHistoryLoading[range] = false;
      render();
    }
  }

  async function fetchFx() {
    try {
      const r = await withTimeout(fetch('https://api.exchangerate-api.com/v4/latest/USD'), 8000);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const d = await r.json();
      if (d?.rates?.KRW) return d.rates.KRW;
      throw new Error('No FX data');
    } catch (e) {
      try {
        const fx = await fetchYahoo('USDKRW=X');
        return fx.price;
      } catch (e2) {
        return null;
      }
    }
  }

  async function updateHoldingPrices() {
    if (state.holdings.length === 0) return;
    const results = await Promise.allSettled(
      state.holdings.map(async (h) => {
        try {
          return { id: h.id, ...(await fetchYahoo(yahooSymbol(h))) };
        } catch (e) {
          if (h.market === 'KR') {
            try {
              return { id: h.id, ...(await fetchYahoo(h.ticker + '.KQ')) };
            } catch (e2) { throw e2; }
          }
          throw e;
        }
      })
    );
    const fx = await fetchFx();
    const now = new Date().toISOString();
    const failed = [];
    state.holdings = state.holdings.map((h, i) => {
      const r = results[i];
      if (r.status === 'fulfilled' && typeof r.value.price === 'number') {
        return { ...h, currentPrice: r.value.price, currency: r.value.currency, lastPriceAt: now };
      }
      failed.push(`${h.ticker} (${r.reason?.message || 'unknown error'})`);
      return h;
    });
    if (fx) state.fxRate = fx;
    state.lastUpdated = now;
    if (failed.length) {
      state.error = 'Update failed for: ' + failed.join(' · ') + '. Try again later or check console.';
    }
    save();
  }

  async function updatePrices() {
    if (state.holdings.length === 0 && state.indicesUpdating) return;
    state.updating = true; state.error = null; render();
    try {
      // Fetch holding prices and the markets strip in parallel.
      const tasks = [updateIndices()];
      if (state.holdings.length > 0) tasks.push(updateHoldingPrices());
      await Promise.all(tasks);
    } catch (e) {
      console.error('[update] failed:', e);
      state.error = 'Price update failed: ' + (e?.message || 'unknown error');
    } finally {
      state.updating = false;
      render();
    }
  }

  // ---------- derived metrics ----------
  function derive() {
    const allHoldings = state.holdings;
    const f = state.marketFilter;
    const holdings = f === 'KR' ? allHoldings.filter(h => h.market === 'KR')
                  : f === 'US' ? allHoldings.filter(h => h.market === 'US')
                  : allHoldings;
    const fx = state.fxRate;
    const hasKR = holdings.some(h => h.market === 'KR');
    const hasUS = holdings.some(h => h.market === 'US');
    const allUS = holdings.length > 0 && !hasKR;
    const autoCcy = allUS ? 'USD' : 'KRW';
    // Honor user override; fall back to auto.
    const baseCcy = (state.displayCurrency === 'KRW' || state.displayCurrency === 'USD')
      ? state.displayCurrency : autoCcy;
    // FX needed whenever any holding's native currency differs from the chosen base.
    const needsFx = (baseCcy === 'KRW' && hasUS) || (baseCcy === 'USD' && hasKR);
    const fxOk = !needsFx || (fx && fx > 0);

    const toBase = (v, market) => {
      if (baseCcy === 'KRW') return market === 'KR' ? v : v * (fx || 0);
      return market === 'US' ? v : v / (fx || 1);
    };

    const items = holdings.map(h => {
      const t = lotsTotals(h.lots);
      const shares = t.shares;
      const cost = t.cost;
      const avgCost = t.avgCost;
      const lotCount = (h.lots || []).length;
      const hasPrice = h.currentPrice != null;
      const value = hasPrice ? shares * h.currentPrice : null;
      const pnl = hasPrice ? value - cost : null;
      const pct = hasPrice && cost > 0 ? (pnl / cost) * 100 : null;
      const cur = h.market === 'KR' ? 'KRW' : 'USD';
      const costBase = toBase(cost, h.market);
      const valueBase = hasPrice ? toBase(value, h.market) : costBase;
      const pnlBase = hasPrice ? valueBase - costBase : 0;
      return { h, shares, avgCost, lotCount, cost, hasPrice, value, pnl, pct, cur, costBase, valueBase, pnlBase };
    });

    const tCost = items.reduce((s, it) => s + it.costBase, 0);
    const tValue = items.reduce((s, it) => s + it.valueBase, 0);
    const tPnl = tValue - tCost;
    const tPct = tCost ? (tPnl / tCost) * 100 : 0;
    const anyPrice = items.some(it => it.hasPrice);

    const krItems = items.filter(it => it.h.market === 'KR');
    const usItems = items.filter(it => it.h.market === 'US');
    const krCost = krItems.reduce((s, it) => s + it.cost, 0);
    const krValue = krItems.reduce((s, it) => s + (it.hasPrice ? it.value : it.cost), 0);
    const usCost = usItems.reduce((s, it) => s + it.cost, 0);
    const usValue = usItems.reduce((s, it) => s + (it.hasPrice ? it.value : it.cost), 0);

    const byCat = {};
    items.forEach(it => {
      const cat = (it.h.category || '').trim() || UNCATEGORIZED;
      if (!byCat[cat]) byCat[cat] = { name: cat, value: 0, cost: 0, pnl: 0 };
      byCat[cat].value += it.valueBase;
      byCat[cat].cost += it.costBase;
      byCat[cat].pnl += it.pnlBase;
    });
    const catList = Object.values(byCat).sort((a, b) => b.value - a.value);

    const catOrder = [];
    const seen = new Set();
    holdings.forEach(h => {
      const c = (h.category || '').trim() || UNCATEGORIZED;
      if (!seen.has(c)) { seen.add(c); catOrder.push(c); }
    });
    const colorFor = (cat) => CAT_COLORS[Math.max(0, catOrder.indexOf(cat)) % CAT_COLORS.length];

    return {
      items, holdings, baseCcy, needsFx, fxOk, anyPrice,
      tCost, tValue, tPnl, tPct,
      krCost, krValue, krCount: krItems.length,
      usCost, usValue, usCount: usItems.length,
      catList, colorFor,
    };
  }

  // Display name: prefer human name, fall back to ticker.
  const displayName = (h) => h.name && h.name.trim() ? h.name : h.ticker;

  // ---------- charts ----------
  function donutSVG(data, size = 160) {
    const cx = size / 2, cy = size / 2, rOuter = size * 0.46, rInner = size * 0.30;
    const total = data.reduce((s, d) => s + d.value, 0);
    if (total === 0) return '';
    let angle = -Math.PI / 2;
    const gap = data.length > 1 ? 0.02 : 0;
    const paths = data.map((d) => {
      const slice = (d.value / total) * Math.PI * 2 - gap;
      const start = angle + gap / 2;
      const end = start + slice;
      angle += (d.value / total) * Math.PI * 2;
      const large = slice > Math.PI ? 1 : 0;
      const x1 = cx + rOuter * Math.cos(start), y1 = cy + rOuter * Math.sin(start);
      const x2 = cx + rOuter * Math.cos(end), y2 = cy + rOuter * Math.sin(end);
      const x3 = cx + rInner * Math.cos(end), y3 = cy + rInner * Math.sin(end);
      const x4 = cx + rInner * Math.cos(start), y4 = cy + rInner * Math.sin(start);
      const path = ['M', x1, y1, 'A', rOuter, rOuter, 0, large, 1, x2, y2,
        'L', x3, y3, 'A', rInner, rInner, 0, large, 0, x4, y4, 'Z'].join(' ');
      return `<path d="${path}" fill="${d.color}"/>`;
    }).join('');
    return `<svg class="donut-svg" viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">${paths}</svg>`;
  }

  // ---------- sparklines (compact line for indices strip) ----------
  function sparklineSVG(points, color) {
    const w = 90, h = 28;
    if (!points || points.length === 0) return '';
    let yMin = Infinity, yMax = -Infinity;
    for (const p of points) { if (p.y < yMin) yMin = p.y; if (p.y > yMax) yMax = p.y; }
    const range = (yMax - yMin) || Math.abs(yMax) || 1;
    const sx = i => (i / (points.length - 1 || 1)) * (w - 2) + 1;
    const sy = y => h - 2 - ((y - yMin) / range) * (h - 4);
    const d = points.map((p, i) => (i === 0 ? 'M' : 'L') + sx(i).toFixed(1) + ',' + sy(p.y).toFixed(1)).join(' ');
    return `<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" style="display: block;"><path d="${d}" fill="none" stroke="${color}" stroke-width="1.5"/></svg>`;
  }

  // ---------- templates ----------
  function tplMarketsStrip() {
    const cells = INDICES.map(idx => {
      const data = state.indices[idx.symbol];
      if (!data || data.error || data.price == null) {
        return `<div class="market-cell">
          <div class="market-label">${escape(idx.label)}</div>
          <div class="market-value text-dim">—</div>
          <div class="market-change text-dim">${data && data.error ? 'unavailable' : 'no data'}</div>
          <div class="market-spark"></div>
        </div>`;
      }
      const change = data.price - (data.prevClose || data.price);
      const changePct = data.prevClose > 0 ? (change / data.prevClose) * 100 : 0;
      const isGain = change >= 0;
      const color = isGain ? 'var(--gain)' : 'var(--loss)';
      const arrow = isGain ? '▲' : '▼';
      const isFx = idx.symbol === 'USDKRW=X';
      const fmtPrice = isFx
        ? data.price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
        : data.price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      // For sparkline color, base on overall trend (last vs first), not just last bar
      const trendUp = data.points && data.points.length > 1
        ? data.points[data.points.length - 1].y >= data.points[0].y
        : isGain;
      const sparkColor = trendUp ? 'var(--gain)' : 'var(--loss)';
      return `<div class="market-cell">
        <div class="market-label">${escape(idx.label)}</div>
        <div class="market-value">${fmtPrice}</div>
        <div class="market-change" style="color: ${color};">${arrow} ${isGain ? '+' : ''}${changePct.toFixed(2)}%</div>
        <div class="market-spark">${sparklineSVG(data.points, sparkColor)}</div>
      </div>`;
    }).join('');

    // Title bar status: show last fetch time if any
    const fetchedAts = INDICES
      .map(idx => state.indices[idx.symbol]?.fetchedAt)
      .filter(t => typeof t === 'number');
    const latest = fetchedAts.length > 0 ? Math.max(...fetchedAts) : null;
    const status = state.indicesUpdating ? 'updating…'
      : latest ? 'updated ' + new Date(latest).toLocaleString('en-US', { month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit' })
      : 'click Auto Update to load';

    return `<section class="markets-strip">
      <div class="markets-titlebar">
        <span>▣ MARKETS</span>
        <span style="margin-left: auto; opacity: 0.85; font-weight: normal; font-size: 14px; font-family: var(--mono);">${escape(status)}</span>
      </div>
      <div class="markets-grid">${cells}</div>
    </section>`;
  }
