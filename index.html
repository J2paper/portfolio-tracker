<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Portfolio Dashboard</title>
<meta name="color-scheme" content="dark light">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #161616;
    --surface-hi: #1f1f1f;
    --surface-2: #232323;
    --border: rgba(255, 255, 255, 0.08);
    --border-hi: rgba(255, 255, 255, 0.18);
    --text: #ffffff;
    --muted: #b5b5b5;
    --dim: #858585;
    --dim-2: #5a5a5a;
    --accent: #fbbf24;
    --accent-border: rgba(251, 191, 36, 0.35);
    --accent-bg: rgba(251, 191, 36, 0.10);
    --gain: #10b981;
    --gain-bg: rgba(16, 185, 129, 0.12);
    --loss: #ef4444;
    --loss-bg: rgba(239, 68, 68, 0.12);
    --info: #60a5fa;
    --track: rgba(255, 255, 255, 0.05);
    --track-2: rgba(255, 255, 255, 0.08);
    --track-line: rgba(255, 255, 255, 0.18);
    --hover: rgba(255, 255, 255, 0.03);
    --hover-2: rgba(255, 255, 255, 0.06);
    --serif: 'Fraunces', Georgia, 'Times New Roman', serif;
    --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    color-scheme: dark;
  }
  [data-theme="light"] {
    --bg: #fafafa;
    --surface: #ffffff;
    --surface-hi: #ffffff;
    --surface-2: #f1f1f1;
    --border: rgba(0, 0, 0, 0.08);
    --border-hi: rgba(0, 0, 0, 0.18);
    --text: #0a0a0a;
    --muted: #525252;
    --dim: #737373;
    --dim-2: #a3a3a3;
    --accent: #b45309;
    --accent-border: rgba(180, 83, 9, 0.35);
    --accent-bg: rgba(180, 83, 9, 0.08);
    --gain: #047857;
    --gain-bg: rgba(4, 120, 87, 0.10);
    --loss: #b91c1c;
    --loss-bg: rgba(185, 28, 28, 0.10);
    --info: #1d4ed8;
    --track: rgba(0, 0, 0, 0.05);
    --track-2: rgba(0, 0, 0, 0.08);
    --track-line: rgba(0, 0, 0, 0.18);
    --hover: rgba(0, 0, 0, 0.03);
    --hover-2: rgba(0, 0, 0, 0.06);
    color-scheme: light;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: var(--sans); }
  body { min-height: 100vh; padding: 24px 24px 80px; }
  .root { max-width: 1400px; margin: 0 auto; }
  button { font-family: inherit; cursor: pointer; }
  input, select { font-family: inherit; }
  input::placeholder { color: var(--dim); }
  input:focus, select:focus { outline: 1px solid var(--accent); }
  button:hover { filter: brightness(1.15); }
  button:disabled:hover { filter: none; }
  [data-theme="light"] button:hover { filter: brightness(0.95); }

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .spin { animation: spin 1s linear infinite; }
  .fade { animation: fadeIn .4s ease; }

  /* Header */
  header.head { display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 24px; gap: 24px; flex-wrap: wrap; animation: fadeIn .5s ease; }
  .eyebrow { font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; color: var(--accent); margin-bottom: 6px; }
  h1.title { font-family: var(--serif); font-size: 36px; font-weight: 500; letter-spacing: -0.02em; }
  .head-right { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
  .head-meta { display: flex; align-items: center; gap: 14px; color: var(--muted); font-size: 12px; font-family: var(--mono); }
  .head-meta-item { display: flex; align-items: center; gap: 6px; }

  /* Profile bar */
  .profile-bar { display: flex; align-items: center; gap: 8px; }
  .profile-bar-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; color: var(--muted); margin-right: 2px; }
  .profile-select { background: var(--surface); border: 1px solid var(--border-hi); color: var(--text); border-radius: 8px; padding: 7px 10px; font-size: 13px; font-weight: 500; min-width: 140px; cursor: pointer; }
  .profile-select:hover { border-color: var(--accent-border); }

  /* Toolbar */
  .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; padding: 14px 0 18px; border-bottom: 1px solid var(--border); margin-bottom: 24px; animation: fadeIn .55s ease; }
  .btn-primary, .btn-ghost, .btn-soft { display: inline-flex; align-items: center; gap: 6px; border-radius: 8px; font-size: 13px; font-weight: 500; transition: filter .15s; }
  .btn-primary { background: var(--text); color: var(--bg); border: none; padding: 9px 14px; font-weight: 600; }
  .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border-hi); padding: 8px 14px; }
  .btn-soft { background: var(--surface-hi); color: var(--text); border: 1px solid var(--border); padding: 8px 12px; }
  .btn-ghost:disabled, .btn-primary:disabled, .btn-soft:disabled { opacity: 0.4; cursor: not-allowed; }
  .save-status { margin-left: auto; color: var(--dim); font-size: 11px; font-family: var(--mono); display: flex; align-items: center; gap: 6px; }
  .toolbar-divider { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }

  /* KPI row */
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; animation: fadeIn .6s ease; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px 20px; position: relative; overflow: hidden; }
  .kpi-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .kpi-value { font-family: var(--serif); font-size: 32px; font-weight: 500; letter-spacing: -0.02em; line-height: 1.1; }
  .kpi-sub { font-family: var(--mono); font-size: 12px; margin-top: 8px; display: flex; align-items: center; gap: 6px; }
  .kpi-accent-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent); }
  .kpi-accent-bar.gain { background: var(--gain); }
  .kpi-accent-bar.loss { background: var(--loss); }
  .kpi-accent-bar.muted { background: var(--dim-2); }

  /* Charts grid */
  .charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-bottom: 24px; animation: fadeIn .65s ease; }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; min-height: 260px; }
  .chart-head { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .chart-icon { color: var(--accent); display: flex; }
  .chart-title { font-family: var(--serif); font-size: 17px; font-weight: 500; letter-spacing: -0.01em; }
  .chart-meta { font-family: var(--mono); font-size: 11px; color: var(--dim); margin-left: auto; }
  .chart-empty { color: var(--muted); font-size: 13px; padding: 32px 0; text-align: center; line-height: 1.6; }

  /* Donut chart layout */
  .donut-wrap { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
  .donut-svg { flex-shrink: 0; }
  .donut-center { font-family: var(--mono); }
  .legend-list { flex: 1; display: flex; flex-direction: column; gap: 8px; min-width: 160px; }
  .legend-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: 13px; }
  .legend-name { display: flex; align-items: center; gap: 8px; min-width: 0; overflow: hidden; }
  .legend-name span:last-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .legend-pct { font-family: var(--mono); font-weight: 600; flex-shrink: 0; }
  .dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

  /* Bar chart rows */
  .bar-list { display: flex; flex-direction: column; gap: 10px; }
  .bar-row { display: grid; grid-template-columns: minmax(80px, 150px) 1fr auto; gap: 10px; align-items: center; font-size: 12px; }
  .bar-label { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar-track { position: relative; height: 22px; background: var(--track); border-radius: 4px; overflow: hidden; }
  .bar-fill { position: absolute; top: 0; bottom: 0; border-radius: 4px; transition: width .4s ease; }
  .bar-value { font-family: var(--mono); font-size: 11px; font-weight: 600; text-align: right; white-space: nowrap; }

  /* Diverging bar (P/L) */
  .div-list { display: flex; flex-direction: column; gap: 9px; }
  .div-row { display: grid; grid-template-columns: minmax(80px, 150px) 1fr auto; gap: 10px; align-items: center; font-size: 12px; }
  .div-track { position: relative; height: 22px; background: var(--track); border-radius: 4px; }
  .div-track::before { content: ''; position: absolute; left: 50%; top: 0; bottom: 0; width: 1px; background: var(--track-line); }
  .div-fill { position: absolute; top: 2px; bottom: 2px; border-radius: 3px; transition: all .4s ease; }
  .div-fill.pos { background: var(--gain); left: 50%; }
  .div-fill.neg { background: var(--loss); right: 50%; }

  /* Stacked horizontal bar (market split) */
  .stack-bar { display: flex; height: 36px; border-radius: 8px; overflow: hidden; margin-bottom: 14px; background: var(--track); }
  .stack-seg { display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 12px; font-weight: 600; color: #0a0a0a; transition: width .4s ease; }
  .stack-legend { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .stack-card { background: var(--hover); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
  .stack-card-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 6px; }
  .stack-card-value { font-family: var(--mono); font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .stack-card-sub { font-family: var(--mono); font-size: 11px; }

  /* Holdings table */
  .holdings-section { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; animation: fadeIn .7s ease; }
  .holdings-head { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .holdings-title { font-family: var(--serif); font-size: 18px; font-weight: 500; letter-spacing: -0.01em; }
  .holdings-meta { font-family: var(--mono); font-size: 11px; color: var(--dim); margin-left: auto; }
  .table-wrap { overflow-x: auto; }
  table.holdings { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 900px; }
  table.holdings thead th { text-align: left; font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; color: var(--muted); padding: 10px 12px; border-bottom: 1px solid var(--border); font-weight: 500; user-select: none; cursor: pointer; white-space: nowrap; }
  table.holdings thead th.no-sort { cursor: default; }
  table.holdings thead th.sorted { color: var(--accent); }
  table.holdings tbody td { padding: 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  table.holdings tbody tr:last-child td { border-bottom: none; }
  table.holdings tbody tr:hover { background: var(--hover); }
  .ticker-cell { display: flex; flex-direction: column; gap: 2px; }
  .ticker-display { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ticker-sub { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .market-tag { font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em; padding: 2px 6px; border-radius: 4px; border: 1px solid; display: inline-block; }
  .market-tag.kr { color: var(--accent); border-color: var(--accent-border); background: var(--accent-bg); }
  .market-tag.us { color: var(--info); border-color: rgba(96, 165, 250, 0.35); background: rgba(96, 165, 250, 0.10); }
  [data-theme="light"] .market-tag.us { border-color: rgba(29, 78, 216, 0.35); background: rgba(29, 78, 216, 0.08); }
  .cat-tag { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 10px; border: 1px solid; display: inline-block; }
  .num { font-family: var(--mono); font-size: 13px; font-weight: 500; text-align: right; }
  .num-strong { font-family: var(--mono); font-size: 13px; font-weight: 600; text-align: right; }
  .text-right { text-align: right; }
  .text-gain { color: var(--gain); }
  .text-loss { color: var(--loss); }
  .text-muted { color: var(--muted); }
  .text-dim { color: var(--dim); }
  .icon-btn { background: transparent; border: none; color: var(--muted); padding: 6px; display: inline-flex; border-radius: 6px; }
  .icon-btn:hover { color: var(--text); background: var(--hover-2); }
  .weight-cell { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
  .weight-track { width: 60px; height: 6px; background: var(--track-2); border-radius: 3px; overflow: hidden; }
  .weight-fill { height: 100%; background: var(--accent); border-radius: 3px; }

  /* Empty state */
  .empty { text-align: center; padding: 60px 20px; border: 1px dashed var(--border); border-radius: 12px; }
  .empty-title { font-family: var(--serif); font-size: 24px; margin-bottom: 8px; }
  .empty-sub { color: var(--muted); font-size: 14px; line-height: 1.6; }
  .empty-hint { color: var(--dim); font-size: 12px; margin-top: 14px; font-family: var(--mono); }

  /* Error / info bar */
  .error-bar { display: flex; align-items: center; justify-content: space-between; background: var(--loss-bg); border: 1px solid rgba(239, 68, 68, 0.25); border-radius: 8px; padding: 10px 14px; color: var(--loss); font-size: 13px; margin-bottom: 16px; }
  .error-close { background: transparent; border: none; color: inherit; display: flex; padding: 2px; }

  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; padding: 16px; z-index: 50; animation: fadeIn .2s ease; }
  .modal { background: var(--surface-hi); border: 1px solid var(--border-hi); border-radius: 14px; padding: 24px; width: 100%; max-width: 460px; max-height: 90vh; overflow: auto; }
  .modal.modal-wide { max-width: 580px; }
  .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .modal-title { font-family: var(--serif); font-size: 22px; font-weight: 500; }
  .modal-sub { color: var(--muted); font-size: 13px; line-height: 1.6; margin-bottom: 16px; }
  .field { margin-bottom: 14px; }
  .lbl { display: block; font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em; color: var(--muted); margin-bottom: 6px; }
  .input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-family: var(--mono); font-size: 14px; font-weight: 500; }
  .seg-group { display: flex; gap: 6px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 4px; }
  .seg-btn { flex: 1; background: transparent; border: none; color: var(--muted); padding: 8px 12px; font-size: 13px; font-weight: 500; border-radius: 6px; }
  .seg-btn.active { background: var(--surface-2); color: var(--text); }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Profile manager */
  .profile-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .profile-row { display: flex; gap: 8px; align-items: center; }
  .profile-row.active { position: relative; }
  .profile-row.active::before { content: ''; position: absolute; left: -10px; top: 50%; transform: translateY(-50%); width: 3px; height: 18px; background: var(--accent); border-radius: 2px; }
  .profile-row .input { flex: 1; }
  .profile-badge { font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em; padding: 2px 6px; border-radius: 4px; color: var(--accent); border: 1px solid var(--accent-border); background: var(--accent-bg); white-space: nowrap; }
  .profile-add-row { display: flex; gap: 8px; align-items: center; padding-top: 12px; border-top: 1px solid var(--border); }
  .profile-add-row .input { flex: 1; }

  /* SVG icons */
  .icon { width: 1em; height: 1em; display: inline-block; vertical-align: -0.125em; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* Responsive */
  @media (max-width: 1100px) {
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
    .charts-grid { grid-template-columns: 1fr; }
    header.head { flex-direction: column; align-items: flex-start; }
    .head-right { align-items: flex-start; }
  }
  @media (max-width: 640px) {
    body { padding: 16px 12px 60px; }
    h1.title { font-size: 28px; }
    .kpi-row { grid-template-columns: 1fr 1fr; gap: 10px; }
    .kpi { padding: 14px 16px; }
    .kpi-value { font-size: 24px; }
    .chart-card { padding: 16px; }
    .holdings-section { padding: 14px; }
    .save-status { margin-left: 0; flex-basis: 100%; }
  }
</style>
</head>

<div class="root" id="app"></div>
<input type="file" id="import-file" accept="application/json,.json" style="display:none">

    sun: '<svg class="icon" viewBox="0 0 24 24" width="14" height="14"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>',
    moon: '<svg class="icon" viewBox="0 0 24 24" width="14" height="14"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>',
    users: '<svg class="icon" viewBox="0 0 24 24" width="14" height="14"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/><circle cx="9" cy="7" r="4"/></svg>',
  };

  // ---------- design tokens ----------
  const CAT_COLORS = ['#d4a373', '#a7c4a0', '#b4a7d6', '#e5c07b', '#c39ea0', '#8ab0ab', '#d2b48c', '#9ca986', '#bf9b7a', '#9bb4cc'];
  const UNCATEGORIZED = 'Uncategorized';
  const SUGGESTED = ['Tech', 'Semiconductors', 'Finance', 'Healthcare', 'Energy', 'Consumer', 'Industrial', 'ETF', 'Dividend', 'Growth'];
  const STORAGE_KEY = 'portfolio.v2';
  const STORAGE_KEY_V1 = 'portfolio.v1';
  const THEME_KEY = 'portfolio.theme';
  const KR_COLOR = '#fbbf24';
  const US_COLOR = '#60a5fa';

  // ---------- formatters ----------
  const fmtKRW = (n) => '₩' + Math.round(n).toLocaleString('en-US');
  const fmtUSD = (n) => '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const fmtMoney = (n, c) => (c === 'KRW' ? fmtKRW(n) : fmtUSD(n));
  const fmtKRWcompact = (n) => {
    const abs = Math.abs(n);
    if (abs >= 1e8) return '₩' + (n / 1e8).toFixed(2) + 'B';
    if (abs >= 1e6) return '₩' + (n / 1e6).toFixed(2) + 'M';
    if (abs >= 1e3) return '₩' + (n / 1e3).toFixed(1) + 'K';
    return '₩' + Math.round(n).toLocaleString('en-US');
  };
  const fmtUSDcompact = (n) => {
    const abs = Math.abs(n);
    if (abs >= 1e9) return '$' + (n / 1e9).toFixed(2) + 'B';
    if (abs >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
    if (abs >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'K';
    return '$' + Math.round(n).toLocaleString('en-US');
  };
  const fmtPct = (n) => (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
  const fmtDate = (iso) => {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleString('en-US', { month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit' });
  };
  const escape = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

  // ---------- state ----------
  const state = {
    profiles: [],
    activeProfileId: null,
    // Mirrors of the active profile, kept in sync via syncFromActive/syncToActive
    holdings: [],
    fxRate: null,
    lastUpdated: null,
    // UI state
    updating: false,
    saveStatus: 'idle',
    error: null,
    info: null,
    dialog: null,
    sort: { key: 'value', dir: 'desc' },
    theme: 'dark',
  };

  // ---------- profile helpers ----------
  function makeProfileId() {
    return 'p_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }
  function newProfile(name) {
    return { id: makeProfileId(), name: name || 'Default', holdings: [], fxRate: null, lastUpdated: null };
  }
  function getActive() {
    return state.profiles.find(p => p.id === state.activeProfileId) || state.profiles[0];
  }
  function syncFromActive() {
    const p = getActive();
    if (!p) return;
    state.activeProfileId = p.id;
    state.holdings = p.holdings;
    state.fxRate = p.fxRate;
    state.lastUpdated = p.lastUpdated;
  }
  function syncToActive() {
    const p = getActive();
    if (!p) return;
    p.holdings = state.holdings;
    p.fxRate = state.fxRate;
    p.lastUpdated = state.lastUpdated;
  }

  // ---------- persistence (localStorage) ----------
  function hasLocalStorage() {
    try {
      const k = '__test__';
      localStorage.setItem(k, '1');
      localStorage.removeItem(k);
      return true;
    } catch (_) { return false; }
  }

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const d = JSON.parse(raw);
        if (Array.isArray(d.profiles) && d.profiles.length > 0) {
          state.profiles = d.profiles.map(p => ({
            id: p.id || makeProfileId(),
            name: p.name || 'Profile',
            holdings: Array.isArray(p.holdings) ? p.holdings : [],
            fxRate: typeof p.fxRate === 'number' ? p.fxRate : null,
            lastUpdated: p.lastUpdated || null,
          }));
          state.activeProfileId = (d.activeProfileId && state.profiles.some(p => p.id === d.activeProfileId))
            ? d.activeProfileId : state.profiles[0].id;
          syncFromActive();
          return;
        }
      }
      // Migrate from v1 single-portfolio format
      const rawV1 = localStorage.getItem(STORAGE_KEY_V1);
      if (rawV1) {
        const d1 = JSON.parse(rawV1);
        const p = newProfile('Default');
        p.holdings = Array.isArray(d1.holdings) ? d1.holdings : [];
        p.fxRate = typeof d1.fxRate === 'number' ? d1.fxRate : null;
        p.lastUpdated = d1.lastUpdated || null;
        state.profiles = [p];
        state.activeProfileId = p.id;
        syncFromActive();
        save();
        return;
      }
    } catch (e) {
      console.error('Load failed:', e);
    }
    // Fresh start
    state.profiles = [newProfile('Default')];
    state.activeProfileId = state.profiles[0].id;
    syncFromActive();
  }

  function save() {
    try {
      syncToActive();
      const data = JSON.stringify({
        version: 2,
        activeProfileId: state.activeProfileId,
        profiles: state.profiles,
      });
      localStorage.setItem(STORAGE_KEY, data);
      state.saveStatus = 'saved';
      render();
      setTimeout(() => { if (state.saveStatus === 'saved') { state.saveStatus = 'idle'; render(); } }, 1500);
    } catch (e) {
      console.error('Save failed:', e);
      state.saveStatus = 'error';
      state.error = 'Save failed: ' + e.message;
      render();
    }
  }

  function loadTheme() {
    try {
      const t = localStorage.getItem(THEME_KEY);
      if (t === 'light' || t === 'dark') return t;
    } catch (_) {}
    return 'dark';
  }
  function applyTheme() {
    document.documentElement.dataset.theme = state.theme;
  }
  function toggleTheme() {
    state.theme = state.theme === 'dark' ? 'light' : 'dark';
    applyTheme();
    try { localStorage.setItem(THEME_KEY, state.theme); } catch (_) {}
    render();
  }

  // ---------- profile actions ----------
  function switchProfile(id) {
    if (!id || id === state.activeProfileId) return;
    syncToActive();
    state.activeProfileId = id;
    syncFromActive();
    state.error = null;
    save();
  }
  function addProfile(name) {
    const trimmed = (name || '').trim();
    if (!trimmed) return;
    syncToActive();
    const p = newProfile(trimmed);
    state.profiles.push(p);
    state.activeProfileId = p.id;
    syncFromActive();
    save();
  }
  function renameProfile(id, name) {
    const trimmed = (name || '').trim();
    if (!trimmed) return;
    const p = state.profiles.find(x => x.id === id);
    if (p) { p.name = trimmed; save(); }
  }
  function deleteProfile(id) {
    if (state.profiles.length <= 1) { state.error = 'At least one profile is required.'; render(); return; }
    const p = state.profiles.find(x => x.id === id);
    if (!p) return;
    if (!confirm(`Delete profile "${p.name}" and all its holdings? This cannot be undone.`)) return;
    state.profiles = state.profiles.filter(x => x.id !== id);
    if (state.activeProfileId === id) {
      state.activeProfileId = state.profiles[0].id;
      syncFromActive();
    }
    save();
  }

  // ---------- backup / restore (file based) ----------
  function exportJSON() {
    try {
      syncToActive();
      const payload = {
        version: 2,
        exportedAt: new Date().toISOString(),
        activeProfileId: state.activeProfileId,
        profiles: state.profiles,
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const today = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = `portfolio-${today}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      const total = state.profiles.reduce((s, p) => s + p.holdings.length, 0);
      state.info = `Backup downloaded (${state.profiles.length} profile${state.profiles.length === 1 ? '' : 's'}, ${total} holdings)`;
      render();
      setTimeout(() => { if (state.info) { state.info = null; render(); } }, 2500);
    } catch (e) {
      state.error = 'Backup failed: ' + e.message;
      render();
    }
  }

  function normalizeHolding(h) {
    return {
      id: h.id || (Date.now().toString(36) + Math.random().toString(36).slice(2, 7)),
      ticker: String(h.ticker).toUpperCase(),
      name: h.name || '',
      market: h.market,
      shares: Number(h.shares),
      buyPrice: Number(h.buyPrice),
      buyDate: h.buyDate || new Date().toISOString().slice(0, 10),
      category: h.category || '',
      currentPrice: typeof h.currentPrice === 'number' ? h.currentPrice : null,
      currency: h.currency || (h.market === 'KR' ? 'KRW' : 'USD'),
      lastPriceAt: h.lastPriceAt || null,
    };
  }
  function isValidHolding(h) {
    return h && typeof h === 'object' && typeof h.ticker === 'string'
      && (h.market === 'KR' || h.market === 'US')
      && Number(h.shares) > 0 && Number(h.buyPrice) > 0;
  }

  function importJSON(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const d = JSON.parse(ev.target.result);
        if (Array.isArray(d.profiles)) {
          // v2 format — replace all profiles
          const profiles = d.profiles.map(p => ({
            id: p.id || makeProfileId(),
            name: p.name || 'Profile',
            holdings: (Array.isArray(p.holdings) ? p.holdings : []).filter(isValidHolding).map(normalizeHolding),
            fxRate: typeof p.fxRate === 'number' ? p.fxRate : null,
            lastUpdated: p.lastUpdated || null,
          })).filter(p => p.id);
          if (profiles.length === 0) throw new Error('No valid profiles in file');
          const totalH = profiles.reduce((s, p) => s + p.holdings.length, 0);
          if (!confirm(
            `Restore ${profiles.length} profile(s) with ${totalH} holdings?\n` +
            `All current profiles (${state.profiles.length}) will be replaced.`
          )) return;
          state.profiles = profiles;
          state.activeProfileId = (d.activeProfileId && profiles.some(p => p.id === d.activeProfileId))
            ? d.activeProfileId : profiles[0].id;
          syncFromActive();
          state.error = null;
          save();
          state.info = `Restored ${profiles.length} profile(s)`;
          render();
          setTimeout(() => { if (state.info) { state.info = null; render(); } }, 2500);
        } else if (Array.isArray(d.holdings)) {
          // v1 format — import as a new profile
          const valid = d.holdings.filter(isValidHolding).map(normalizeHolding);
          if (valid.length === 0) throw new Error('No valid holdings in file');
          const baseName = 'Imported';
          let name = baseName;
          let i = 2;
          while (state.profiles.some(p => p.name === name)) name = baseName + ' ' + (i++);
          if (!confirm(`Import ${valid.length} holdings as a new profile "${name}"?`)) return;
          syncToActive();
          const p = newProfile(name);
          p.holdings = valid;
          p.fxRate = typeof d.fxRate === 'number' ? d.fxRate : null;
          p.lastUpdated = d.lastUpdated || null;
          state.profiles.push(p);
          state.activeProfileId = p.id;
          syncFromActive();
          state.error = null;
          save();
          state.info = `Imported ${valid.length} holdings into "${name}"`;
          render();
          setTimeout(() => { if (state.info) { state.info = null; render(); } }, 2500);
        } else {
          throw new Error('Unrecognized backup format');
        }
      } catch (e) {
        state.error = 'Restore failed: ' + e.message;
        render();
      }
    };
    reader.onerror = () => { state.error = 'Could not read file'; render(); };
    reader.readAsText(file);
  }

  // ---------- holding actions ----------
  function addOrUpdate(data, editId) {
    if (editId) {
      state.holdings = state.holdings.map(h => h.id === editId ? { ...h, ...data } : h);
    } else {
      state.holdings = [...state.holdings, {
        id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
        ...data, currentPrice: null, lastPriceAt: null,
      }];
    }
    state.dialog = null;
    save();
  }

  function remove(id) {
    const h = state.holdings.find(x => x.id === id);
    if (h && !confirm(`Delete ${h.ticker}${h.name ? ' (' + h.name + ')' : ''}?`)) return;
    state.holdings = state.holdings.filter(h => h.id !== id);
    save();
  }

  function submitPrices() {
    const now = new Date().toISOString();
    const updated = state.holdings.map(h => {
      const input = document.querySelector(`[data-price-id="${h.id}"]`);
      const v = parseFloat(input?.value);
      if (!isNaN(v) && v > 0) {
        return { ...h, currentPrice: v, currency: h.market === 'KR' ? 'KRW' : 'USD', lastPriceAt: now };
      }
      return h;
    });
    const fxInput = document.getElementById('manual-fx');
    const fx = parseFloat(fxInput?.value);
    state.holdings = updated;
    if (!isNaN(fx) && fx > 0) state.fxRate = fx;
    state.lastUpdated = now;
    state.dialog = null;
    save();
  }

  // ---------- price fetch ----------
  function yahooSymbol(h) {
    if (h.market === 'US') return h.ticker;
    return h.ticker + '.KS';
  }

  const PROXIES = [
    (u) => 'https://corsproxy.io/?' + encodeURIComponent(u),
    (u) => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
    (u) => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u),
    (u) => 'https://thingproxy.freeboard.io/fetch/' + u,
  ];

  function withTimeout(promise, ms) {
    return Promise.race([
      promise,
      new Promise((_, rej) => setTimeout(() => rej(new Error('Timeout ' + ms + 'ms')), ms)),
    ]);
  }

  async function fetchYahoo(symbol) {
    const url = 'https://query1.finance.yahoo.com/v8/finance/chart/' + encodeURIComponent(symbol);
    let lastErr;
    for (let i = 0; i < PROXIES.length; i++) {
      try {
        const proxiedUrl = PROXIES[i](url);
        const r = await withTimeout(fetch(proxiedUrl), 10000);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const data = await r.json();
        const meta = data?.chart?.result?.[0]?.meta;
        if (meta && typeof meta.regularMarketPrice === 'number') {
          return { price: meta.regularMarketPrice, currency: meta.currency };
        }
        throw new Error('No price in response');
      } catch (e) {
        lastErr = e;
      }
    }
    throw lastErr || new Error('All proxies failed');
  }

  async function fetchFx() {
    try {
      const r = await withTimeout(fetch('https://api.exchangerate-api.com/v4/latest/USD'), 8000);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const d = await r.json();
      if (d?.rates?.KRW) return d.rates.KRW;
      throw new Error('No FX data');
    } catch (e) {
      try {
        const fx = await fetchYahoo('USDKRW=X');
        return fx.price;
      } catch (e2) {
        return null;
      }
    }
  }

  async function updatePrices() {
    if (state.holdings.length === 0) return;
    state.updating = true; state.error = null; render();
    try {
      const results = await Promise.allSettled(
        state.holdings.map(async (h) => {
          try {
            return { id: h.id, ...(await fetchYahoo(yahooSymbol(h))) };
          } catch (e) {
            if (h.market === 'KR') {
              try {
                return { id: h.id, ...(await fetchYahoo(h.ticker + '.KQ')) };
              } catch (e2) { throw e2; }
            }
            throw e;
          }
        })
      );
      const fx = await fetchFx();
      const now = new Date().toISOString();
      const failed = [];
      state.holdings = state.holdings.map((h, i) => {
        const r = results[i];
        if (r.status === 'fulfilled' && typeof r.value.price === 'number') {
          return { ...h, currentPrice: r.value.price, currency: r.value.currency, lastPriceAt: now };
        }
        failed.push(`${h.ticker} (${r.reason?.message || 'unknown error'})`);
        return h;
      });
      if (fx) state.fxRate = fx;
      state.lastUpdated = now;
      if (failed.length) {
        state.error = 'Update failed for: ' + failed.join(' · ') + '. Try again later or check console.';
      }
      save();
    } catch (e) {
      console.error('[update] failed:', e);
      state.error = 'Price update failed: ' + (e?.message || 'unknown error');
    } finally {
      state.updating = false;
      render();
    }
  }

  // ---------- derived metrics ----------
  function derive() {
    const holdings = state.holdings;
    const fx = state.fxRate;
    const hasKR = holdings.some(h => h.market === 'KR');
    const hasUS = holdings.some(h => h.market === 'US');
    const allUS = holdings.length > 0 && !hasKR;
    const baseCcy = allUS ? 'USD' : 'KRW';
    const needsFx = hasKR && hasUS;
    const fxOk = !needsFx || (fx && fx > 0);

    const toBase = (v, market) => {
      if (baseCcy === 'KRW') return market === 'KR' ? v : v * (fx || 0);
      return market === 'US' ? v : v / (fx || 1);
    };

    const items = holdings.map(h => {
      const cost = h.shares * h.buyPrice;
      const hasPrice = h.currentPrice != null;
      const value = hasPrice ? h.shares * h.currentPrice : null;
      const pnl = hasPrice ? value - cost : null;
      const pct = hasPrice ? (pnl / cost) * 100 : null;
      const cur = h.market === 'KR' ? 'KRW' : 'USD';
      const costBase = toBase(cost, h.market);
      const valueBase = hasPrice ? toBase(value, h.market) : costBase;
      const pnlBase = hasPrice ? valueBase - costBase : 0;
      return { h, cost, hasPrice, value, pnl, pct, cur, costBase, valueBase, pnlBase };
    });

    const tCost = items.reduce((s, it) => s + it.costBase, 0);
    const tValue = items.reduce((s, it) => s + it.valueBase, 0);
    const tPnl = tValue - tCost;
    const tPct = tCost ? (tPnl / tCost) * 100 : 0;
    const anyPrice = items.some(it => it.hasPrice);

    const krItems = items.filter(it => it.h.market === 'KR');
    const usItems = items.filter(it => it.h.market === 'US');
    const krCost = krItems.reduce((s, it) => s + it.cost, 0);
    const krValue = krItems.reduce((s, it) => s + (it.hasPrice ? it.value : it.cost), 0);
    const usCost = usItems.reduce((s, it) => s + it.cost, 0);
    const usValue = usItems.reduce((s, it) => s + (it.hasPrice ? it.value : it.cost), 0);

    const byCat = {};
    items.forEach(it => {
      const cat = (it.h.category || '').trim() || UNCATEGORIZED;
      if (!byCat[cat]) byCat[cat] = { name: cat, value: 0, cost: 0, pnl: 0 };
      byCat[cat].value += it.valueBase;
      byCat[cat].cost += it.costBase;
      byCat[cat].pnl += it.pnlBase;
    });
    const catList = Object.values(byCat).sort((a, b) => b.value - a.value);

    const catOrder = [];
    const seen = new Set();
    holdings.forEach(h => {
      const c = (h.category || '').trim() || UNCATEGORIZED;
      if (!seen.has(c)) { seen.add(c); catOrder.push(c); }
    });
    const colorFor = (cat) => CAT_COLORS[Math.max(0, catOrder.indexOf(cat)) % CAT_COLORS.length];

    return {
      items, holdings, baseCcy, needsFx, fxOk, anyPrice,
      tCost, tValue, tPnl, tPct,
      krCost, krValue, krCount: krItems.length,
      usCost, usValue, usCount: usItems.length,
      catList, colorFor,
    };
  }

  // Display name: prefer human name, fall back to ticker.
  const displayName = (h) => h.name && h.name.trim() ? h.name : h.ticker;

  // ---------- charts ----------
  function donutSVG(data, size = 160) {
    const cx = size / 2, cy = size / 2, rOuter = size * 0.46, rInner = size * 0.30;
    const total = data.reduce((s, d) => s + d.value, 0);
    if (total === 0) return '';
    let angle = -Math.PI / 2;
    const gap = data.length > 1 ? 0.02 : 0;
    const paths = data.map((d) => {
      const slice = (d.value / total) * Math.PI * 2 - gap;
      const start = angle + gap / 2;
      const end = start + slice;
      angle += (d.value / total) * Math.PI * 2;
      const large = slice > Math.PI ? 1 : 0;
      const x1 = cx + rOuter * Math.cos(start), y1 = cy + rOuter * Math.sin(start);
      const x2 = cx + rOuter * Math.cos(end), y2 = cy + rOuter * Math.sin(end);
      const x3 = cx + rInner * Math.cos(end), y3 = cy + rInner * Math.sin(end);
      const x4 = cx + rInner * Math.cos(start), y4 = cy + rInner * Math.sin(start);
      const path = ['M', x1, y1, 'A', rOuter, rOuter, 0, large, 1, x2, y2,
        'L', x3, y3, 'A', rInner, rInner, 0, large, 0, x4, y4, 'Z'].join(' ');
      return `<path d="${path}" fill="${d.color}"/>`;
    }).join('');
    return `<svg class="donut-svg" viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">${paths}</svg>`;
  }

  // ---------- templates ----------
  function tplHeader() {
    const last = state.lastUpdated ? `Updated ${fmtDate(state.lastUpdated)}` : 'Never updated';
    const profileOptions = state.profiles.map(p =>
      `<option value="${p.id}" ${p.id === state.activeProfileId ? 'selected' : ''}>${escape(p.name)}</option>`
    ).join('');
    return `
      <header class="head">
        <div>
          <div class="eyebrow">PORTFOLIO DASHBOARD</div>
          <h1 class="title">Portfolio Dashboard</h1>
        </div>
        <div class="head-right">
          <div class="profile-bar">
            <span class="profile-bar-label">USER</span>
            <select class="profile-select" id="profile-select" data-act="switch-profile" aria-label="Switch profile">
              ${profileOptions}
            </select>
            <button class="btn-soft" data-act="quick-add-profile" title="Add new user">${I.plus}</button>
            <button class="btn-soft" data-act="manage-profiles" title="Manage users">${I.users}</button>
          </div>
          <div class="head-meta">
            <div class="head-meta-item" style="color: var(--accent);">${I.wallet}<span style="color: var(--muted);">${state.holdings.length} holdings</span></div>
            <div class="head-meta-item">${last}</div>
          </div>
        </div>
      </header>`;
  }

  function tplToolbar() {
    let status = '';
    if (state.saveStatus === 'saving') status = '<span class="text-muted">Saving…</span>';
    else if (state.saveStatus === 'saved') status = '<span class="text-gain">✓ Saved</span>';
    else if (state.saveStatus === 'error') status = '<span class="text-loss">✗ Save failed</span>';
    else status = '<span style="color: var(--dim);">Auto-save enabled</span>';

    const dis = state.holdings.length === 0 || state.updating;
    const empty = state.holdings.length === 0;
    const themeBtn = state.theme === 'dark'
      ? `<button class="btn-soft" data-act="toggle-theme" title="Switch to light mode">${I.sun}</button>`
      : `<button class="btn-soft" data-act="toggle-theme" title="Switch to dark mode">${I.moon}</button>`;

    return `<div class="toolbar">
      <button class="btn-primary" data-act="open-add">${I.plus} Add Holding</button>
      <button class="btn-ghost" data-act="open-prices" ${empty ? 'disabled' : ''}>${I.pencil} Edit Prices</button>
      <button class="btn-ghost" data-act="update-prices" ${dis ? 'disabled' : ''}>
        ${state.updating ? I.spinner : I.refresh}${state.updating ? 'Updating…' : 'Auto Update'}
      </button>
      <span class="toolbar-divider"></span>
      <button class="btn-soft" data-act="export-json" title="Download all profiles as JSON">${I.download} Backup</button>
      <button class="btn-soft" data-act="import-json" title="Restore from a JSON file">${I.upload} Restore</button>
      <span class="toolbar-divider"></span>
      ${themeBtn}
      <div class="save-status">${status}</div>
    </div>`;
  }

  function tplKPI(D) {
    if (state.holdings.length === 0) return '';
    const ccy = D.baseCcy;
    const fmt = ccy === 'KRW' ? fmtKRW : fmtUSD;

    const valueDisplay = D.fxOk ? fmt(D.tValue) : '<span class="text-dim">—</span>';
    const costDisplay = fmt(D.tCost);
    const pnlSign = D.tPnl >= 0;
    const pnlDisplay = D.fxOk && D.anyPrice
      ? `<span style="color: ${pnlSign ? 'var(--gain)' : 'var(--loss)'}">${pnlSign ? '+' : '−'}${fmt(Math.abs(D.tPnl))}</span>`
      : '<span class="text-dim">—</span>';
    const pctDisplay = D.fxOk && D.anyPrice
      ? `<span style="color: ${pnlSign ? 'var(--gain)' : 'var(--loss)'}">${pnlSign ? I.up : I.down}${fmtPct(D.tPct)}</span>`
      : '<span class="text-dim">—</span>';

    const pnlBar = !D.anyPrice || !D.fxOk ? 'muted' : pnlSign ? 'gain' : 'loss';

    return `<div class="kpi-row">
      <div class="kpi">
        <div class="kpi-accent-bar"></div>
        <div class="kpi-label">${I.wallet} Total Value</div>
        <div class="kpi-value">${valueDisplay}</div>
        <div class="kpi-sub text-muted">Cost ${costDisplay}</div>
      </div>
      <div class="kpi">
        <div class="kpi-accent-bar ${pnlBar}"></div>
        <div class="kpi-label">${I.coins} P/L</div>
        <div class="kpi-value">${pnlDisplay}</div>
        <div class="kpi-sub text-muted">In ${ccy}</div>
      </div>
      <div class="kpi">
        <div class="kpi-accent-bar ${pnlBar}"></div>
        <div class="kpi-label">${I.trend} Return</div>
        <div class="kpi-value">${pctDisplay}</div>
        <div class="kpi-sub text-muted">${D.anyPrice ? 'Value / Cost' : 'Run price update'}</div>
      </div>
      <div class="kpi">
        <div class="kpi-accent-bar"></div>
        <div class="kpi-label">${I.hash} Holdings</div>
        <div class="kpi-value">${state.holdings.length}<span style="font-size: 18px; color: var(--muted); margin-left: 4px;">total</span></div>
        <div class="kpi-sub text-muted">KR ${D.krCount} · US ${D.usCount}</div>
      </div>
    </div>`;
  }

  function chartCard(icon, title, meta, body) {
    return `<div class="chart-card">
      <div class="chart-head">
        <span class="chart-icon">${icon}</span>
        <h3 class="chart-title">${title}</h3>
        ${meta ? `<span class="chart-meta">${meta}</span>` : ''}
      </div>
      ${body}
    </div>`;
  }

  function tplChartAllocation(D) {
    const title = 'Allocation by Category';
    if (!D.fxOk) {
      return chartCard(I.pie, title, '', `<div class="chart-empty">FX rate required for mixed KR/US portfolios.<br>Run <span style="color: var(--accent);">Auto Update</span> or <span style="color: var(--accent);">Edit Prices</span>.</div>`);
    }
    const onlyUncat = D.catList.length === 1 && D.catList[0].name === UNCATEGORIZED;
    if (onlyUncat) {
      return chartCard(I.pie, title, '', `<div class="chart-empty">Set categories on your holdings to see allocation.<br>Use the ${I.pencil} button in the table below.</div>`);
    }
    const total = D.catList.reduce((s, c) => s + c.value, 0);
    const data = D.catList.map(c => ({ ...c, color: D.colorFor(c.name), pct: total ? (c.value / total) * 100 : 0 }));
    const fmt = D.baseCcy === 'KRW' ? fmtKRWcompact : fmtUSDcompact;
    const meta = `${D.baseCcy} · ${D.anyPrice ? 'market value' : 'cost basis'}`;
    const body = `<div class="donut-wrap">
      <div style="position: relative; width: 180px; height: 180px;">
        ${donutSVG(data, 180)}
        <div style="position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none;">
          <div style="font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.08em;">TOTAL</div>
          <div class="donut-center" style="font-size: 14px; font-weight: 600; margin-top: 2px;">${fmt(total)}</div>
        </div>
      </div>
      <div class="legend-list">
        ${data.map(c => `
          <div class="legend-row">
            <div class="legend-name">
              <span class="dot" style="background: ${c.color};"></span>
              <span>${escape(c.name)}</span>
            </div>
            <div class="legend-pct">${c.pct.toFixed(1)}%</div>
          </div>`).join('')}
      </div>
    </div>`;
    return chartCard(I.pie, title, meta, body);
  }

  function tplChartTopHoldings(D) {
    const title = 'Top Holdings';
    if (!D.fxOk) {
      return chartCard(I.bar, title, '', `<div class="chart-empty">FX rate required.</div>`);
    }
    if (D.items.length === 0) {
      return chartCard(I.bar, title, '', `<div class="chart-empty">No data</div>`);
    }
    const sorted = [...D.items].sort((a, b) => b.valueBase - a.valueBase).slice(0, 10);
    const max = sorted[0].valueBase || 1;
    const fmt = D.baseCcy === 'KRW' ? fmtKRWcompact : fmtUSDcompact;
    const total = D.tValue || 1;
    const meta = `Top ${sorted.length} · ${D.baseCcy}`;
    const body = `<div class="bar-list">
      ${sorted.map(it => {
        const pct = (it.valueBase / max) * 100;
        const ofTotal = (it.valueBase / total) * 100;
        const cat = (it.h.category || '').trim() || UNCATEGORIZED;
        const color = D.colorFor(cat);
        const label = displayName(it.h);
        return `<div class="bar-row">
          <div class="bar-label" title="${escape(label)} (${escape(it.h.ticker)})">${escape(label)}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width: ${pct.toFixed(1)}%; background: ${color};"></div>
          </div>
          <div class="bar-value">${fmt(it.valueBase)} <span class="text-dim" style="font-size: 10px;">(${ofTotal.toFixed(1)}%)</span></div>
        </div>`;
      }).join('')}
    </div>`;
    return chartCard(I.bar, title, meta, body);
  }

  function tplChartPnL(D) {
    const title = 'P/L by Holding';
    if (!D.anyPrice) {
      return chartCard(I.scale, title, '', `<div class="chart-empty">No current prices yet.<br>Run <span style="color: var(--accent);">Auto Update</span> to fetch them.</div>`);
    }
    if (!D.fxOk) {
      return chartCard(I.scale, title, '', `<div class="chart-empty">FX rate required.</div>`);
    }
    const withPrice = D.items.filter(it => it.hasPrice);
    if (withPrice.length === 0) {
      return chartCard(I.scale, title, '', `<div class="chart-empty">No data to display.</div>`);
    }
    const sorted = [...withPrice].sort((a, b) => Math.abs(b.pnlBase) - Math.abs(a.pnlBase)).slice(0, 10);
    const max = Math.max(...sorted.map(it => Math.abs(it.pnlBase)), 1);
    const fmt = D.baseCcy === 'KRW' ? fmtKRWcompact : fmtUSDcompact;
    const meta = `Top ${sorted.length} · ${D.baseCcy}`;
    const body = `<div class="div-list">
      ${sorted.map(it => {
        const w = (Math.abs(it.pnlBase) / max) * 50;
        const pos = it.pnlBase >= 0;
        const sign = pos ? '+' : '−';
        const label = displayName(it.h);
        return `<div class="div-row">
          <div class="bar-label" title="${escape(label)} (${escape(it.h.ticker)})">${escape(label)}</div>
          <div class="div-track">
            <div class="div-fill ${pos ? 'pos' : 'neg'}" style="width: ${w.toFixed(2)}%;"></div>
          </div>
          <div class="bar-value" style="color: ${pos ? 'var(--gain)' : 'var(--loss)'};">
            ${sign}${fmt(Math.abs(it.pnlBase))} <span class="text-dim" style="font-size: 10px;">(${fmtPct(it.pct)})</span>
          </div>
        </div>`;
      }).join('')}
    </div>`;
    return chartCard(I.scale, title, meta, body);
  }

  function tplChartMarketSplit(D) {
    const title = 'Market Distribution';
    if (D.holdings.length === 0) {
      return chartCard(I.globe, title, '', `<div class="chart-empty">No data</div>`);
    }
    if (!D.fxOk) {
      return chartCard(I.globe, title, '', `<div class="chart-empty">FX rate required for mixed KR/US portfolios.</div>`);
    }
    const krBase = D.items.filter(it => it.h.market === 'KR').reduce((s, it) => s + it.valueBase, 0);
    const usBase = D.items.filter(it => it.h.market === 'US').reduce((s, it) => s + it.valueBase, 0);
    const total = krBase + usBase;
    if (total === 0) {
      return chartCard(I.globe, title, '', `<div class="chart-empty">No data</div>`);
    }
    const krPct = (krBase / total) * 100;
    const usPct = (usBase / total) * 100;

    const stack = `<div class="stack-bar">
      ${krPct > 0 ? `<div class="stack-seg" style="width: ${krPct}%; background: ${KR_COLOR};">${krPct >= 8 ? 'KR ' + krPct.toFixed(1) + '%' : ''}</div>` : ''}
      ${usPct > 0 ? `<div class="stack-seg" style="width: ${usPct}%; background: ${US_COLOR};">${usPct >= 8 ? 'US ' + usPct.toFixed(1) + '%' : ''}</div>` : ''}
    </div>`;

    const krPnl = D.krValue - D.krCost;
    const usPnl = D.usValue - D.usCost;
    const krPctNative = D.krCost ? (krPnl / D.krCost) * 100 : 0;
    const usPctNative = D.usCost ? (usPnl / D.usCost) * 100 : 0;

    const cards = `<div class="stack-legend">
      <div class="stack-card" style="border-left: 3px solid ${KR_COLOR};">
        <div class="stack-card-label">Korea · ${D.krCount} holdings</div>
        <div class="stack-card-value">${D.krCost > 0 ? fmtKRWcompact(D.krValue) : '—'}</div>
        <div class="stack-card-sub" style="color: ${D.krCount === 0 ? 'var(--dim)' : krPnl >= 0 ? 'var(--gain)' : 'var(--loss)'};">
          ${D.krCount === 0 ? '—' : (D.anyPrice ? `${krPnl >= 0 ? '+' : ''}${fmtKRWcompact(krPnl)} · ${fmtPct(krPctNative)}` : 'at cost basis')}
        </div>
      </div>
      <div class="stack-card" style="border-left: 3px solid ${US_COLOR};">
        <div class="stack-card-label">United States · ${D.usCount} holdings</div>
        <div class="stack-card-value">${D.usCost > 0 ? fmtUSD(D.usValue) : '—'}</div>
        <div class="stack-card-sub" style="color: ${D.usCount === 0 ? 'var(--dim)' : usPnl >= 0 ? 'var(--gain)' : 'var(--loss)'};">
          ${D.usCount === 0 ? '—' : (D.anyPrice ? `${usPnl >= 0 ? '+' : ''}${fmtUSD(Math.abs(usPnl))} · ${fmtPct(usPctNative)}` : 'at cost basis')}
        </div>
      </div>
    </div>`;
    const meta = `In ${D.baseCcy}`;
    return chartCard(I.globe, title, meta, stack + cards);
  }

  function tplCharts(D) {
    if (state.holdings.length === 0) return '';
    return `<div class="charts-grid">
      ${tplChartAllocation(D)}
      ${tplChartTopHoldings(D)}
      ${tplChartPnL(D)}
      ${tplChartMarketSplit(D)}
    </div>`;
  }

  // ---------- holdings table ----------
  const SORT_KEYS = {
    name: it => displayName(it.h).toLowerCase(),
    market: it => it.h.market,
    category: it => (it.h.category || '').trim() || UNCATEGORIZED,
    shares: it => it.h.shares,
    buyPrice: it => it.h.buyPrice,
    currentPrice: it => it.h.currentPrice ?? -Infinity,
    value: it => it.valueBase,
    pnl: it => it.hasPrice ? it.pnlBase : -Infinity,
    pct: it => it.hasPrice ? it.pct : -Infinity,
    weight: it => it.valueBase,
  };

  function sortIndicator(key) {
    if (state.sort.key !== key) return '';
    return state.sort.dir === 'asc' ? I.sortUp : I.sortDown;
  }

  function thSort(key, label, opts) {
    const right = opts && opts.right;
    const sorted = state.sort.key === key ? 'sorted' : '';
    return `<th class="${sorted}" data-act="sort" data-key="${key}" style="${right ? 'text-align: right;' : ''}">
      <span style="display: inline-flex; align-items: center; gap: 4px; ${right ? 'flex-direction: row-reverse;' : ''}">
        ${label} ${sortIndicator(key)}
      </span>
    </th>`;
  }

  function tplHoldingsTable(D) {
    if (state.holdings.length === 0) {
      return `<section class="holdings-section">
        <div class="empty">
          <div class="empty-title">No holdings yet</div>
          <div class="empty-sub">Click <span style="color: var(--accent);">Add Holding</span> above to get started,<br>or use <span style="color: var(--accent);">Restore</span> to load a previous backup.</div>
          <div class="empty-hint">Data auto-saves to your browser. Use JSON backup for permanent storage.</div>
        </div>
      </section>`;
    }

    const total = D.tValue || 1;
    const sorter = SORT_KEYS[state.sort.key] || SORT_KEYS.value;
    const dir = state.sort.dir === 'asc' ? 1 : -1;
    const sorted = [...D.items].sort((a, b) => {
      const va = sorter(a), vb = sorter(b);
      if (typeof va === 'string') return va.localeCompare(vb) * dir;
      return (va - vb) * dir;
    });

    const rows = sorted.map(it => {
      const h = it.h;
      const cat = (h.category || '').trim();
      const catColor = cat ? D.colorFor(cat) : null;
      const weight = D.fxOk ? (it.valueBase / total) * 100 : 0;
      const pnlColor = !it.hasPrice ? 'var(--muted)' : it.pnl >= 0 ? 'var(--gain)' : 'var(--loss)';
      const primary = displayName(h);
      const showSub = h.name && h.name.trim() && h.name.trim() !== h.ticker;

      return `<tr>
        <td>
          <div class="ticker-cell">
            <div style="display: flex; align-items: center; gap: 8px; min-width: 0;">
              <span class="ticker-display" title="${escape(primary)}">${escape(primary)}</span>
              <span class="market-tag ${h.market === 'KR' ? 'kr' : 'us'}">${h.market}</span>
            </div>
            ${showSub ? `<span class="ticker-sub" title="${escape(h.ticker)}">${escape(h.ticker)}</span>` : ''}
          </div>
        </td>
        <td>
          ${cat ? `<span class="cat-tag" style="color: ${catColor}; border-color: ${catColor}55; background: ${catColor}12;">${escape(cat)}</span>` : '<span class="text-dim">—</span>'}
        </td>
        <td class="num">${h.shares.toLocaleString()}</td>
        <td class="num">${fmtMoney(h.buyPrice, it.cur)}</td>
        <td class="num">${it.hasPrice ? fmtMoney(h.currentPrice, it.cur) : '<span class="text-dim">—</span>'}</td>
        <td class="num-strong">${it.hasPrice ? fmtMoney(it.value, it.cur) : fmtMoney(it.cost, it.cur)}</td>
        <td class="num-strong" style="color: ${pnlColor};">
          ${it.hasPrice ? `${it.pnl >= 0 ? '+' : '−'}${fmtMoney(Math.abs(it.pnl), it.cur)}` : '<span class="text-dim">—</span>'}
        </td>
        <td class="num" style="color: ${pnlColor};">${it.hasPrice ? fmtPct(it.pct) : '<span class="text-dim">—</span>'}</td>
        <td>
          <div class="weight-cell">
            <div class="weight-track"><div class="weight-fill" style="width: ${weight.toFixed(1)}%;"></div></div>
            <span class="num" style="min-width: 40px;">${D.fxOk ? weight.toFixed(1) + '%' : '—'}</span>
          </div>
        </td>
        <td>
          <div style="display: flex; gap: 2px; justify-content: flex-end;">
            <button class="icon-btn" data-act="edit" data-id="${h.id}" aria-label="Edit">${I.pencil}</button>
            <button class="icon-btn" data-act="delete" data-id="${h.id}" aria-label="Delete">${I.trash}</button>
          </div>
        </td>
      </tr>`;
    }).join('');

    return `<section class="holdings-section">
      <div class="holdings-head">
        ${I.wallet}<h2 class="holdings-title">Holdings</h2>
        <span class="holdings-meta">${state.holdings.length} total · click any header to sort</span>
      </div>
      <div class="table-wrap">
        <table class="holdings">
          <thead>
            <tr>
              ${thSort('name', 'Name')}
              ${thSort('category', 'Category')}
              ${thSort('shares', 'Shares', { right: true })}
              ${thSort('buyPrice', 'Cost', { right: true })}
              ${thSort('currentPrice', 'Price', { right: true })}
              ${thSort('value', 'Value', { right: true })}
              ${thSort('pnl', 'P/L', { right: true })}
              ${thSort('pct', 'Return', { right: true })}
              ${thSort('weight', 'Weight', { right: true })}
              <th class="no-sort"></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </section>`;
  }

  function tplError() {
    let msg = '';
    if (state.error) msg = `<div class="error-bar">
      <span>${escape(state.error)}</span>
      <button class="error-close" data-act="dismiss-error">${I.closeS}</button>
    </div>`;
    if (state.info) msg += `<div class="error-bar" style="background: var(--gain-bg); border-color: rgba(16,185,129,0.25); color: var(--gain);">
      <span>${escape(state.info)}</span>
      <button class="error-close" data-act="dismiss-info">${I.closeS}</button>
    </div>`;
    return msg;
  }

  function tplDialog() {
    if (!state.dialog) return '';
    if (state.dialog.mode === 'prices') return tplPriceDialog();
    if (state.dialog.mode === 'profiles') return tplProfileDialog();
    const isEdit = state.dialog.mode === 'edit';
    const h = state.dialog.holding || {};
    const market = state.dialog.market || h.market || 'KR';
    const existingCats = [...new Set(state.holdings.map(x => (x.category || '').trim()).filter(Boolean))];
    const allCats = [...new Set([...existingCats, ...SUGGESTED])];

    return `<div class="modal-bg" data-act="modal-bg">
      <div class="modal" data-stop>
        <div class="modal-head">
          <h3 class="modal-title">${isEdit ? 'Edit Holding' : 'Add Holding'}</h3>
          <button class="icon-btn" data-act="close-dialog">${I.close}</button>
        </div>
        <div class="field">
          <label class="lbl">Market</label>
          <div class="seg-group">
            <button class="seg-btn ${market === 'KR' ? 'active' : ''}" data-act="set-market" data-v="KR">Korea (KR)</button>
            <button class="seg-btn ${market === 'US' ? 'active' : ''}" data-act="set-market" data-v="US">United States</button>
          </div>
        </div>
        <div class="field">
          <label class="lbl">Ticker ${market === 'KR' ? '(e.g. 005930)' : '(e.g. AAPL)'}</label>
          <input class="input" id="f-ticker" value="${escape(h.ticker || '')}" placeholder="${market === 'KR' ? '005930' : 'AAPL'}">
        </div>
        <div class="field">
          <label class="lbl">Name (optional)</label>
          <input class="input" id="f-name" value="${escape(h.name || '')}" placeholder="${market === 'KR' ? 'Samsung Electronics' : 'Apple Inc.'}" style="font-family: var(--sans);">
        </div>
        <div class="field">
          <label class="lbl">Category (optional)</label>
          <input class="input" id="f-category" value="${escape(h.category || '')}" placeholder="e.g. Tech, Semiconductors, Dividend…" list="cat-list" style="font-family: var(--sans);">
          <datalist id="cat-list">${allCats.map(c => `<option value="${escape(c)}">`).join('')}</datalist>
        </div>
        <div class="field grid-2">
          <div>
            <label class="lbl">Shares</label>
            <input class="input" id="f-shares" type="number" step="any" value="${h.shares ?? ''}" placeholder="100">
          </div>
          <div>
            <label class="lbl">Cost per share (${market === 'KR' ? 'KRW' : 'USD'})</label>
            <input class="input" id="f-buyprice" type="number" step="any" value="${h.buyPrice ?? ''}" placeholder="${market === 'KR' ? '70000' : '150.00'}">
          </div>
        </div>
        <div class="field">
          <label class="lbl">Purchase date</label>
          <input class="input" id="f-buydate" type="date" value="${h.buyDate || new Date().toISOString().slice(0, 10)}">
        </div>
        <div style="display: flex; gap: 10px; margin-top: 8px;">
          <button class="btn-ghost" data-act="close-dialog" style="flex: 1;">Cancel</button>
          <button class="btn-primary" data-act="submit-dialog" style="flex: 1;">${isEdit ? 'Save' : 'Add'}</button>
        </div>
      </div>
    </div>`;
  }

  function tplPriceDialog() {
    const needsFx = state.holdings.some(h => h.market === 'KR') && state.holdings.some(h => h.market === 'US');
    return `<div class="modal-bg" data-act="modal-bg">
      <div class="modal modal-wide" data-stop>
        <div class="modal-head">
          <h3 class="modal-title">Edit Prices</h3>
          <button class="icon-btn" data-act="close-dialog">${I.close}</button>
        </div>
        <p class="modal-sub">Look up current prices on Yahoo Finance, Google Finance, etc. and enter them below. Blank fields keep the existing value.</p>
        ${state.holdings.map(h => `
          <div class="field">
            <label class="lbl">${escape(h.ticker)}${h.name ? ' · ' + escape(h.name) : ''} <span style="color: var(--dim);">(${h.market === 'KR' ? 'KRW' : 'USD'})</span></label>
            <input class="input" data-price-id="${h.id}" type="number" step="any"
              value="${h.currentPrice ?? ''}"
              placeholder="${h.market === 'KR' ? '70000' : '150.00'}">
          </div>`).join('')}
        ${needsFx ? `
          <div class="field" style="border-top: 1px solid var(--border); padding-top: 14px; margin-top: 6px;">
            <label class="lbl">USD / KRW exchange rate</label>
            <input class="input" id="manual-fx" type="number" step="any"
              value="${state.fxRate ?? ''}" placeholder="1380">
          </div>` : ''}
        <div style="display: flex; gap: 10px; margin-top: 14px;">
          <button class="btn-ghost" data-act="close-dialog" style="flex: 1;">Cancel</button>
          <button class="btn-primary" data-act="submit-prices" style="flex: 1;">Save</button>
        </div>
      </div>
    </div>`;
  }

  function tplProfileDialog() {
    const canDelete = state.profiles.length > 1;
    const rows = state.profiles.map(p => {
      const isActive = p.id === state.activeProfileId;
      const count = p.holdings.length;
      return `<div class="profile-row ${isActive ? 'active' : ''}">
        <input class="input" data-profile-name="${p.id}" value="${escape(p.name)}" placeholder="Profile name" style="font-family: var(--sans);">
        <span class="text-dim" style="font-family: var(--mono); font-size: 11px; min-width: 70px; text-align: right;">${count} holding${count === 1 ? '' : 's'}</span>
        ${isActive ? '<span class="profile-badge">ACTIVE</span>' : ''}
        <button class="icon-btn" data-act="profile-delete" data-id="${p.id}" ${canDelete ? '' : 'disabled style="opacity: 0.3; cursor: not-allowed;"'} title="${canDelete ? 'Delete profile' : 'At least one profile required'}">${I.trash}</button>
      </div>`;
    }).join('');

    return `<div class="modal-bg" data-act="modal-bg">
      <div class="modal" data-stop>
        <div class="modal-head">
          <h3 class="modal-title">Manage Users</h3>
          <button class="icon-btn" data-act="close-dialog">${I.close}</button>
        </div>
        <p class="modal-sub">Each user keeps their own holdings, prices, and FX rate. Switch users from the dropdown in the header.</p>
        <div class="profile-list">${rows}</div>
        <div class="profile-add-row">
          <input class="input" id="new-profile-name" placeholder="New user name (e.g. Alice)" style="font-family: var(--sans);">
          <button class="btn-primary" data-act="profile-add">${I.plus} Add</button>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 16px;">
          <button class="btn-primary" data-act="profile-save-all" style="flex: 1;">Done</button>
        </div>
      </div>
    </div>`;
  }

  // ---------- render & events ----------
  function render() {
    const root = document.getElementById('app');
    const formValues = state.dialog && state.dialog.mode !== 'prices' && state.dialog.mode !== 'profiles' ? readForm() : null;
    const D = derive();
    root.innerHTML =
      tplHeader() +
      tplToolbar() +
      tplError() +
      tplKPI(D) +
      tplCharts(D) +
      tplHoldingsTable(D) +
      tplDialog();
    if (formValues) writeForm(formValues);
  }

  function readForm() {
    const get = (id) => document.getElementById(id);
    return {
      ticker: get('f-ticker')?.value,
      name: get('f-name')?.value,
      category: get('f-category')?.value,
      shares: get('f-shares')?.value,
      buyPrice: get('f-buyprice')?.value,
      buyDate: get('f-buydate')?.value,
    };
  }

  function writeForm(v) {
    const set = (id, val) => { const el = document.getElementById(id); if (el && val != null) el.value = val; };
    set('f-ticker', v.ticker);
    set('f-name', v.name);
    set('f-category', v.category);
    set('f-shares', v.shares);
    set('f-buyprice', v.buyPrice);
    set('f-buydate', v.buyDate);
  }

  function commitProfileNames() {
    document.querySelectorAll('[data-profile-name]').forEach(input => {
      const id = input.getAttribute('data-profile-name');
      renameProfile(id, input.value);
    });
  }

  document.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-act]');
    if (!btn) return;
    const act = btn.dataset.act;
    const id = btn.dataset.id;
    if (act === 'open-add') { state.dialog = { mode: 'add' }; render(); }
    else if (act === 'open-prices') { state.dialog = { mode: 'prices' }; render(); }
    else if (act === 'submit-prices') { submitPrices(); }
    else if (act === 'edit') {
      const h = state.holdings.find(x => x.id === id);
      if (h) { state.dialog = { mode: 'edit', holding: h }; render(); }
    }
    else if (act === 'delete') { remove(id); }
    else if (act === 'update-prices') { updatePrices(); }
    else if (act === 'export-json') { exportJSON(); }
    else if (act === 'import-json') { document.getElementById('import-file').click(); }
    else if (act === 'toggle-theme') { toggleTheme(); }
    else if (act === 'manage-profiles') { state.dialog = { mode: 'profiles' }; render(); }
    else if (act === 'quick-add-profile') {
      const name = prompt('New user name:');
      if (name && name.trim()) addProfile(name.trim());
    }
    else if (act === 'profile-add') {
      commitProfileNames();
      const input = document.getElementById('new-profile-name');
      const name = input && input.value.trim();
      if (!name) { input?.focus(); return; }
      addProfile(name);
    }
    else if (act === 'profile-delete') {
      commitProfileNames();
      deleteProfile(id);
    }
    else if (act === 'profile-save-all') {
      commitProfileNames();
      state.dialog = null;
      render();
    }
    else if (act === 'close-dialog' || act === 'modal-bg') {
      if (act === 'modal-bg' && e.target.closest('[data-stop]')) return;
      if (state.dialog && state.dialog.mode === 'profiles') commitProfileNames();
      state.dialog = null; render();
    }
    else if (act === 'set-market') {
      const v = readForm();
      state.dialog = { ...state.dialog, market: btn.dataset.v };
      render();
      writeForm(v);
    }
    else if (act === 'submit-dialog') { submitForm(); }
    else if (act === 'dismiss-error') { state.error = null; render(); }
    else if (act === 'dismiss-info') { state.info = null; render(); }
    else if (act === 'sort') {
      const key = btn.dataset.key;
      if (state.sort.key === key) {
        state.sort.dir = state.sort.dir === 'asc' ? 'desc' : 'asc';
      } else {
        state.sort.key = key;
        state.sort.dir = (key === 'name' || key === 'category' || key === 'market') ? 'asc' : 'desc';
      }
      render();
    }
  });

  document.addEventListener('change', (e) => {
    if (e.target && e.target.id === 'import-file') {
      const file = e.target.files && e.target.files[0];
      if (file) importJSON(file);
      e.target.value = '';
    } else if (e.target && e.target.id === 'profile-select') {
      switchProfile(e.target.value);
    }
  });

  function submitForm() {
    const v = readForm();
    const market = state.dialog.market || state.dialog.holding?.market || 'KR';
    const ticker = (v.ticker || '').trim().toUpperCase();
    const shares = Number(v.shares);
    const buyPrice = Number(v.buyPrice);
    if (!ticker || !(shares > 0) || !(buyPrice > 0)) {
      state.error = 'Ticker, shares, and cost per share are all required.';
      render(); return;
    }
    addOrUpdate({
      ticker, name: (v.name || '').trim(), market,
      shares, buyPrice,
      buyDate: v.buyDate || new Date().toISOString().slice(0, 10),
      category: (v.category || '').trim(),
    }, state.dialog.holding?.id);
  }

  // ---------- init ----------
  state.theme = loadTheme();
  applyTheme();
  if (!hasLocalStorage()) {
    state.error = 'localStorage is unavailable (private mode?). Auto-save is disabled, but JSON backup/restore still works.';
    state.profiles = [newProfile('Default')];
    state.activeProfileId = state.profiles[0].id;
    syncFromActive();
  } else {
    load();
  }
  render();
})();
</script>
</body>
</html>
